al address (ULA)","Unspecified"],"answer":0,"explain":"::1/128 = Loopback.","id":881},{"domain":"Wireshark Features","q":"You captured 5 GB but only need the 1,200 marked packets in a new file. Which action?","choices":["I/O Graph","File > Export Specified Packets > Marked packets","Find Packet","Protocol Hierarchy"],"answer":1,"explain":"Export Specified Packets writes a chosen subset (displayed, marked, or range) to a new capture file.","id":882},{"domain":"Filtering","q":"Which statement best distinguishes capture filters from display filters?","choices":["Capture filters are applied after capture; display filters before","They use identical syntax and are interchangeable","Capture filters (BPF) decide which packets are saved; display filters (Wireshark syntax) decide which saved packets are shown","Display filters reduce file size on disk"],"answer":2,"explain":"Capture filters use BPF and irreversibly limit what is recorded. Display filters use Wireshark syntax and only change what is shown; all captured packets remain in the file.","id":883},{"domain":"Wireshark Features","q":"Which capability would you use to attach a persistent note to one packet?","choices":["a coloring rule","Decode As","a capture filter","a packet comment (pcapng)"],"answer":3,"explain":"Correct: a packet comment (pcapng).","id":884},{"domain":"Ethernet","q":"The standard (non-jumbo) maximum Ethernet payload (MTU) is:","choices":["1500 bytes","576 bytes","1492 bytes","9000 bytes"],"answer":0,"explain":"Standard Ethernet supports a 1500-byte payload (MTU). 9000 bytes is a common jumbo-frame size; 1492 relates to PPPoE overhead; 576 is a minimum IPv4 reassembly size.","id":885},{"domain":"TCP","q":"In a capture: a SYN to 192.168.100.11:3389 (RDP) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","a firewall is dropping the SYN or the host/service is unreachable","DNS failed","the service responded normally"],"answer":1,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":886},{"domain":"IPv6","q":":: (all zeros) is the:","choices":["broadcast","loopback","unspecified address","gateway"],"answer":2,"explain":":: is the unspecified address; IPv6 has no broadcast.","id":887},{"domain":"Ethernet","q":"What is the minimum size of an Ethernet frame (excluding preamble), and what mechanism enforces it?","choices":["46 bytes, enforced by the EtherType","1500 bytes, enforced by the MTU","128 bytes, enforced by the FCS","64 bytes, enforced by padding the payload to reach the minimum"],"answer":3,"explain":"The minimum Ethernet frame is 64 bytes (14-byte header + 46-byte minimum payload + 4-byte FCS). If the payload is under 46 bytes it is padded. The 64-byte floor relates to collision detection on legacy half-duplex Ethernet.","id":888},{"domain":"Troubleshooting","q":"In a capture: host 192.168.50.20 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["the DHCP server/relay is unreachable on that segment","an MTU mismatch","a TCP window bug","high path latency"],"answer":0,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":889},{"domain":"Interface","q":"You want to find large inter-packet gaps (stalls). Which column field is most useful?","choices":["http.host","frame.time_delta","tcp.stream","tcp.flags"],"answer":1,"explain":"A column for frame.time_delta surfaces that field across packets for fast scanning.","id":890},{"domain":"TCP","q":"The Stevens TCP time-sequence graph plots:","choices":["RTT only","retransmission count","sequence number over time (slope = throughput)","window size only"],"answer":2,"explain":"Plateaus indicate stalls; steep smooth slopes indicate healthy flow.","id":891},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.10.0.33?","choices":["dst 10.10.0.33","ip host 10.10.0.33","net 10.10.0.33","host 10.10.0.33"],"answer":3,"explain":"Correct capture filter: host 10.10.0.33 (BPF syntax).","id":892},{"domain":"Troubleshooting","q":"A consistent ~30 ms gap between every SMB request and its response across a transfer, with no loss, indicates:","choices":["High path RTT limiting a chatty round-trip-bound protocol; reducing round trips or latency would help more than adding bandwidth","Packet loss","A zero window","An ARP problem"],"answer":0,"explain":"Loss-free but uniformly spaced request/response pairs reflect RTT-bound behavior. For chatty protocols like SMB, the fix is reducing round trips (e.g., SMB multichannel/larger operations) or latency, not bandwidth.","id":893},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.0.5.200 for the gateway 10.0.5.1 get no reply. What is the most likely explanation?","choices":["an oversized window","the gateway is down or unreachable on that Layer-2 segment","a DNS outage","a TCP reset storm"],"answer":1,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":894},{"domain":"Filtering","q":"Why does '!ip.addr == 10.0.0.5' (or 'ip.addr != 10.0.0.5') often NOT do what users expect?","choices":["The operator is invalid","It filters MAC addresses instead","Because of the implicit 'any' qualifier: a packet with src=10.0.0.5 and dst=10.0.0.9 still has an ip.addr field (dst) that is != 10.0.0.5, so it matches","It only works in capture filters"],"answer":2,"explain":"ip.addr != X means 'some ip.addr field is not X' (implicit any). Since each packet has two address fields, packets involving X still match. The correct exclusion is '!(ip.addr == X)'.","id":895},{"domain":"TCP","q":"In a capture: a connection to 192.168.7.50:995 (POP3S) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the connection reset","the window scaled to zero","an ARP failure","fast retransmit recovered a lost segment"],"answer":3,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":896},{"domain":"Wireshark Features","q":"You need to identify the top talking host pairs by bytes. Which tool?","choices":["Statistics > Conversations, sorted by bytes","Decode As","Statistics > Protocol Hierarchy","Find Packet"],"answer":0,"explain":"Conversations lists host pairs with per-conversation totals; sorting by bytes surfaces the heaviest flows.","id":897},{"domain":"Wireshark Features","q":"You need to find a packet containing the ASCII string 'password' anywhere in its bytes. Which Find Packet search type should you use?","choices":["Display filter","String","Hex value","Regular expression on packet list only"],"answer":1,"explain":"The 'String' search type in Find Packet (Ctrl+F) searches packet bytes/details/list for text. You can scope it to Packet list, Packet details, or Packet bytes.","id":898},{"domain":"Wireshark Features","q":"To show vendor names instead of MAC prefixes, which Wireshark feature do you use?","choices":["enable transport resolution","add a coloring rule","enable MAC name resolution","set a time reference"],"answer":2,"explain":"Correct: enable MAC name resolution.","id":899},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.50.20?","choices":["net 192.168.50.20","ip host 192.168.50.20","dst 192.168.50.20","host 192.168.50.20"],"answer":3,"explain":"Correct capture filter: host 192.168.50.20 (BPF syntax).","id":900},{"domain":"IPv4","q":"A packet arrives with TTL=120. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["8","5","13","9"],"answer":0,"explain":"128 - 120 = 8 hops.","id":901},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 15 carry?","choices":["Subnet Mask","Domain Name","DHCP Server Identifier","NTP Servers"],"answer":1,"explain":"DHCP Option 15 = Domain Name.","id":902},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 51 identifies which encapsulated protocol?","choices":["ESP","GRE","AH","EIGRP"],"answer":2,"explain":"IP protocol 51 = AH. (1=ICMP,6=TCP,17=UDP.)","id":903},{"domain":"Troubleshooting","q":"In a capture: host 172.16.9.50 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","a TCP window bug","an MTU mismatch","the DHCP server/relay is unreachable on that segment"],"answer":3,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":904},{"domain":"Filtering","q":"Which display filter isolates RADIUS traffic by its well-known TCP port?","choices":["tcp.port == 1812","tcp.port == 67","tcp.port == 445","tcp.port == 514"],"answer":0,"explain":"RADIUS uses TCP port 1812.","id":905},{"domain":"Troubleshooting","q":"In a capture: host 192.168.50.150 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","the DHCP server/relay is unreachable on that segment","an MTU mismatch","a TCP window bug"],"answer":1,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":906},{"domain":"Interface","q":"You want to watch for shrinking receive windows / flow-control limits. Which column field is most useful?","choices":["tcp.stream","tcp.analysis.ack_rtt","tcp.window_size","tcp.flags"],"answer":2,"explain":"A column for tcp.window_size surfaces that field across packets for fast scanning.","id":907},{"domain":"Wireshark Features","q":"To get per-host traffic totals at the IP layer, which Wireshark feature do you use?","choices":["Conversations","Follow TCP Stream","I/O Graph","Statistics > Endpoints"],"answer":3,"explain":"Correct: Statistics > Endpoints.","id":908},{"domain":"TCP","q":"A TCP RST (reset) packet is used to:","choices":["Abruptly terminate or refuse a connection (e.g., to a closed port or to abort an existing session)","Acknowledge data","Open a connection","Scale the window"],"answer":0,"explain":"RST immediately tears down or refuses a connection without the FIN handshake. A RST in response to a SYN means the port is closed/refused; a RST mid-session aborts it.","id":909},{"domain":"Interface","q":"Custom columns are valuable in troubleshooting because they:","choices":["Reduce the capture file size","Surface a specific field (e.g., tcp.window_size, dns.qry.name, tcp.analysis.ack_rtt) directly in the packet list for fast scanning","Encrypt sensitive fields","Disable dissectors"],"answer":1,"explain":"Adding a column for a key field lets you scan values across many packets at a glance instead of opening each packet's details — essential for spotting patterns like shrinking windows.","id":910},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 5 usable?","choices":["outside the 12-bit range","reserved (not a normal usable VLAN ID)","a valid, usable VLAN ID (1-4094)","an invalid value (>65535)"],"answer":2,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 5 is usable.","id":911},{"domain":"Wireshark Features","q":"What does the 'Resolved Addresses' dialog (Statistics) show?","choices":["The coloring rules","The protocol hierarchy","Only ARP entries","A list of hostnames and addresses Wireshark resolved in the capture"],"answer":3,"explain":"Resolved Addresses lists the IP-to-name and other resolution mappings Wireshark accumulated, which can be exported to a hosts file.","id":912},{"domain":"Troubleshooting","q":"In a capture: host 172.16.9.25 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["the DHCP server/relay is unreachable on that segment","high path latency","an MTU mismatch","a TCP window bug"],"answer":0,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":913},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show traffic on ports 80 or 443 using set membership?","choices":["arp.opcode == 1","tcp.port in {80,443}","ip.addr == 10.1.1.1","tcp.stream eq 4"],"answer":1,"explain":"Correct display filter: tcp.port in {80,443}","id":914},{"domain":"TCP","q":"In a capture: a connection to 10.20.0.50:5432 (PostgreSQL) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the window scaled to zero","the connection reset","fast retransmit recovered a lost segment","an ARP failure"],"answer":2,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":915},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show only frames larger than 1000 bytes?","choices":["tcp.analysis.zero_window","dns","tcp.analysis.duplicate_ack","frame.len > 1000"],"answer":3,"explain":"Correct display filter: frame.len > 1000","id":916},{"domain":"Wireshark Features","q":"What is the effect of 'File > Export Specified Packets'?","choices":["It exports only packets currently displayed/marked to a new capture file","It deletes unselected packets from disk","It exports packets as a CSV of fields only","It uploads packets to CloudShark"],"answer":0,"explain":"Export Specified Packets writes a chosen subset — all displayed, marked, or a range — to a new capture file, leaving the original untouched.","id":917},{"domain":"TCP","q":"A TCP Window Scale option with shift count 4 multiplies the window by what factor?","choices":["8","16","17","32"],"answer":1,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^4 = 16. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":918},{"domain":"TCP","q":"A TCP Window Scale option with shift count 3 multiplies the window by what factor?","choices":["3","9","8","16"],"answer":2,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^3 = 8. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":919},{"domain":"Capturing Traffic","q":"Restarting a capture (the restart button) does what?","choices":["Pauses the capture without discarding packets","Saves the capture and exits","Toggles promiscuous mode","Stops the current capture, discards captured packets, and immediately begins a new one with the same settings"],"answer":3,"explain":"Restart abandons the current in-progress capture buffer and starts fresh with identical options — handy when you realize you want a clean capture from this moment.","id":920},{"domain":"Interface","q":"To follow sequence-number progression, which field should you add as a column?","choices":["tcp.seq","dns.qry.name","ip.ttl","http.host"],"answer":0,"explain":"A column for tcp.seq surfaces that field across packets for fast scanning.","id":921},{"domain":"Capturing Traffic","q":"Where must you capture to see traffic to 127.0.0.1?","choices":["the monitor interface","the loopback interface","a TAP","the physical NIC"],"answer":1,"explain":"Loopback traffic never reaches the physical NIC; capture on loopback.","id":922},{"domain":"TCP","q":"In a capture: the SYN to 10.10.0.10:110 (POP3) is answered immediately with RST/ACK. What is the most likely explanation?","choices":["the packet was fragmented","the port is open and listening","the destination port is closed (no listener)","TTL expired"],"answer":2,"explain":"A SYN to a closed port yields RST/ACK; an open port yields SYN/ACK.","id":923},{"domain":"Wireshark Features","q":"Packet comments stored in a pcapng file are useful for what?","choices":["Forcing a re-dissection","Encrypting the packet","Changing the packet's timestamp","Annotating specific packets with analyst notes that travel with the file"],"answer":3,"explain":"Packet comments let analysts attach notes to individual packets; saved in pcapng, they persist with the file and can be viewed by anyone who opens it (Statistics > Capture File Properties lists them).","id":924},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.0.5.1 to 10.0.5.33 on 8080 (HTTP alt) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","a DNS misconfiguration","a VLAN tagging error","normal setup"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":925},{"domain":"Wireshark Features","q":"Which shortcut sets or clears a time reference on the selected packet?","choices":["Ctrl+R","Ctrl+T","Ctrl+M","Ctrl+F"],"answer":1,"explain":"Ctrl+T toggles a time reference, zeroing the time column at that packet.","id":926},{"domain":"TCP","q":"In a capture: a connection to 10.1.1.10:995 (POP3S) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the connection reset","the window scaled to zero","fast retransmit recovered a lost segment","an ARP failure"],"answer":2,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":927},{"domain":"Filtering","q":"Which display filter isolates syslog traffic by its well-known TCP port?","choices":["tcp.port == 636","tcp.port == 69","tcp.port == 25","tcp.port == 514"],"answer":3,"explain":"syslog uses TCP port 514.","id":928},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.1.1.10:143 (IMAP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","DNS failing","the server can't generate data","an ARP loop"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":929},{"domain":"IPv6","q":"IPv6 multicast addresses begin with which prefix?","choices":["2000::/3","FF00::/8","FE80::/10","FC00::/7"],"answer":1,"explain":"All IPv6 multicast addresses start with FF (FF00::/8). Global unicast is 2000::/3; link-local is FE80::/10; unique local is FC00::/7.","id":930},{"domain":"TCP","q":"What is the purpose of the TCP ACK flag?","choices":["push buffered data to the application promptly","abruptly reset/abort or refuse a connection","acknowledge received data","gracefully finish/close one direction"],"answer":2,"explain":"ACK is used to acknowledge received data (bit 0x010).","id":931},{"domain":"Filtering","q":"Traffic on port 445 is most commonly associated with which service/protocol?","choices":["TFTP","NTP","DHCP server","SMB"],"answer":3,"explain":"Port 445 is the well-known port for SMB.","id":932},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.7.1 to 192.168.7.150 on 445 (SMB) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","a DNS misconfiguration","normal setup","a VLAN tagging error"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":933},{"domain":"TCP","q":"A TCP Window Scale option with shift count 14 multiplies the window by what factor?","choices":["14","16384","16385","32768"],"answer":1,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^14 = 16384. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":934},{"domain":"Filtering","q":"A saved, clickable display-filter shortcut on the toolbar is called a what?","choices":["profile","coloring rule","filter button","capture filter"],"answer":2,"explain":"Filter buttons store any display-filter expression with a label for one-click reuse.","id":935},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 10 usable?","choices":["outside the 12-bit range","reserved (not a normal usable VLAN ID)","an invalid value (>65535)","a valid, usable VLAN ID (1-4094)"],"answer":3,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 10 is usable.","id":936},{"domain":"ICMPv6","q":"ICMPv6 Type 128 corresponds to which message?","choices":["Echo Request","Redirect","Router Advertisement","Neighbor Advertisement"],"answer":0,"explain":"ICMPv6 Type 128 = Echo Request.","id":937},{"domain":"DNS","q":"A DNS 'PTR' record returns what?","choices":["an authoritative name server for the zone","a hostname for reverse (IP-to-name) lookups","a canonical name (alias) for another name","a mail exchange server for the domain"],"answer":1,"explain":"A PTR record returns a hostname for reverse (IP-to-name) lookups.","id":938},{"domain":"TCP","q":"In a capture: a SYN to 10.10.0.200:80 (HTTP) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","DNS failed","a firewall is dropping the SYN or the host/service is unreachable","the service responded normally"],"answer":2,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":939},{"domain":"ARP","q":"A sweep of ARP requests across sequential IPs suggests:","choices":["an MTU discovery","normal gateway operation","a DHCP renewal","host scanning/reconnaissance"],"answer":3,"explain":"Rapid ARP sweeps indicate subnet mapping/scanning.","id":940},{"domain":"Interface","q":"Copying a profile is useful to do what?","choices":["duplicate an existing setup as a starting point to modify","reset Wireshark","merge captures","export packets"],"answer":0,"explain":"Copying preserves columns/colors/filters so you can tweak a copy quickly.","id":941},{"domain":"Troubleshooting","q":"A SYN with no SYN/ACK (and SYN retransmissions) typically indicates:","choices":["A successful connection","The server is unreachable, the port is filtered by a firewall (silently dropped), or the service is down","A normal teardown","A DNS success"],"answer":1,"explain":"Unanswered SYNs that get retransmitted mean the handshake never completes — common causes are a filtering firewall dropping the SYN, an unreachable host, or a non-listening service. (A closed port would usually send RST, not silence.)","id":942},{"domain":"Capturing Traffic","q":"What does 'Restart' do during a capture?","choices":["pauses without discarding","saves and exits","discards current packets and starts fresh with the same settings","toggles promiscuous mode"],"answer":2,"explain":"Restart abandons the in-progress buffer and begins a new capture with identical options.","id":943},{"domain":"Ethernet","q":"A destination MAC of FF:FF:FF:FF:FF:FF is what kind of address?","choices":["Unicast","Multicast","Anycast","Broadcast"],"answer":3,"explain":"All-ones (FF:FF:FF:FF:FF:FF) is the Layer-2 broadcast address, delivered to every host on the segment. ARP requests use it.","id":944},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture only ARP?","choices":["arp","icmp","portrange 1000-2000","udp"],"answer":0,"explain":"Correct capture filter: arp (BPF syntax).","id":945},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.50.10:3389 (RDP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["DNS failing","the receiver is the bottleneck (zero windows stall the sender)","the server can't generate data","an ARP loop"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":946},{"domain":"Filtering","q":"Which display filter would you use to match only traffic sourced from 192.168.100.25?","choices":["ip.addr == 192.168.100.25","eth.src == 192.168.100.25","ip.src == 192.168.100.25","ip.dst == 192.168.100.25"],"answer":2,"explain":"Correct display filter: ip.src == 192.168.100.25 (ip.addr is bidirectional; ip.src/ip.dst are directional).","id":947},{"domain":"TCP","q":"In a capture: a connection to 10.20.0.20:1433 (MS SQL) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the connection reset","the window scaled to zero","an ARP failure","fast retransmit recovered a lost segment"],"answer":3,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":948},{"domain":"DHCPv4","q":"DHCP message-type code 1 (Option 53) corresponds to which message?","choices":["Discover","Release","NAK","Request"],"answer":0,"explain":"DHCP type 1 = Discover.","id":949},{"domain":"IPv4","q":"A packet arrives with TTL=53. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["14","11","13","9"],"answer":1,"explain":"64 - 53 = 11 hops.","id":950},{"domain":"Capturing Traffic","q":"A stop condition 'after 100000 packets' does what?","choices":["sets the snaplen","creates a coloring rule","automatically stops the capture at that packet count","enables monitor mode"],"answer":2,"explain":"Stop conditions bound a capture by packets, size, or time.","id":951},{"domain":"Wireshark Features","q":"You want per-host (not per-pair) traffic totals at the IP layer. Which tool?","choices":["Follow TCP Stream","Statistics > Conversations","I/O Graph","Statistics > Endpoints (IPv4/IPv6 tab)"],"answer":3,"explain":"Endpoints lists individual hosts with per-endpoint totals, distinct from Conversations which lists pairs.","id":952},{"domain":"Capturing Traffic","q":"To capture traffic between two other hosts on a switched network, which is NOT a viable approach?","choices":["Rely on your NIC's promiscuous mode alone while plugged into an unrelated switch port","Insert a TAP in the link","Configure a SPAN/port mirror","Capture on one of the two hosts directly"],"answer":0,"explain":"On a switched network the switch only forwards frames destined to your port, so promiscuous mode alone won't reveal other hosts' unicast traffic. You need a TAP, port mirror, or capture on an endpoint in the path.","id":953},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.10.0.50 for the gateway 10.10.0.1 get no reply. What is the most likely explanation?","choices":["a TCP reset storm","the gateway is down or unreachable on that Layer-2 segment","an oversized window","a DNS outage"],"answer":1,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":954},{"domain":"TCP","q":"With SACK in DUP ACKs, the missing range is:","choices":["from the TTL","from the window scale","between the cumulative ACK number and the SACK left edge","from the IP ID"],"answer":2,"explain":"ACK number starts the gap; SACK left edge ends it.","id":955},{"domain":"TCP","q":"In a capture: a SYN to 10.1.1.77:8080 (HTTP alt) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","DNS failed","the service responded normally","a firewall is dropping the SYN or the host/service is unreachable"],"answer":3,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":956},{"domain":"TCP","q":"In a capture: a connection to 10.8.8.25:445 (SMB) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["fast retransmit recovered a lost segment","the window scaled to zero","the connection reset","an ARP failure"],"answer":0,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":957},{"domain":"TCP","q":"Conversation timestamps for a TCP stream (tcp.time_relative and tcp.time_delta) measure:","choices":["RTT between hosts","Time since the first packet of the stream and time since the previous packet in the stream, respectively","TTL decrement","Window scale"],"answer":1,"explain":"tcp.time_relative is elapsed time since the conversation's first frame; tcp.time_delta is the gap from the previous frame in that stream. Both require the conversation-timestamp TCP preference.","id":958},{"domain":"IPv4","q":"How is the IPv4 range 224.0.0.0/4 classified?","choices":["APIPA / link-local","CGNAT shared address space","multicast","RFC 1918 private"],"answer":2,"explain":"224.0.0.0/4 = multicast.","id":959},{"domain":"Filtering","q":"The display filter 'ip.addr == 10.0.0.5' matches packets where:","choices":["Only the source IP is 10.0.0.5","Both source and destination are 10.0.0.5","Neither field is 10.0.0.5","Either the source OR destination IP is 10.0.0.5"],"answer":3,"explain":"ip.addr is satisfied if the value appears in any IP address field (src or dst). To match only the source use ip.src; only destination use ip.dst.","id":960},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 172.16.5.1 to 172.16.5.77 on 993 (IMAPS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","a VLAN tagging error","a DNS misconfiguration","normal setup"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":961},{"domain":"Troubleshooting","q":"In a capture: host 172.20.3.25 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","the DHCP server/relay is unreachable on that segment","an MTU mismatch","a TCP window bug"],"answer":1,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":962},{"domain":"Troubleshooting","q":"In a capture you observe: large packets are silently dropped while small packets succeed, and no ICMP errors are seen. What is the most likely explanation?","choices":["an ARP cache poisoning attack","a DNS NXDOMAIN loop","an MTU/PMTUD black hole (ICMP 'fragmentation needed' is being filtered)","a DHCP scope problem"],"answer":2,"explain":"When ICMP Type 3 Code 4 is blocked, Path MTU Discovery fails: oversized packets vanish with no feedback, while small packets pass.","id":963},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.20.3.200?","choices":["net 172.20.3.200","dst 172.20.3.200","ip host 172.20.3.200","host 172.20.3.200"],"answer":3,"explain":"Correct capture filter: host 172.20.3.200 (BPF syntax).","id":964},{"domain":"IPv4","q":"A packet arrives with TTL=124. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["4","1","5","2"],"answer":0,"explain":"128 - 124 = 4 hops.","id":965},{"domain":"Interface","q":"Which column would best help you see which web hosts are being contacted?","choices":["dns.qry.name","http.host","tcp.analysis.ack_rtt","frame.time_delta"],"answer":1,"explain":"A column for http.host surfaces that field across packets for fast scanning.","id":966},{"domain":"Wireshark Features","q":"Which capability would you use to reconstruct and save a file transferred over HTTP?","choices":["Follow UDP Stream","Capture Options","File > Export Objects > HTTP","Statistics > Endpoints"],"answer":2,"explain":"Correct: File > Export Objects > HTTP.","id":967},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.1.1.100 for the gateway 10.1.1.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","a TCP reset storm","an oversized window","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":968},{"domain":"Capturing Traffic","q":"You must capture all traffic on a 1 Gbps link including physical errors without risking dropped frames on a busy switch.","choices":["use a network TAP","poll the switch via SNMP","capture on an endpoint","use a SPAN/port mirror"],"answer":0,"explain":"A TAP passively copies all traffic (including L1 errors) without consuming switch resources or dropping frames under load.","id":969},{"domain":"TCP","q":"In a capture: the handshake to 172.16.9.20:8080 (HTTP alt) succeeds, then 172.16.9.20 sends repeated Zero Window messages. What is the most likely explanation?","choices":["DNS is failing","the receiver {h} is application-bottlenecked (full buffer)","the link is saturated","the gateway ARP is missing"],"answer":1,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":970},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture only ICMP?","choices":["port 53","not port 22","icmp","portrange 1000-2000"],"answer":2,"explain":"Correct capture filter: icmp (BPF syntax).","id":971},{"domain":"Wireshark Features","q":"Which Wireshark feature lets you locate a packet containing a specific text string?","choices":["a profile","a capture filter","a coloring rule","Find Packet (Ctrl+F), String search"],"answer":3,"explain":"Correct: Find Packet (Ctrl+F), String search.","id":972},{"domain":"Capturing Traffic","q":"Which mode lets a wired NIC pass all frames it sees, not just its own?","choices":["promiscuous mode","half-duplex mode","monitor mode","loopback mode"],"answer":0,"explain":"Promiscuous mode delivers all received frames regardless of destination MAC.","id":973},{"domain":"Capturing Traffic","q":"What best localizes where packets are dropped across a device?","choices":["disabling name resolution","multi-point capture on both sides","a larger snaplen","a single endpoint capture"],"answer":1,"explain":"Comparing captures at two points shows where a packet present at A is missing at B.","id":974},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 172.16.9.1 to 172.16.9.200 on 123 (NTP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","a VLAN tagging error","packet loss in the path triggering retransmissions","normal setup"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":975},{"domain":"Filtering","q":"Which display filter would you use to match only traffic sourced from 10.10.0.77?","choices":["ip.dst == 10.10.0.77","eth.src == 10.10.0.77","ip.addr == 10.10.0.77","ip.src == 10.10.0.77"],"answer":3,"explain":"Correct display filter: ip.src == 10.10.0.77 (ip.addr is bidirectional; ip.src/ip.dst are directional).","id":976},{"domain":"TCP","q":"In a capture: the handshake to 10.10.0.33:68 (DHCP client) succeeds, then 10.10.0.33 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the receiver {h} is application-bottlenecked (full buffer)","the link is saturated","DNS is failing","the gateway ARP is missing"],"answer":0,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":977},{"domain":"TCP","q":"SACK reports:","choices":["the window scale","received non-contiguous byte ranges so only gaps are retransmitted","the MSS","the total bytes received"],"answer":1,"explain":"SACK lets the sender retransmit only the missing ranges.","id":978},{"domain":"Troubleshooting","q":"In a capture you observe: two captures (inside and outside a device) show the same flow with different IP addresses. What is the most likely explanation?","choices":["a duplicated MAC","the captures are of different flows","NAT is translating addresses between the two capture points","packet corruption"],"answer":2,"explain":"Different src/dst addresses for the same conversation across a device indicate NAT; correlate by ports/payload/timing.","id":979},{"domain":"Interface","q":"You want to follow sequence-number progression. Which column field is most useful?","choices":["tcp.analysis.ack_rtt","ip.id","tcp.stream","tcp.seq"],"answer":3,"explain":"A column for tcp.seq surfaces that field across packets for fast scanning.","id":980},{"domain":"Troubleshooting","q":"You can infer network topology from a capture primarily by examining:","choices":["MAC addresses (next-hop/router MACs), IP addresses, TTL values, and which broadcast/ARP/DHCP traffic is visible","Only the payload","The capture file name","Coloring rules"],"answer":0,"explain":"Combining Layer-2 (MACs, who answers ARP), Layer-3 (subnets, gateways), and TTL (hop distance) plus visibility of broadcast traffic lets you reconstruct where the capture sits and the rough topology around it.","id":981},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.8.8.20?","choices":["dst 10.8.8.20","host 10.8.8.20","net 10.8.8.20","ip host 10.8.8.20"],"answer":1,"explain":"Correct capture filter: host 10.8.8.20 (BPF syntax).","id":982},{"domain":"ARP","q":"In a capture you see a unicast frame stating '192.168.50.50 is at <MAC>' in response to a who-has. What is it?","choices":["a gratuitous ARP","an ARP request","an ARP reply","an ICMP redirect"],"answer":2,"explain":"A directed 'is-at' answer is an ARP reply (opcode 2).","id":983},{"domain":"ICMPv4","q":"ICMP Type 5 (Redirect) tells a host to:","choices":["report congestion","acknowledge an echo","indicate TTL expiry","use a better next-hop gateway"],"answer":3,"explain":"A Redirect informs a host of a more optimal gateway for a destination.","id":984},{"domain":"Filtering","q":"Traffic on port 993 is most commonly associated with which service/protocol?","choices":["IMAPS","SSH","HTTP alt","TFTP"],"answer":0,"explain":"Port 993 is the well-known port for IMAPS.","id":985},{"domain":"DNS","q":"A DNS 'MX' record returns what?","choices":["an IPv6 address","a mail exchange server for the domain","the start-of-authority zone parameters","a canonical name (alias) for another name"],"answer":1,"explain":"A MX record returns a mail exchange server for the domain.","id":986},{"domain":"Wireshark Features","q":"Which Statistics tool shows a tree of all protocols seen in the capture along with packet counts and percentages?","choices":["Conversations","Endpoints","Protocol Hierarchy","I/O Graph"],"answer":2,"explain":"Statistics > Protocol Hierarchy presents a hierarchical breakdown of every protocol the dissectors identified, with packet and byte counts/percentages — useful for quickly characterizing a capture.","id":987},{"domain":"ICMPv4","q":"ICMP Type 3 messages indicate what?","choices":["Echo reply","Time Exceeded","Redirect","Destination Unreachable (with the code specifying why, e.g., port/host/network unreachable, fragmentation needed)"],"answer":3,"explain":"Type 3 = Destination Unreachable; the Code refines it: 0 net unreachable, 1 host unreachable, 3 port unreachable, 4 fragmentation needed and DF set, etc.","id":988},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.1.25?","choices":["host 192.168.1.25","dst 192.168.1.25","net 192.168.1.25","ip host 192.168.1.25"],"answer":0,"explain":"Correct capture filter: host 192.168.1.25 (BPF syntax).","id":989},{"domain":"Capturing Traffic","q":"You want to capture raw 802.11 management and control frames from nearby Wi-Fi networks.","choices":["enable promiscuous mode on Ethernet","enable monitor (RFMON) mode on the wireless adapter","use a TAP","use a ring buffer"],"answer":1,"explain":"Monitor mode captures all 802.11 frames including beacons/management/control, not just data for the associated network.","id":990},{"domain":"IPv6","q":"An IPv6 address in 2000::/3 is what type?","choices":["Multicast","Unspecified","Global unicast (currently assigned)","Link-local"],"answer":2,"explain":"2000::/3 = Global unicast (currently assigned).","id":991},{"domain":"Wireshark Features","q":"You want to measure elapsed time from a specific packet onward. What do you set?","choices":["a profile","a coloring rule","a capture filter","a Time Reference on that packet (Ctrl+T)"],"answer":3,"explain":"A time reference zeroes the time column at that packet so later times are measured relative to it.","id":992},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.1.33:67 (DHCP server) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","the server can't generate data","DNS failing","an ARP loop"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":993},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 1002 usable?","choices":["reserved (not a normal usable VLAN ID)","a valid, usable VLAN ID (1-4094)","outside the 12-bit range","an invalid value (>65535)"],"answer":1,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 1002 is usable.","id":994},{"domain":"TCP","q":"In a capture: a SYN to 10.1.1.77:636 (LDAPS) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["DNS failed","the service responded normally","a firewall is dropping the SYN or the host/service is unreachable","a graceful close occurred"],"answer":2,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":995},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.50.200 for the gateway 192.168.50.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","a TCP reset storm","an oversized window","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":996},{"domain":"UDP","q":"UDP port 5353 is most commonly used by which protocol/service?","choices":["mDNS","TFTP","SSDP","DNS"],"answer":0,"explain":"mDNS is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":997},{"domain":"Wireshark Features","q":"Which feature applies a chosen dissector to traffic on a nonstandard port?","choices":["Time Reference","Decode As","Find Packet","Coloring Rules"],"answer":1,"explain":"Decode As maps traffic (e.g., a port) to a specific dissector Wireshark wouldn't auto-detect.","id":998},{"domain":"Wireshark Features","q":"In Wireshark, fields displayed inside square brackets [ ] in the packet details pane indicate what?","choices":["Bytes that were truncated during capture","Encrypted payload that could not be decoded","Values generated by the Wireshark dissector, not present on the wire","Fields that failed a checksum validation"],"answer":2,"explain":"Square brackets denote dissector-generated/computed fields (e.g., [Stream index], [iRTT], [Bytes in flight]). They are analyst aids and were never transmitted as actual bytes in the packet.","id":999},{"domain":"ARP","q":"What is the fundamental purpose of ARP?","choices":["Resolve hostnames to IP addresses","Assign IP addresses dynamically","Route packets between subnets","Resolve a known IPv4 address to its corresponding MAC address on the local link"],"answer":3,"explain":"ARP (Address Resolution Protocol) maps a known IPv4 address to the Layer-2 MAC address needed to deliver frames on the local segment.","id":1000}];
const GUIDE = [{"id": "d1", "weight": "10%", "title": "Domain 1 — Key Features of Wireshark", "intro": "Wireshark turns raw packets into readable analysis. This domain covers the everyday features you use to open, navigate, summarize, and extract information from a capture.", "sections": [["File handling & capture formats", "<p>Wireshark opens, saves, and closes capture files and can export a chosen subset of packets to a new file.</p><p><b>pcap vs pcapng.</b> Classic <code>pcap</code> (libpcap) is a simple single-interface format with microsecond timestamps. <code>pcapng</code> (the modern default) supports multiple interfaces, nanosecond timestamps, name-resolution blocks, and—crucially—<b>per-packet and per-file comments</b> that travel with the file.</p><ul><li><b>Export Specified Packets</b> writes displayed, marked, or a range of packets to a new file without altering the original.</li><li><b>Export Objects</b> reconstructs files carried by content-bearing protocols: HTTP, SMB, TFTP, FTP-DATA, DICOM, and IMF (email).</li></ul>"], ["Finding & annotating packets", "<p><b>Find Packet (Ctrl+F)</b> searches by Display filter, Hex value, String, or Regular Expression, scoped to the packet list, details, or bytes.</p><p><b>Packet comments</b> let you attach analyst notes to individual packets (saved in pcapng). <b>Marking (Ctrl+M)</b> flags packets for navigation and export.</p><p><b>Time reference (Ctrl+T)</b> zeroes the time column at a chosen packet so later times are measured relative to it. You can also switch <b>time display formats</b> (seconds since capture start, time of day, UTC, seconds since previous packet, etc.).</p>"], ["Name resolution", "<p>Wireshark can resolve three layers of names:</p><ul><li><b>MAC (Ethernet)</b> — maps the OUI (first 3 bytes) to a vendor via the manufacturers database (e.g., <code>Cisco_</code>).</li><li><b>Network (IP)</b> — reverse DNS (PTR) to hostnames. Can be slow and may be inaccurate; many analysts disable it.</li><li><b>Transport (port)</b> — maps well-known port numbers to service names.</li></ul><p>The <b>Resolved Addresses</b> dialog lists what was resolved and can export a hosts file.</p>"], ["Decode As & dissector-generated fields", "<p><b>Decode As</b> forces a specific dissector onto traffic Wireshark wouldn't otherwise recognize—e.g., decoding HTTP on TCP port 8000 as HTTP.</p><p>Fields shown in <b>[square brackets]</b> are <b>generated by the dissector</b>, not bytes on the wire—e.g., <code>[Stream index]</code>, <code>[iRTT]</code>, <code>[Bytes in flight]</code>, <code>[SEQ/ACK analysis]</code>. Distinguishing these from real captured bytes is an exam favorite.</p>"], ["Statistics: the analyst's dashboard", "<table><tr><th>Tool</th><th>What it shows</th></tr><tr><td>Protocol Hierarchy</td><td>Tree of every dissected protocol with packet/byte counts and percentages</td></tr><tr><td>Conversations</td><td>Communicating <i>pairs</i> (by Ethernet/IP/TCP/UDP), identified by the 5-tuple for TCP/UDP</td></tr><tr><td>Endpoints</td><td><i>Individual</i> hosts with per-host totals at each layer</td></tr><tr><td>I/O Graph</td><td>packets/s or bits/s over time for a display filter (throughput visualization)</td></tr><tr><td>Capture File Properties</td><td>Duration, packet counts, data rates, drops, and comments</td></tr></table><p><b>Follow TCP/UDP Stream</b> reassembles a conversation's bidirectional payload into readable form and applies <code>tcp.stream eq N</code> / <code>udp.stream eq N</code>.</p>"]]}, {"id": "d2", "weight": "10%", "title": "Domain 2 — Capturing Traffic", "intro": "Where and how you capture determines what you can see. This domain compares capture points and the mechanics of running a capture.", "sections": [["Capture points compared", "<table><tr><th>Method</th><th>Strengths</th><th>Limitations</th></tr><tr><td>Direct on endpoint</td><td>Easy; shows exactly what that host sends/receives</td><td>Misses other hosts; NIC offload can distort checksums; uses host resources</td></tr><tr><td>Network TAP</td><td>Passive, reliable, copies all traffic incl. L1 errors; no switch load</td><td>Requires hardware and physical insertion</td></tr><tr><td>Port mirror / SPAN</td><td>No extra hardware; flexible</td><td>Can drop frames under load; usually omits errored frames; uses switch resources</td></tr><tr><td>Infrastructure device</td><td>Convenient on routers/firewalls</td><td>Consumes device CPU; often scoped to selected interfaces/punted traffic</td></tr><tr><td>Multi-point</td><td>Compare two locations to localize loss/latency/NAT</td><td>Requires correlation and synchronized clocks</td></tr></table>"], ["Promiscuous vs monitor mode", "<p><b>Promiscuous mode</b> (wired): the NIC passes <i>all</i> frames it receives to the OS, not just those addressed to its MAC. On a switch you still only see what's forwarded to your port.</p><p><b>Monitor (RFMON) mode</b> (Wi-Fi): captures raw 802.11 frames including beacons, management, and control frames—not just data for the associated network.</p>"], ["Running a capture", "<ul><li><b>Select the interface</b> (including loopback for 127.0.0.1/::1 traffic).</li><li><b>Start / Stop / Restart</b>—Restart discards the current buffer and begins fresh with the same options.</li><li><b>Limit</b> by file size, packet count, or duration so unattended captures stop on their own.</li><li><b>Snapshot length (snaplen)</b> caps bytes stored per packet (e.g., 96 bytes for headers only).</li><li><b>Ring buffer</b>: rotate through N files of a set size/duration, overwriting the oldest—bounded continuous capture.</li></ul>"], ["Command-line capture", "<p><b>dumpcap</b> is Wireshark's lightweight capture engine—no dissection, minimal overhead, fewer drops on busy links. <b>tshark</b> adds dissection. For very high rates or long durations, prefer dumpcap.</p><p>Capture filters use <b>BPF</b> syntax (see Domain 3).</p>"], ["Capture artifacts to recognize", "<ul><li><b>Checksum offload</b>: outbound packets captured on the sender may show 'checksum incorrect' because the NIC fills the checksum <i>after</i> capture. Benign.</li><li><b>Dropped packets</b> (in Capture File Properties) mean the capture host couldn't keep up—use dumpcap, a smaller snaplen, or a TAP/aggregator.</li></ul>"]]}, {"id": "d3", "weight": "12%", "title": "Domain 3 — Capture & Display Filters", "intro": "Filtering is how you isolate signal from noise. The exam tests both syntaxes and the subtle logic traps.", "sections": [["Two different syntaxes", "<table><tr><th></th><th>Capture filter</th><th>Display filter</th></tr><tr><td>Syntax</td><td>BPF (Berkeley Packet Filter)</td><td>Wireshark's own</td></tr><tr><td>When</td><td>Decides what is <b>saved</b> (irreversible)</td><td>Decides what is <b>shown</b> (all packets remain)</td></tr><tr><td>Example</td><td><code>host 10.0.0.5</code>, <code>tcp port 80</code></td><td><code>ip.addr==10.0.0.5</code>, <code>tcp.port==80</code></td></tr></table><p>They are <b>not interchangeable</b>. You cannot write <code>dns</code> as a capture filter—use <code>port 53</code>.</p>"], ["Building display filters", "<ul><li>Type manually, or <b>right-click a field</b> → Apply/Prepare as Filter.</li><li><b>Comparison operators</b>: <code>== != &gt; &lt; &gt;= &lt;=</code> or <code>eq ne gt lt ge le</code>.</li><li><b>Logical operators</b>: <code>and/&&</code>, <code>or/||</code>, <code>not/!</code>.</li><li><b>Set membership</b>: <code>tcp.port in {80,443,8080}</code>.</li><li><b>Byte search</b>: <code>frame contains \"GET\"</code>; <b>regex</b>: <code>http.host matches \"(?i)example\"</code>.</li><li><b>Generated fields</b> are filterable: <code>tcp.analysis.retransmission</code>, <code>tcp.analysis.zero_window</code>.</li><li><b>Filter buttons</b> save a filter as a one-click toolbar shortcut.</li></ul>"], ["The implicit any/all trap (critical)", "<p>A filter like <code>ip.addr != 10.0.0.5</code> means \"<i>some</i> ip.addr field is not 10.0.0.5.\" Because each packet has two address fields, a packet to/from 10.0.0.5 still matches (its other address differs). This is the <b>implicit 'any'</b> qualifier.</p><p>To truly exclude a host, negate the whole expression: <code>!(ip.addr == 10.0.0.5)</code>.</p>"], ["Incomplete or excess results", "<p>Filtering <code>http</code> hides the TCP three-way handshake of those sessions, because handshake segments carry <b>no HTTP layer</b>. To see the full conversation, use <code>tcp.stream eq N</code> or Follow TCP Stream.</p>"], ["Common BPF capture filters", "<table><tr><th>Goal</th><th>BPF</th></tr><tr><td>One host (either direction)</td><td><code>host 10.0.0.5</code></td></tr><tr><td>A subnet</td><td><code>net 192.168.1.0/24</code></td></tr><tr><td>A port</td><td><code>port 53</code></td></tr><tr><td>Directional port</td><td><code>tcp dst port 80</code></td></tr><tr><td>A MAC</td><td><code>ether src 00:11:22:33:44:55</code></td></tr><tr><td>Negation</td><td><code>not port 22</code></td></tr></table>"]]}, {"id": "d4", "weight": "5%", "title": "Domain 4 — Interface, Profiles & Customization", "intro": "Customizing Wireshark speeds up analysis. This small but practical domain covers the GUI, profiles, columns, and coloring.", "sections": [["The GUI & layout", "<p>The default three panes are the <b>packet list</b> (top), <b>packet details</b> (dissection tree, middle), and <b>packet bytes</b> (hex/ASCII, bottom). Layout preferences let you rearrange/hide panes and enable extras like the <b>packet diagram</b>.</p>"], ["Profiles", "<p>A <b>profile</b> bundles columns, coloring rules, display filters, filter buttons, and preferences for a scenario (e.g., 'TCP troubleshooting', 'VoIP', 'Security'). Switch via the profile name in the bottom-right status bar; manage via Edit &gt; Configuration Profiles. <b>Copy</b> an existing profile to start a new one quickly.</p>"], ["Columns", "<p>Custom columns surface a key field across many packets for fast scanning—e.g., <code>tcp.window_size</code>, <code>tcp.analysis.ack_rtt</code>, <code>dns.qry.name</code>, <code>ip.ttl</code>. Add via right-click → <b>Apply as Column</b>, or Preferences &gt; Columns.</p>"], ["Coloring & navigation", "<ul><li><b>Coloring rules</b> colorize the packet list by filter conditions, evaluated top-down (first match wins). Display-only.</li><li><b>Colorize Conversation</b> temporarily highlights one conversation.</li><li>The <b>minimap</b> (intelligent scrollbar) shows packet colors across the whole file so you can jump to clusters.</li><li><b>Mark/unmark</b> packets to navigate and export sets.</li></ul>"], ["Protocol preferences", "<p>Per-protocol preferences change dissection—e.g., TCP reassembly, checksum validation, or treating a port as a given protocol. They directly affect what you see, so understanding them is part of accurate analysis.</p>"]]}, {"id": "d5", "weight": "43% (TCP 17% scored separately, non-TCP 27%)", "title": "Domain 5 — Common Network Protocols", "intro": "The largest domain. You must identify header fields, common values, and the purpose of each protocol Wireshark dissects.", "sections": [["5.1 Ethernet", "<p>Ethernet II frame order: <b>Dest MAC (6) → Src MAC (6) → EtherType (2) → Payload → FCS (4)</b>.</p><ul><li><b>Frame sizes</b>: minimum 64 bytes (payloads under 46 are padded), standard maximum 1518 (1500-byte payload/MTU); 9000+ is jumbo.</li><li><b>FCS</b> is usually <b>absent in Wireshark</b> because NIC drivers strip it before capture.</li><li><b>EtherTypes</b>: <code>0x0800</code> IPv4, <code>0x0806</code> ARP, <code>0x86DD</code> IPv6, <code>0x8100</code> 802.1Q VLAN tag.</li><li><b>MAC address types</b>: broadcast <code>FF:FF:FF:FF:FF:FF</code>; multicast = I/G bit (low bit of first octet) set (e.g., <code>01:00:5E…</code>); unicast otherwise.</li><li><b>802.1Q VLAN tag</b>: a 4-byte tag (TPID <code>0x8100</code> + TCI with PCP/DEI/VID) inserted <i>after</i> the source MAC and before the EtherType. The 12-bit VID gives 4096 values; 0 and 4095 reserved → 1–4094 usable.</li></ul>"], ["5.2 ARP", "<p>ARP maps a known <b>IPv4 address → MAC</b> on the local link.</p><ul><li><b>Request</b> (opcode 1) is <b>broadcast</b> ('who has X?'); <b>reply</b> (opcode 2) is <b>unicast</b> ('X is at MAC').</li><li><b>Gratuitous ARP</b>: a host announces its own IP/MAC (often sender IP = target IP) for duplicate-address detection and to update neighbors' caches.</li><li>Filters: <code>arp.opcode==1</code> (requests), <code>arp.opcode==2</code> (replies).</li><li>ARP sweeps across sequential IPs suggest scanning; unanswered requests suggest the target is down or off-segment.</li></ul>"], ["5.3 IPv4", "<ul><li><b>TTL</b>: decremented per hop; at 0 the packet is dropped (ICMP Time Exceeded). Common initial values: 64 (Linux/macOS), 128 (Windows), 255 (network gear). <b>Hop distance ≈ initial − observed.</b></li><li><b>Fragmentation</b> uses <b>Identification</b> (shared by fragments), <b>More Fragments</b> flag, and <b>Fragment Offset</b>.</li><li><b>Protocol field</b>: 1 ICMP, 6 TCP, 17 UDP, 47 GRE, etc.</li><li><b>Address ranges</b>: private (RFC 1918) 10/8, 172.16/12, 192.168/16; APIPA/link-local 169.254/16; loopback 127/8; multicast 224/4.</li><li><b>NAT</b> rewrites addresses/ports, so the same flow looks different on each side—account for it when correlating multi-point captures.</li><li><b>IP ID</b> helps correlate fragments, detect duplicates, and fingerprint ID-generation strategies.</li></ul>"], ["5.4 ICMPv4", "<table><tr><th>Type</th><th>Meaning</th></tr><tr><td>0 / 8</td><td>Echo Reply / Echo Request (ping)</td></tr><tr><td>3</td><td>Destination Unreachable (Code: 0 net, 1 host, 3 port, 4 frag-needed+DF)</td></tr><tr><td>5</td><td>Redirect (use a better gateway)</td></tr><tr><td>11</td><td>Time Exceeded (TTL=0; traceroute)</td></tr></table><p>ICMP error messages embed the <b>original IP header + first 8 bytes</b>, so Wireshark can link an error to the packet that triggered it. Type 3 Code 4 drives <b>Path MTU Discovery</b>; blocking it causes black holes.</p>"], ["5.5 IPv6 addressing", "<ul><li><b>Link-local</b> <code>FE80::/10</code> (auto-configured per interface).</li><li><b>Global unicast</b> currently from <code>2000::/3</code> (docs use <code>2001:db8::/32</code>).</li><li><b>Multicast</b> <code>FF00::/8</code> (e.g., <code>FF02::1</code> all-nodes, <code>FF02::2</code> all-routers).</li><li><b>Unique local (ULA)</b> <code>FC00::/7</code> (commonly <code>FD00::/8</code>); <b>loopback</b> <code>::1</code>; <b>unspecified</b> <code>::</code>.</li></ul>"], ["5.6 ICMPv6 / Neighbor Discovery", "<p>ND replaces ARP and more, using ICMPv6:</p><table><tr><th>Type</th><th>Message</th><th>Role</th></tr><tr><td>133</td><td>Router Solicitation</td><td>Host prompts routers</td></tr><tr><td>134</td><td>Router Advertisement</td><td>Routers advertise prefixes/MTU (SLAAC)</td></tr><tr><td>135</td><td>Neighbor Solicitation</td><td>Resolve a neighbor's MAC (ARP's job); also DAD</td></tr><tr><td>136</td><td>Neighbor Advertisement</td><td>Answer that you own an address</td></tr></table><p>NS targets a <b>solicited-node multicast</b> (<code>FF02::1:FFxx:xxxx</code>). <b>DAD</b> sends an NS sourced from <code>::</code> for a tentative address.</p>"], ["5.7 UDP", "<ul><li>Connectionless: 8-byte header (src port, dst port, length, checksum). No handshake, ACKs, retransmission, or ordering—left to the app.</li><li>Used by DNS, DHCP, TFTP, SNMP, NTP, RTP; ideal for <b>multicast/broadcast</b> (one-to-many) since TCP is point-to-point.</li><li>Wireshark assigns <code>udp.stream</code> and tracks conversation timestamps (time since first/previous packet).</li></ul>"], ["5.8 DHCPv4", "<p><b>DORA</b>: Discover → Offer → Request → Acknowledge.</p><ul><li>Discover is sourced from <code>0.0.0.0</code> and broadcast to <code>255.255.255.255</code>.</li><li>A <b>Request</b> also serves renewal (T1, unicast), rebinding (T2, broadcast), and INIT-REBOOT verification.</li><li><b>Options</b>: 1 Subnet Mask, 3 Router, 6 DNS, 51 Lease Time, 53 Message Type, 54 Server ID, 55 Parameter Request List.</li><li><b>APIPA</b> (169.254/16) is self-assigned when DHCP fails—Discovers without Offers point to a server/scope/relay problem.</li></ul>"], ["5.9 DNS", "<ul><li>Filters: <code>dns.flags.response==0</code> (query), <code>==1</code> (response).</li><li><b>Record types</b>: A (IPv4), AAAA (IPv6), CNAME (alias), MX (mail), NS (name server), PTR (reverse), SOA, TXT, SRV.</li><li><b>Rcodes</b>: 0 no-error, 2 servfail, 3 NXDOMAIN, 5 refused. The <b>TC</b> flag (truncated) makes resolvers retry over TCP.</li><li>Correlate name→IP answers with later flows to attribute anonymous IP conversations. Random unique subdomains at a steady rate suggest tunneling/DGA.</li></ul>"], ["5.10 TCP (17%, scored separately)", "<ul><li><b>Three-way handshake</b>: SYN → SYN/ACK → ACK. <b>iRTT</b> is measured from SYN to SYN/ACK.</li><li><b>Teardown</b>: graceful uses FIN handshakes acknowledged in each direction; <b>RST</b> is an abrupt abort/refusal.</li><li><b>MSS</b> = max payload per segment, excluding headers (1500 MTU − 20 IP − 20 TCP = 1460; ~1448 with timestamps).</li><li><b>Sequence/ACK numbers</b> number bytes; the ACK number is the next expected byte (cumulative). Wireshark shows <b>relative</b> numbers by default (SYN seq shown as 0).</li><li><b>Options</b>: MSS, Window Scale (shift multiplier; 2^shift), SACK-Permitted/SACK, Timestamps, NOP (4-byte padding), EOL (end of list).</li><li><b>Duplicate ACKs</b> signal a gap; <b>3 DUP ACKs</b> trigger fast retransmit. With <b>SACK</b>, the missing range is between the cumulative ACK number and the SACK left edge.</li><li><b>Window scaling</b> exists because the 16-bit window (max 65,535) is too small for high bandwidth-delay paths.</li><li><b>Zero Window</b>: receiver's buffer is full; sender pauses until a Window Update.</li><li><b>Reassembly</b> stitches segments so an upper-layer PDU (e.g., HTTP body) is dissected as one unit.</li><li><b>Stream graphs</b>: the Stevens time-sequence graph plots sequence number over time (steep slope = throughput; plateaus = stalls).</li><li><code>tcp.stream</code> uniquely numbers each conversation; conversation timestamps give time-relative and time-delta.</li></ul>"]]}, {"id": "d6", "weight": "20%", "title": "Domain 6 — Troubleshooting with Wireshark", "intro": "This domain ties everything together: read a capture and reason about the root cause. Expect scenario questions.", "sections": [["Reading topology from a capture", "<p>Combine <b>Layer 2</b> (which MACs answer ARP; the router/next-hop MAC), <b>Layer 3</b> (subnets, gateways, NAT), and <b>TTL</b> (hop distance) plus visible broadcast/ARP/DHCP traffic to infer where the capture sits and the surrounding topology.</p>"], ["Server vs network slowness", "<p>In HTTP, a long gap between the <b>request and the first response byte</b> is <b>server think-time</b>. Loss, retransmissions, high RTT, or paced ACKs across the transfer indicate <b>network</b> problems. The TCP time-sequence and I/O graphs make this visible: steady slope = app/server limited; stalls/retransmissions = network/receiver limited.</p>"], ["RTT, window size, and throughput", "<ul><li><b>High RTT</b> hurts <b>chatty request/response</b> protocols (HTTP, SMB, SQL) most—each round trip costs at least one RTT.</li><li><b>Throughput ≈ window / RTT</b> (bandwidth-delay product). A small window on a high-RTT path caps speed regardless of link bandwidth; <b>window scaling</b> fixes it.</li><li>A receiver whose window collapses toward zero is <b>application-bottlenecked</b>—flow control is correctly pacing the sender.</li></ul>"], ["Loss, retransmissions & duplicates", "<ul><li><b>Retransmissions + DUP ACKs</b> = packet loss. Capture at <b>multiple points</b> to localize the lossy hop.</li><li><b>[TCP ACKed unseen segment]</b> with sequence gaps while the hosts work fine usually means <b>your capture</b> missed packets, not a real fault.</li><li>A retransmitted <b>SYN with no SYN/ACK or RST</b> suggests a firewall silently dropping it or an unreachable host (a closed port would send RST).</li><li>A <b>mid-stream RST</b> is an abrupt app/device abort, not a graceful close.</li></ul>"], ["ARP, DHCP & ICMP signals", "<ul><li><b>APIPA + unanswered DHCP Discovers</b> = no reachable DHCP server/relay.</li><li><b>Unanswered ARP</b> for a host/gateway = target down or off-segment (breaks connectivity).</li><li><b>ICMP port unreachable</b> (Type 3 Code 3) = no UDP listener; <b>frag-needed+DF</b> (Type 3 Code 4) = PMTUD event—if blocked, large packets silently vanish.</li><li>Multiple foundational services failing together points <b>below the application layer</b> (VLAN/cabling/relay).</li></ul>"], ["A practical method", "<ol><li>Characterize the capture (Protocol Hierarchy, Capture File Properties, top Conversations by bytes).</li><li>Isolate the flow of interest (Follow Stream / <code>tcp.stream</code>).</li><li>Check the handshake (iRTT, MSS, options) and look for expert flags (retransmissions, DUP ACKs, zero windows).</li><li>Use time-sequence and I/O graphs to separate app/server delay from network loss/latency.</li><li>Correlate ARP/DHCP/ICMP and, if needed, capture at a second point.</li></ol>"]]}];
const FACTS = {"Exam number": "WCA-101", "Questions": "50–60", "Question types": "Multiple choice/selection, matching, fill-in-the-blank", "Time": "120 minutes", "Delivery": "Kryterion / Webassessor (test center or online proctored)", "Retake policy": "One attempt every 15 days", "Validity": "3 years", "Authors": "Chris Greer & Ross Bagurdes, with Wireshark Foundation/Packet Pros"};
const WEIGHTS = [["Key Wireshark features", 10], ["Capturing traffic", 10], ["Capture & display filters", 12], ["Interface & customization", 5], ["Common network protocols", 43], ["Troubleshooting", 20]];
const BLUEPRINT = {"Wireshark Features": 10, "Capturing Traffic": 10, "Filtering": 12, "Interface": 5, "Ethernet": 4.5, "ARP": 3, "IPv4": 5.5, "ICMPv4": 2.5, "IPv6": 2, "ICMPv6": 2, "UDP": 2.5, "DHCPv4": 3, "DNS": 3, "TCP": 17, "Troubleshooting": 20};
const PASS_MARK = 0.80;
const EXAM_N = 60;
const EXAM_SECONDS = 120 * 60;

/* ---------- persistence (localStorage with in-memory fallback) ---------- */
const KEY = "wca101_state_v1";
let mem = null;
const persist = {
  read(){
    try { const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); } catch(e){}
    return mem;
  },
  write(obj){
    mem = obj;
    try { localStorage.setItem(KEY, JSON.stringify(obj)); } catch(e){}
  }
};
const DEFAULT_STATE = { perDomain:{}, attempts:[], seen:{}, missed:{} };
let STATE = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), persist.read() || {});
function saveState(){ persist.write(STATE); }

/* ---------- data indexing ---------- */
const DOMAINS = ["Wireshark Features","Capturing Traffic","Filtering","Interface","Ethernet","ARP","IPv4","ICMPv4","IPv6","ICMPv6","UDP","DHCPv4","DNS","TCP","Troubleshooting"];
const byDomain = {};
DOMAINS.forEach(d => byDomain[d] = []);
BANK.forEach(q => { (byDomain[q.domain] = byDomain[q.domain] || []).push(q); });
const byId = {};
BANK.forEach(q => byId[q.id] = q);

/* ---------- helpers ---------- */
const view = document.getElementById("view");
function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function shuffle(a){ a = a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pct(n){ return Math.round(n*100); }
function fmtTime(s){ const m=Math.floor(s/60), ss=s%60; return m+":"+String(ss).padStart(2,"0"); }
let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1600); }
(function stripe(){ const s=document.getElementById("stripe"); const pat=['','a','','b','c','','a','','','b','','c','a','','b','','c','']; s.innerHTML=pat.map(c=>`<i class="${c}"></i>`).join(''); })();

function recordAnswer(q, correct){
  STATE.seen[q.id] = 1;
  const d = STATE.perDomain[q.domain] || (STATE.perDomain[q.domain] = {correct:0,total:0});
  d.total++; if(correct){ d.correct++; delete STATE.missed[q.id]; } else { STATE.missed[q.id]=1; }
  saveState();
}

/* ---------- routing ---------- */
let current="home";
let studyDomain=null;
document.querySelectorAll("nav button").forEach(b=>{
  b.onclick = ()=>setTab(b.dataset.tab);
});
function setTab(t){
  current=t; studyDomain=null;
  document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("active", x.dataset.tab===t));
  ({home:renderHome, study:renderStudy, practice:renderPracticeMenu, exam:renderExamMenu, stats:renderStats}[t])();
  window.scrollTo(0,0);
}
function setNavVisible(v){ document.querySelector("nav").style.display = v ? "flex" : "none"; }

/* ---------- HOME ---------- */
function totalSeen(){ return Object.keys(STATE.seen).length; }
function overallAccuracy(){
  let c=0,t=0; Object.values(STATE.perDomain).forEach(d=>{c+=d.correct;t+=d.total;});
  return t ? c/t : 0;
}
function renderHome(){
  setNavVisible(true);
  const seen=totalSeen(), acc=overallAccuracy();
  const missedN=Object.keys(STATE.missed).length;
  view.innerHTML = `
   <div class="hero">
     <div class="grid"></div>
     <div class="eyebrow">Official blueprint • ${BANK.length}-question bank</div>
     <h2>Master packet analysis.</h2>
     <p>A complete study guide and practice system mapped to the six official WCA-101 domains, with timed exam simulation and per-domain progress.</p>
     <div class="stat-row">
       <div class="stat"><div class="n">${BANK.length}</div><div class="l">Questions</div></div>
       <div class="stat"><div class="n">${seen}</div><div class="l">Seen</div></div>
       <div class="stat"><div class="n">${seen?pct(acc)+'%':'—'}</div><div class="l">Accuracy</div></div>
     </div>
   </div>
   <div class="actions">
     <button class="act primary full" onclick="startExam()"><div class="ic">[#]</div><div class="t">Start Exam Simulation</div><div class="d">${EXAM_N} questions • 120-min timer • weighted to the real blueprint</div></button>
     <button class="act" onclick="setTab('study')"><div class="ic">≡</div><div class="t">Study Guide</div><div class="d">6 domains, fully explained</div></button>
     <button class="act" onclick="setTab('practice')"><div class="ic">◎</div><div class="t">Practice</div><div class="d">By domain, with feedback</div></button>
     <button class="act" onclick="quickPractice(15)"><div class="ic">⚡</div><div class="t">Quick 15</div><div class="d">Random mixed set</div></button>
     <button class="act" onclick="reviewMissed()"><div class="ic">↺</div><div class="t">Review Missed</div><div class="d">${missedN} to revisit</div></button>
   </div>
   <div class="card">
     <div class="eyebrow">Exam at a glance</div>
     ${Object.entries(FACTS).map(([k,v])=>`<div class="kfact"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`).join('')}
   </div>
   <p class="note">Pass mark in this app is set to ${pct(PASS_MARK)}% as a study target. Confirm the current official passing score when you register.</p>
  `;
}
