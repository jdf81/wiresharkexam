kely explanation?","choices":["a VLAN tagging error","a DNS misconfiguration","normal setup","packet loss in the path triggering retransmissions"],"answer":3,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":652},{"domain":"Wireshark Features","q":"To see a percentage breakdown of all protocols present, which Wireshark feature do you use?","choices":["Statistics > Protocol Hierarchy","Follow TCP Stream","Capture File Properties","Conversations"],"answer":0,"explain":"Correct: Statistics > Protocol Hierarchy.","id":653},{"domain":"TCP","q":"MSS represents:","choices":["the window size","the largest TCP payload per segment (excluding headers)","the total frame size","the MTU including FCS"],"answer":1,"explain":"MSS is payload-only; on Ethernet typically 1460.","id":654},{"domain":"DHCPv4","q":"APIPA (169.254.0.0/16) relates to DHCP in what way?","choices":["It is the DHCP server's address","It is required for DORA","A client that cannot reach a DHCP server falls back to self-assigning an APIPA/link-local address","It carries DHCP options"],"answer":2,"explain":"When DHCP fails, many OSes auto-assign a 169.254.x.x address (APIPA). Seeing APIPA plus repeated DHCP Discovers without Offers points to a DHCP reachability problem (e.g., missing relay/scope).","id":655},{"domain":"TCP","q":"In a capture: a connection to 192.168.7.77:3306 (MySQL) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["an ARP failure","the window scaled to zero","the connection reset","fast retransmit recovered a lost segment"],"answer":3,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":656},{"domain":"Filtering","q":"Which display filter isolates POP3 traffic by its well-known TCP port?","choices":["tcp.port == 110","tcp.port == 3306","tcp.port == 389","tcp.port == 123"],"answer":0,"explain":"POP3 uses TCP port 110.","id":657},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.10.0.1 to 10.10.0.150 on 514 (syslog) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","packet loss in the path triggering retransmissions","a VLAN tagging error","a DNS misconfiguration"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":658},{"domain":"Filtering","q":"Which display filter would you use to match only traffic sourced from 192.168.50.77?","choices":["ip.dst == 192.168.50.77","ip.addr == 192.168.50.77","ip.src == 192.168.50.77","eth.src == 192.168.50.77"],"answer":2,"explain":"Correct display filter: ip.src == 192.168.50.77 (ip.addr is bidirectional; ip.src/ip.dst are directional).","id":659},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.20.0.33:80 (HTTP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["DNS failing","an ARP loop","the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)"],"answer":3,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":660},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show only ARP traffic?","choices":["arp","tls.handshake","tcp.port == 443","ip.src == 10.1.1.1"],"answer":0,"explain":"Correct display filter: arp","id":661},{"domain":"IPv6","q":"FF00::/8 addresses are:","choices":["global unicast","multicast","link-local","unique local"],"answer":1,"explain":"All IPv6 multicast starts with FF (FF00::/8).","id":662},{"domain":"Troubleshooting","q":"In a capture: host 192.168.100.50 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","an MTU mismatch","the DHCP server/relay is unreachable on that segment","a TCP window bug"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":663},{"domain":"TCP","q":"A SYN to a closed port elicits:","choices":["a SYN/ACK","a FIN","silence","a RST (usually RST/ACK)"],"answer":3,"explain":"Closed ports respond with RST; open listening ports send SYN/ACK.","id":664},{"domain":"Interface","q":"You want to see which web hosts are being contacted. Which column field is most useful?","choices":["http.host","tcp.window_size","tcp.stream","ip.ttl"],"answer":0,"explain":"A column for http.host surfaces that field across packets for fast scanning.","id":665},{"domain":"UDP","q":"Wireshark assigns a 'stream index' to UDP conversations so that you can:","choices":["Reassemble a guaranteed byte stream","Follow and filter a specific UDP conversation (udp.stream eq N), similar to TCP streams","Acknowledge datagrams","Detect retransmissions automatically"],"answer":1,"explain":"Although UDP has no real 'stream', Wireshark groups packets of the same 5-tuple and assigns udp.stream so you can Follow UDP Stream and filter that conversation. Conversation timestamps track time since first/previous frame.","id":666},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show packets flagged as TCP retransmissions?","choices":["tls.handshake","ip.addr == 10.1.1.1","tcp.analysis.retransmission","http"],"answer":2,"explain":"Correct display filter: tcp.analysis.retransmission","id":667},{"domain":"Wireshark Features","q":"Which keyboard shortcut opens Find Packet?","choices":["Ctrl+G","Ctrl+T","Ctrl+M","Ctrl+F"],"answer":3,"explain":"Ctrl+F opens Find Packet; Ctrl+M marks, Ctrl+T sets a time reference, Ctrl+G goes to a packet number.","id":668},{"domain":"Wireshark Features","q":"Which feature lets you save a chosen subset of packets to a new file?","choices":["Export Specified Packets","Decode As","Export Objects","Find Packet"],"answer":0,"explain":"Export Specified Packets writes displayed, marked, or a range of packets to a new capture file.","id":669},{"domain":"TCP","q":"tcp.time_relative measures:","choices":["RTT between hosts","elapsed time since the conversation's first frame","TTL decrement","window scale"],"answer":1,"explain":"tcp.time_delta is the gap from the previous frame in the stream.","id":670},{"domain":"UDP","q":"Wireshark's udp.stream lets you:","choices":["detect retransmissions","acknowledge datagrams","follow/filter a specific UDP conversation","reassemble a guaranteed byte stream"],"answer":2,"explain":"Wireshark groups UDP by 5-tuple and assigns udp.stream for Follow UDP Stream.","id":671},{"domain":"TCP","q":"With MTU 1280, a 40-byte IP header, and a 20-byte TCP header (IPv6 minimum MTU 1280), what is the TCP MSS?","choices":["1280","1240","1228","1220"],"answer":3,"explain":"MSS = 1280 - 40 - 20 = 1220 bytes (payload only).","id":672},{"domain":"Wireshark Features","q":"You want a quick tree of every protocol present in a capture with percentages. Which tool?","choices":["Statistics > Protocol Hierarchy","Statistics > Conversations","Capture File Properties","Follow TCP Stream"],"answer":0,"explain":"Protocol Hierarchy shows a hierarchical breakdown of all dissected protocols with packet/byte counts and percentages.","id":673},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.20.0.77 for the gateway 10.20.0.1 get no reply. What is the most likely explanation?","choices":["a TCP reset storm","the gateway is down or unreachable on that Layer-2 segment","an oversized window","a DNS outage"],"answer":1,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":674},{"domain":"Interface","q":"What is the fastest way to create a packet-list column for a field?","choices":["edit the pcapng header","use a capture filter","right-click the field and choose Apply as Column","set a time reference"],"answer":2,"explain":"'Apply as Column' instantly adds a column for the selected field.","id":675},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture only the 192.168.1.0/24 subnet?","choices":["icmp","udp","not port 22","net 192.168.1.0/24"],"answer":3,"explain":"Correct capture filter: net 192.168.1.0/24 (BPF syntax).","id":676},{"domain":"DHCPv4","q":"A DHCP Discover message is sent with what IP source/destination?","choices":["Source = 0.0.0.0, destination = 255.255.255.255 (broadcast)","Source = leased IP, destination = server IP","Source = gateway, destination = client","Source = APIPA, destination = multicast"],"answer":0,"explain":"The client has no address yet, so DHCP Discover is sourced from 0.0.0.0 and broadcast to 255.255.255.255 so any DHCP server on the segment can respond.","id":677},{"domain":"IPv4","q":"A packet arrives with TTL=51. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["18","13","15","14"],"answer":1,"explain":"64 - 51 = 13 hops.","id":678},{"domain":"TCP","q":"In a capture: a connection to 10.1.1.25:67 (DHCP server) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the window scaled to zero","an ARP failure","fast retransmit recovered a lost segment","the connection reset"],"answer":2,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":679},{"domain":"UDP","q":"The UDP header length is:","choices":["12 bytes","20 bytes","4 bytes","8 bytes"],"answer":3,"explain":"UDP header = src port, dst port, length, checksum = 8 bytes.","id":680},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.1.50 for the gateway 192.168.1.1 get no reply. What is the most likely explanation?","choices":["the gateway is down or unreachable on that Layer-2 segment","a TCP reset storm","a DNS outage","an oversized window"],"answer":0,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":681},{"domain":"Ethernet","q":"Which protocol does the Ethernet EtherType value 0x0806 indicate?","choices":["RARP","ARP","LLDP","IPv4"],"answer":1,"explain":"EtherType 0x0806 identifies ARP.","id":682},{"domain":"DNS","q":"Which display filter shows only DNS responses (not queries)?","choices":["dns.flags.response == 0","dns.qry.type == 1","dns.flags.response == 1","dns"],"answer":2,"explain":"dns.flags.response == 1 indicates a response; 0 indicates a query. So dns.flags.response == 1 isolates replies.","id":683},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.10.0.150:993 (IMAPS) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","DNS failing","an ARP loop","the receiver is the bottleneck (zero windows stall the sender)"],"answer":3,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":684},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 172.16.5.33:389 (LDAP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","the server can't generate data","an ARP loop","DNS failing"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":685},{"domain":"Capturing Traffic","q":"Recorded 'dropped packets' in a capture most likely means what?","choices":["the display filter was wrong","the capture host couldn't keep up with the traffic rate","names were resolved","the file is corrupt"],"answer":1,"explain":"Drops indicate the engine/OS fell behind; use dumpcap, smaller snaplen, or a TAP/aggregator.","id":686},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 172.16.5.1 to 172.16.5.200 on 25 (SMTP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","normal setup","packet loss in the path triggering retransmissions","a VLAN tagging error"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":687},{"domain":"Wireshark Features","q":"Traffic runs HTTP on nonstandard TCP port 8000 and Wireshark shows it as raw TCP. What do you use?","choices":["a time reference","a coloring rule","Export Specified Packets","Decode As, mapping TCP port 8000 to the HTTP dissector"],"answer":3,"explain":"Decode As forces a chosen dissector on traffic Wireshark would not otherwise recognize on that port.","id":688},{"domain":"DNS","q":"A DNS response with rcode 5 means what?","choices":["Refused","Server failure","Not implemented","No error"],"answer":0,"explain":"DNS rcode 5 = Refused.","id":689},{"domain":"Troubleshooting","q":"Which is the best first step to localize where packet loss occurs on a path?","choices":["Change coloring rules","Capture simultaneously at two points (e.g., each side of a suspect device) and compare which packets are present/absent","Disable name resolution","Increase the snaplen"],"answer":1,"explain":"Multi-point capture lets you see whether a packet present at point A is missing at point B, pinpointing the lossy hop/device — far more conclusive than a single-point capture.","id":690},{"domain":"ICMPv4","q":"Traceroute relies on which ICMP message?","choices":["Timestamp (Type 13)","Echo Reply (Type 0)","Time Exceeded (Type 11)","Redirect (Type 5)"],"answer":2,"explain":"Routers send Time Exceeded when TTL hits 0, revealing each hop.","id":691},{"domain":"Capturing Traffic","q":"Capture File Properties reports dropped packets during your capture. What is the most likely cause?","choices":["name resolution was on","the display filter was wrong","the pcapng file is corrupt","the capture host/OS could not keep up with the traffic rate"],"answer":3,"explain":"Recorded drops mean the capture engine/OS fell behind; remedies include dumpcap, smaller snaplen, or a hardware TAP/aggregator.","id":692},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.50.100:3306 (MySQL) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","DNS failing","the server can't generate data","an ARP loop"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":693},{"domain":"Wireshark Features","q":"Which capability would you use to plot throughput over time for a filtered subset?","choices":["Decode As","Statistics > I/O Graph","Resolved Addresses","Protocol Hierarchy"],"answer":1,"explain":"Correct: Statistics > I/O Graph.","id":694},{"domain":"Wireshark Features","q":"To reconstruct and save a file transferred over HTTP, which Wireshark feature do you use?","choices":["Follow UDP Stream","Statistics > Endpoints","File > Export Objects > HTTP","Capture Options"],"answer":2,"explain":"Correct: File > Export Objects > HTTP.","id":695},{"domain":"TCP","q":"In a capture: the handshake to 172.20.3.150:110 (POP3) succeeds, then 172.20.3.150 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","the gateway ARP is missing","DNS is failing","the receiver {h} is application-bottlenecked (full buffer)"],"answer":3,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":696},{"domain":"Filtering","q":"The filter 'frame contains \"GET\"' does what?","choices":["Matches frames whose raw bytes contain the ASCII sequence GET","Matches frames where any field equals GET","Is invalid","Matches only HTTP GET in the URI field"],"answer":0,"explain":"'contains' performs a byte-sequence search within the specified protocol/field; 'frame contains \"GET\"' looks for those bytes anywhere in the frame.","id":697},{"domain":"Troubleshooting","q":"In a capture: host 172.20.3.77 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["a TCP window bug","the DHCP server/relay is unreachable on that segment","an MTU mismatch","high path latency"],"answer":1,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":698},{"domain":"TCP","q":"In a capture: the handshake to 10.1.1.77:69 (TFTP) succeeds, then 10.1.1.77 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","DNS is failing","the receiver {h} is application-bottlenecked (full buffer)","the gateway ARP is missing"],"answer":2,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":699},{"domain":"Interface","q":"Coloring rules are evaluated how?","choices":["bottom-up","randomly","alphabetically","top-down; the first matching rule wins"],"answer":3,"explain":"Coloring rules are checked in order; the first match determines the color.","id":700},{"domain":"IPv4","q":"A packet arrives with TTL=44. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["20","15","18","25"],"answer":0,"explain":"64 - 44 = 20 hops.","id":701},{"domain":"UDP","q":"UDP port 514 is most commonly used by which protocol/service?","choices":["mDNS","syslog","IKE/IPsec","IPsec NAT-T"],"answer":1,"explain":"syslog is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":702},{"domain":"TCP","q":"In a capture: the handshake to 172.16.9.100:161 (SNMP) succeeds, then 172.16.9.100 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the gateway ARP is missing","the link is saturated","the receiver {h} is application-bottlenecked (full buffer)","DNS is failing"],"answer":2,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":703},{"domain":"TCP","q":"In a capture: a connection to 10.10.0.100:123 (NTP) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the window scaled to zero","the connection reset","an ARP failure","fast retransmit recovered a lost segment"],"answer":3,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":704},{"domain":"TCP","q":"A TCP Window Scale option with shift count 11 multiplies the window by what factor?","choices":["2048","11","4096","1024"],"answer":0,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^11 = 2048. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":705},{"domain":"DHCPv4","q":"DHCP Option 3 and Option 6 provide which parameters, respectively?","choices":["Lease time and subnet mask","Default gateway (router) and DNS server(s)","Hostname and domain","NTP server and TFTP server"],"answer":1,"explain":"Option 3 supplies the router/default gateway list; Option 6 supplies DNS server addresses. These are among the most common options a client requests.","id":706},{"domain":"Wireshark Features","q":"Which dialog lists the name/address mappings Wireshark resolved?","choices":["Endpoints","Conversations","Resolved Addresses","Coloring Rules"],"answer":2,"explain":"Resolved Addresses lists resolved name/address pairs and can export them to a hosts file.","id":707},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.7.1 to 192.168.7.25 on 21 (FTP control) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","normal setup","a VLAN tagging error","packet loss in the path triggering retransmissions"],"answer":3,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":708},{"domain":"IPv4","q":"A packet arrives with TTL=50. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["14","9","15","13"],"answer":0,"explain":"64 - 50 = 14 hops.","id":709},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.7.150 for the gateway 192.168.7.1 get no reply. What is the most likely explanation?","choices":["an oversized window","the gateway is down or unreachable on that Layer-2 segment","a TCP reset storm","a DNS outage"],"answer":1,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":710},{"domain":"TCP","q":"What is the purpose of the TCP 'Timestamps' option (kind 8)?","choices":["apply a shift multiplier to the 16-bit window","report received non-contiguous byte ranges","carry timestamps for RTT measurement and PAWS","negotiate use of selective acknowledgments"],"answer":2,"explain":"Timestamps (kind 8) is used to carry timestamps for RTT measurement and PAWS.","id":711},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.10.0.77 for the gateway 10.10.0.1 get no reply. What is the most likely explanation?","choices":["an oversized window","a DNS outage","a TCP reset storm","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":712},{"domain":"Troubleshooting","q":"In a capture you observe: a UDP datagram to a service returns an ICMP Type 3 Code 3 message. What is the most likely explanation?","choices":["no application is listening on that UDP port (port unreachable)","the service is healthy","TTL expired in transit","the packet was fragmented"],"answer":0,"explain":"ICMP port unreachable confirms the host received the datagram but had no listener on that port.","id":713},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.10.0.10:67 (DHCP server) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)","DNS failing","an ARP loop"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":714},{"domain":"Filtering","q":"What does '(tcp.port == 80) and not (ip.addr == 10.0.0.1)' display?","choices":["All port-80 traffic including host 10.0.0.1","Only traffic to 10.0.0.1 on port 80","Port-80 traffic, excluding any packet that involves 10.0.0.1 in either IP field","Nothing, it's invalid"],"answer":2,"explain":"The parentheses make 'not (ip.addr==10.0.0.1)' exclude packets where either IP field is that host, intersected with port-80 traffic. This avoids the implicit-any pitfall.","id":715},{"domain":"TCP","q":"In a capture: the handshake to 192.168.50.100:69 (TFTP) succeeds, then 192.168.50.100 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the gateway ARP is missing","DNS is failing","the link is saturated","the receiver {h} is application-bottlenecked (full buffer)"],"answer":3,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":716},{"domain":"Wireshark Features","q":"Which name resolution type maps the first three bytes of a MAC address to a vendor name?","choices":["MAC (Ethernet) name resolution via the OUI/manufacturer database","Transport name resolution","Network (IP) name resolution","DNS PTR resolution"],"answer":0,"explain":"MAC name resolution uses the OUI (first 3 bytes / 24 bits) and the manufacturers database to display a vendor prefix such as 'Cisco_' or 'AppleInc_' in place of those bytes.","id":717},{"domain":"Wireshark Features","q":"Which Wireshark feature lets you find the heaviest host pairs by bytes?","choices":["Decode As","Statistics > Conversations sorted by bytes","Protocol Hierarchy","Find Packet"],"answer":1,"explain":"Correct: Statistics > Conversations sorted by bytes.","id":718},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only TFTP traffic by port?","choices":["dst port 69 only","tcp.port == 69","port 69","portrange 69"],"answer":2,"explain":"Correct capture filter: port 69 (BPF syntax).","id":719},{"domain":"Troubleshooting","q":"In a capture: host 10.1.1.50 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","a TCP window bug","an MTU mismatch","the DHCP server/relay is unreachable on that segment"],"answer":3,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":720},{"domain":"TCP","q":"In Wireshark, iRTT (initial round-trip time) is measured between which two packets?","choices":["The SYN and the SYN/ACK (the time for the handshake's first round trip)","The first and last data packets","Two consecutive ACKs","The FIN and FIN/ACK"],"answer":0,"explain":"Wireshark computes iRTT from the time between the SYN and its SYN-ACK (sometimes through the final ACK), giving a baseline path RTT recorded as [iRTT] on the handshake and reused for later analysis.","id":721},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 2000 usable?","choices":["outside the 12-bit range","a valid, usable VLAN ID (1-4094)","an invalid value (>65535)","reserved (not a normal usable VLAN ID)"],"answer":1,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 2000 is usable.","id":722},{"domain":"TCP","q":"iRTT is measured between:","choices":["the FIN and FIN/ACK","two consecutive ACKs","the SYN and the SYN/ACK","the first and last data packets"],"answer":2,"explain":"Wireshark computes iRTT from the handshake's first round trip.","id":723},{"domain":"Wireshark Features","q":"Capture File Properties (Statistics menu) is the best place to quickly find which of the following?","choices":["The exact application payload of packet 1","The TCP window scale factor","The coloring rules in use","Capture duration, number of packets, average packets/sec, and any capture comments"],"answer":3,"explain":"Capture File Properties summarizes file-level metadata: file name/size, capture duration, packet counts, data rates, and file/packet comments.","id":724},{"domain":"TCP","q":"Which hex value represents the TCP URG flag set alone?","choices":["0x020","0x002","0x010","0x001"],"answer":0,"explain":"URG alone = 0x020.","id":725},{"domain":"Interface","q":"What does marking a packet (Ctrl+M) enable?","choices":["changing its timestamp","navigating between and exporting flagged packets","deleting it","resolving its name"],"answer":1,"explain":"Marks flag packets of interest for navigation and Export Specified Packets > Marked.","id":726},{"domain":"UDP","q":"UDP port 500 is most commonly used by which protocol/service?","choices":["DHCP server","TFTP","IKE/IPsec","DNS"],"answer":2,"explain":"IKE/IPsec is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":727},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 47 identifies which encapsulated protocol?","choices":["OSPF","EIGRP","IGMP","GRE"],"answer":3,"explain":"IP protocol 47 = GRE. (1=ICMP,6=TCP,17=UDP.)","id":728},{"domain":"TCP","q":"In a capture: a connection to 10.0.5.11:68 (DHCP client) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["fast retransmit recovered a lost segment","the connection reset","the window scaled to zero","an ARP failure"],"answer":0,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":729},{"domain":"Ethernet","q":"Which EtherType value indicates the frame carries an IPv4 packet?","choices":["0x0806","0x0800","0x86DD","0x8100"],"answer":1,"explain":"0x0800 = IPv4, 0x0806 = ARP, 0x86DD = IPv6, 0x8100 = 802.1Q VLAN tag. These EtherTypes tell the receiver which Layer-3 dissector to use.","id":730},{"domain":"Capturing Traffic","q":"Why is dumpcap preferred over tshark for very high-rate, long-duration captures?","choices":["dumpcap dissects packets faster","dumpcap supports more display filters","dumpcap only captures (no dissection), so it has minimal CPU/memory overhead and is less likely to drop packets","tshark cannot write pcapng"],"answer":2,"explain":"dumpcap's sole job is writing packets to disk; it does no dissection, minimizing the chance of dropped frames under load. tshark adds dissection overhead.","id":731},{"domain":"IPv4","q":"A packet arrives with TTL=126. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["5","1","3","2"],"answer":3,"explain":"128 - 126 = 2 hops.","id":732},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.1.1.1 to 10.1.1.20 on 3306 (MySQL) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","normal setup","a VLAN tagging error","a DNS misconfiguration"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":733},{"domain":"Capturing Traffic","q":"A ring buffer in Wireshark/dumpcap is used to do what?","choices":["Reorder out-of-sequence packets","Capture into a fixed set of rotating files so old data is overwritten and disk usage is bounded","Buffer packets in the NIC hardware","Increase the snap length automatically"],"answer":1,"explain":"A ring buffer captures into N files of a set size or duration; when the limit is reached it wraps and overwrites the oldest file, providing continuous bounded capture for long-running monitoring.","id":734},{"domain":"UDP","q":"UDP conversation timestamps measure:","choices":["TTL decrement","RTT between hosts","time since first/previous packet in the conversation","window scaling"],"answer":2,"explain":"Like TCP, UDP conversation timestamps track relative and delta times.","id":735},{"domain":"DHCPv4","q":"Repeated DHCP Discover packets with no Offers in a capture most likely indicate:","choices":["Normal renewal","A successful lease","A DNS issue","No reachable DHCP server (or scope exhausted / relay misconfigured) on that segment"],"answer":3,"explain":"Discovers without Offers mean no server responded — causes include a down DHCP server, an exhausted scope, or a missing/broken DHCP relay (ip helper-address) on the router.","id":736},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.0.5.1 to 10.0.5.20 on 21 (FTP control) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","normal setup","a DNS misconfiguration","a VLAN tagging error"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":737},{"domain":"DHCPv4","q":"Which message does a client broadcast first in DORA?","choices":["Request","Discover","ACK","Offer"],"answer":1,"explain":"DORA begins with the client's Discover broadcast.","id":738},{"domain":"Filtering","q":"Traffic on port 53 is most commonly associated with which service/protocol?","choices":["SSH","SMB","DNS","POP3S"],"answer":2,"explain":"Port 53 is the well-known port for DNS.","id":739},{"domain":"ICMPv6","q":"Which ICMPv6 message corresponds to a router periodically advertising prefixes and MTU?","choices":["Redirect","Neighbor Advertisement","Neighbor Solicitation","Router Advertisement"],"answer":3,"explain":"Routers send Router Advertisements (type 134) for SLAAC.","id":740},{"domain":"TCP","q":"In a capture: a SYN to 172.16.9.100:636 (LDAPS) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","a graceful close occurred","DNS failed","the service responded normally"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":741},{"domain":"Wireshark Features","q":"To measure elapsed time from a chosen packet onward, which Wireshark feature do you use?","choices":["a profile","set a Time Reference (Ctrl+T)","a coloring rule","a capture filter"],"answer":1,"explain":"Correct: set a Time Reference (Ctrl+T).","id":742},{"domain":"Filtering","q":"Right-clicking a row in Statistics > Conversations lets you do what?","choices":["resolve all names","delete the conversation from disk","apply/prepare a display filter scoped to that exact conversation","change the capture filter"],"answer":2,"explain":"It generates a precise filter (A↔B, A→B, etc.) for that conversation's addresses and ports.","id":743},{"domain":"TCP","q":"A graceful TCP close uses:","choices":["ACK then SYN","SYN then FIN","a single RST","FIN handshakes acknowledged in each direction"],"answer":3,"explain":"Each FIN is acknowledged; RST is an abrupt, ungraceful termination.","id":744},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.0.5.33?","choices":["host 10.0.5.33","ip host 10.0.5.33","dst 10.0.5.33","net 10.0.5.33"],"answer":0,"explain":"Correct capture filter: host 10.0.5.33 (BPF syntax).","id":745},{"domain":"Interface","q":"The packet diagram pane shows what?","choices":["the coloring rules","a visual field-by-field layout of the selected packet's headers","the conversation list","a throughput chart"],"answer":1,"explain":"The packet diagram renders header fields graphically, aiding structural understanding.","id":746},{"domain":"ARP","q":"In a capture you see a unicast frame stating '10.0.5.150 is at <MAC>' in response to a who-has. What is it?","choices":["a gratuitous ARP","an ICMP redirect","an ARP reply","an ARP request"],"answer":2,"explain":"A directed 'is-at' answer is an ARP reply (opcode 2).","id":747},{"domain":"TCP","q":"In a capture: the SYN to 10.20.0.33:5432 (PostgreSQL) is answered immediately with RST/ACK. What is the most likely explanation?","choices":["the port is open and listening","the packet was fragmented","TTL expired","the destination port is closed (no listener)"],"answer":3,"explain":"A SYN to a closed port yields RST/ACK; an open port yields SYN/ACK.","id":748},{"domain":"Ethernet","q":"FF:FF:FF:FF:FF:FF is which kind of address?","choices":["broadcast","unicast","anycast","multicast"],"answer":0,"explain":"All-ones is the L2 broadcast, delivered to every host on the segment.","id":749},{"domain":"ARP","q":"In a capture you see a broadcast frame asking 'who has 172.20.3.77? tell <sender>'. What is it?","choices":["a gratuitous ARP","an ARP request","an ARP reply","a DHCP Discover"],"answer":1,"explain":"A who-has broadcast is an ARP request (opcode 1).","id":750},{"domain":"ARP","q":"What is a gratuitous ARP?","choices":["An ARP reply with no matching request","An ARP request for the gateway","A host announcing/refreshing its own IP-to-MAC mapping (often where sender and target IP are the same), used for duplicate-address detection and updating neighbors","An ARP error message"],"answer":2,"explain":"A gratuitous ARP is an unsolicited ARP (request or reply) where the host advertises its own IP/MAC, used to detect IP conflicts and to update other devices' ARP caches (e.g., after failover).","id":751},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.16.9.11?","choices":["dst 172.16.9.11","ip host 172.16.9.11","net 172.16.9.11","host 172.16.9.11"],"answer":3,"explain":"Correct capture filter: host 172.16.9.11 (BPF syntax).","id":752},{"domain":"ARP","q":"In a capture you see a unicast frame stating '192.168.50.25 is at <MAC>' in response to a who-has. What is it?","choices":["an ARP reply","an ARP request","an ICMP redirect","a gratuitous ARP"],"answer":0,"explain":"A directed 'is-at' answer is an ARP reply (opcode 2).","id":753},{"domain":"Interface","q":"You want to see ACK round-trip times per packet. Which column field is most useful?","choices":["http.host","tcp.analysis.ack_rtt","udp.length","eth.src"],"answer":1,"explain":"A column for tcp.analysis.ack_rtt surfaces that field across packets for fast scanning.","id":754},{"domain":"UDP","q":"UDP port 1812 is most commonly used by which protocol/service?","choices":["IPsec NAT-T","SNMP","RADIUS","SSDP"],"answer":2,"explain":"RADIUS is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":755},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 172.20.3.10:143 (IMAP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["DNS failing","an ARP loop","the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)"],"answer":3,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":756},{"domain":"Interface","q":"The 'Colorize Conversation' feature lets you:","choices":["Apply a temporary color to all packets of a selected conversation","Permanently delete a conversation","Export a conversation","Resolve names for a conversation"],"answer":0,"explain":"Colorize Conversation (right-click a packet) temporarily highlights all packets in that conversation with a chosen color, making it easy to follow amid other traffic.","id":757},{"domain":"IPv6","q":"Unique Local Addresses use which prefix?","choices":["2001:db8::/32","FC00::/7 (commonly FD00::/8)","FF02::/16","FE80::/10"],"answer":1,"explain":"ULAs occupy FC00::/7, the IPv6 private-addressing analog.","id":758},{"domain":"TCP","q":"What is the purpose of the TCP SYN flag?","choices":["push buffered data to the application promptly","mark data as urgent (urgent pointer valid)","synchronize sequence numbers to open a connection","gracefully finish/close one direction"],"answer":2,"explain":"SYN is used to synchronize sequence numbers to open a connection (bit 0x002).","id":759},{"domain":"DHCPv4","q":"Which DHCP message does a client send to give up its lease before expiry?","choices":["DHCP Decline","DHCP Inform","DHCP Nak","DHCP Release"],"answer":3,"explain":"DHCP Release relinquishes the lease. Decline reports a conflict (address already in use), Inform requests config without an address, and Nak is the server refusing/invalidating a request.","id":760},{"domain":"UDP","q":"UDP port 69 is most commonly used by which protocol/service?","choices":["TFTP","NetBIOS Name","IPsec NAT-T","DHCP client"],"answer":0,"explain":"TFTP is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":761},{"domain":"Filtering","q":"If you apply the display filter 'http' you might NOT see the TCP three-way handshake for those connections because:","choices":["The handshake packets are HTTP","SYN/SYN-ACK/ACK packets carry no HTTP layer, so they don't match the 'http' filter","Wireshark hides handshakes by default","The handshake uses UDP"],"answer":1,"explain":"Handshake segments contain only TCP, no HTTP payload, so 'http' excludes them. To see the full conversation, filter on tcp.stream eq N or follow the stream.","id":762},{"domain":"TCP","q":"What is the purpose of the TCP 'SACK-Permitted' option (kind 4)?","choices":["mark the end of the options list","pad options to a 4-byte boundary","negotiate use of selective acknowledgments","carry timestamps for RTT measurement and PAWS"],"answer":2,"explain":"SACK-Permitted (kind 4) is used to negotiate use of selective acknowledgments.","id":763},{"domain":"Filtering","q":"Which display filter isolates SMB traffic by its well-known TCP port?","choices":["tcp.port == 22","tcp.port == 69","tcp.port == 68","tcp.port == 445"],"answer":3,"explain":"SMB uses TCP port 445.","id":764},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 300 usable?","choices":["a valid, usable VLAN ID (1-4094)","an invalid value (>65535)","reserved (not a normal usable VLAN ID)","outside the 12-bit range"],"answer":0,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 300 is usable.","id":765},{"domain":"Filtering","q":"Which filter uses a regular expression match?","choices":["http.host == \"example.com\"","http.host matches \"(?i)example\\.com\"","http.host contains example","http.host in {example.com}"],"answer":1,"explain":"The 'matches' operator (PCRE) applies a regular expression; '(?i)' makes it case-insensitive. 'contains' is a literal byte search, not regex.","id":766},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show TCP zero-window packets?","choices":["dhcp","tcp.stream eq 4","tcp.analysis.zero_window","dns"],"answer":2,"explain":"Correct display filter: tcp.analysis.zero_window","id":767},{"domain":"TCP","q":"In a capture: the handshake to 172.20.3.25:143 (IMAP) succeeds, then 172.20.3.25 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","DNS is failing","the gateway ARP is missing","the receiver {h} is application-bottlenecked (full buffer)"],"answer":3,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":768},{"domain":"IPv4","q":"A packet arrives with TTL=125. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["3","2","5","1"],"answer":0,"explain":"128 - 125 = 3 hops.","id":769},{"domain":"TCP","q":"A RST packet is used to:","choices":["open a connection","abruptly terminate or refuse a connection","acknowledge data","scale the window"],"answer":1,"explain":"RST aborts/refuses without the FIN handshake.","id":770},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.100.33?","choices":["ip host 192.168.100.33","net 192.168.100.33","host 192.168.100.33","dst 192.168.100.33"],"answer":2,"explain":"Correct capture filter: host 192.168.100.33 (BPF syntax).","id":771},{"domain":"TCP","q":"In a capture: the handshake to 10.1.1.25:110 (POP3) succeeds, then 10.1.1.25 sends repeated Zero Window messages. What is the most likely explanation?","choices":["DNS is failing","the gateway ARP is missing","the link is saturated","the receiver {h} is application-bottlenecked (full buffer)"],"answer":3,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":772},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 54 carry?","choices":["DHCP Server Identifier","DHCP Message Type","Router (default gateway)","IP Address Lease Time"],"answer":0,"explain":"DHCP Option 54 = DHCP Server Identifier.","id":773},{"domain":"ICMPv4","q":"When analyzing an ICMP error message in Wireshark, how can you identify the packet that triggered it?","choices":["By the ICMP checksum","The ICMP error payload includes the IP header and first 8 bytes of the original datagram, which Wireshark dissects and can link to the original packet","By the TTL only","You cannot identify it"],"answer":1,"explain":"ICMP error messages embed the offending packet's IP header plus at least the first 8 bytes of its payload. Wireshark dissects this and often provides a hyperlink to the original frame.","id":774},{"domain":"ARP","q":"Which display filter shows only ARP replies?","choices":["arp.opcode == 1","arp.isgratuitous == 1","arp.opcode == 2","arp"],"answer":2,"explain":"Opcode 2 is an ARP reply (opcode 1 is a request). arp.opcode == 2 isolates replies.","id":775},{"domain":"IPv4","q":"You capture a packet with TTL=60. The sender most likely used an initial TTL of 64. Approximately how many router hops away is the sender?","choices":["60 hops","64 hops","Cannot be estimated","About 4 hops"],"answer":3,"explain":"Common initial TTLs are 64 (Linux/macOS), 128 (Windows), and 255 (network gear). 64 − 60 = 4, so the source is roughly 4 hops from the capture point.","id":776},{"domain":"Wireshark Features","q":"You need to attach a persistent note to one packet. Which feature is correct?","choices":["a packet comment (pcapng)","Decode As","a capture filter","a coloring rule"],"answer":0,"explain":"Correct: a packet comment (pcapng).","id":777},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 89 identifies which encapsulated protocol?","choices":["ICMP","OSPF","EIGRP","GRE"],"answer":1,"explain":"IP protocol 89 = OSPF. (1=ICMP,6=TCP,17=UDP.)","id":778},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.1.1.1 to 10.1.1.33 on 8080 (HTTP alt) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a VLAN tagging error","a DNS misconfiguration","packet loss in the path triggering retransmissions","normal setup"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":779},{"domain":"Wireshark Features","q":"Which graph plots packets/s or bits/s over time for a filter?","choices":["TCP Stream Graph","Protocol Hierarchy","Flow Graph","I/O Graph"],"answer":3,"explain":"The I/O Graph plots rate over time and accepts display filters to isolate traffic.","id":780},{"domain":"Wireshark Features","q":"Which Wireshark feature lets you attach a persistent note to one packet?","choices":["a packet comment (pcapng)","Decode As","a capture filter","a coloring rule"],"answer":0,"explain":"Correct: a packet comment (pcapng).","id":781},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show only DHCP traffic?","choices":["tcp.analysis.zero_window","dhcp","ipv6","tcp.stream eq 4"],"answer":1,"explain":"Correct display filter: dhcp","id":782},{"domain":"Filtering","q":"Which Wireshark display filter would you use to match only packets sourced from 10.1.1.1?","choices":["tcp.port in {80,443}","tcp.analysis.retransmission","ip.src == 10.1.1.1","arp.opcode == 1"],"answer":2,"explain":"Correct display filter: ip.src == 10.1.1.1","id":783},{"domain":"DHCPv4","q":"DHCP message-type code 3 (Option 53) corresponds to which message?","choices":["Inform","NAK","Decline","Request"],"answer":3,"explain":"DHCP type 3 = Request.","id":784},{"domain":"Filtering","q":"Which filter matches TCP packets with ONLY the SYN flag set (a connection request, not SYN-ACK)?","choices":["tcp.flags == 0x002","tcp.flags.syn == 1","tcp.flags.syn == 1 && tcp.flags.ack == 1","tcp.syn"],"answer":0,"explain":"tcp.flags == 0x002 matches frames where the entire flags field equals SYN-only. 'tcp.flags.syn==1' also matches SYN-ACK because ACK is additionally set there. Equivalent: tcp.flags.syn==1 && tcp.flags.ack==0.","id":785},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.1.1 to 192.168.1.25 on 123 (NTP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a VLAN tagging error","packet loss in the path triggering retransmissions","a DNS misconfiguration","normal setup"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":786},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.7.1 to 192.168.7.11 on 995 (POP3S) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","normal setup","packet loss in the path triggering retransmissions","a VLAN tagging error"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":787},{"domain":"Capturing Traffic","q":"You want to capture only packet headers to save space at high traffic volume.","choices":["use monitor mode","enable promiscuous mode","enable a ring buffer only","reduce the snapshot length (snaplen)"],"answer":3,"explain":"Lowering the snaplen stores only the first N bytes per packet, keeping headers while discarding most payload.","id":788},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.0.5.1 to 10.0.5.33 on 995 (POP3S) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","a DNS misconfiguration","a VLAN tagging error","normal setup"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":789},{"domain":"ICMPv4","q":"What does ICMP message Type 5 represent?","choices":["Time Exceeded","Redirect","Echo Request","Timestamp Reply"],"answer":1,"explain":"ICMP Type 5 = Redirect.","id":790},{"domain":"DHCPv4","q":"DHCP message-type code 4 (Option 53) corresponds to which message?","choices":["ACK","Release","Decline","Discover"],"answer":2,"explain":"DHCP type 4 = Decline.","id":791},{"domain":"TCP","q":"A TCP Window Scale option with shift count 10 multiplies the window by what factor?","choices":["2048","10","1025","1024"],"answer":3,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^10 = 1024. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":792},{"domain":"TCP","q":"A TCP Window Scale option with shift count 12 multiplies the window by what factor?","choices":["4096","12","4097","2048"],"answer":0,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^12 = 4096. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":793},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 4000 usable?","choices":["reserved (not a normal usable VLAN ID)","a valid, usable VLAN ID (1-4094)","outside the 12-bit range","an invalid value (>65535)"],"answer":1,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 4000 is usable.","id":794},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only POP3 traffic by port?","choices":["tcp.port == 110","portrange 110","port 110","dst port 110 only"],"answer":2,"explain":"Correct capture filter: port 110 (BPF syntax).","id":795},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.10.0.20?","choices":["ip host 10.10.0.20","dst 10.10.0.20","net 10.10.0.20","host 10.10.0.20"],"answer":3,"explain":"Correct capture filter: host 10.10.0.20 (BPF syntax).","id":796},{"domain":"IPv4","q":"A packet arrives with TTL=47. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["17","15","14","18"],"answer":0,"explain":"64 - 47 = 17 hops.","id":797},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 172.16.5.100:445 (SMB) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)","an ARP loop","DNS failing"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":798},{"domain":"Wireshark Features","q":"You need to get per-host traffic totals at the IP layer. Which feature is correct?","choices":["I/O Graph","Conversations","Statistics > Endpoints","Follow TCP Stream"],"answer":2,"explain":"Correct: Statistics > Endpoints.","id":799},{"domain":"Interface","q":"The three main panes of the Wireshark packet view are:","choices":["Capture, display, export","Conversations, endpoints, hierarchy","Filter, color, profile","Packet list, packet details, packet bytes"],"answer":3,"explain":"The default layout shows the packet list (top), packet details/dissection tree (middle), and packet bytes/hex (bottom).","id":800},{"domain":"TCP","q":"In a capture: the handshake to 10.20.0.77:3306 (MySQL) succeeds, then 10.20.0.77 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the receiver {h} is application-bottlenecked (full buffer)","DNS is failing","the gateway ARP is missing","the link is saturated"],"answer":0,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":801},{"domain":"Wireshark Features","q":"You need to locate a packet containing a specific text string. Which feature is correct?","choices":["a coloring rule","Find Packet (Ctrl+F), String search","a capture filter","a profile"],"answer":1,"explain":"Correct: Find Packet (Ctrl+F), String search.","id":802},{"domain":"Filtering","q":"To capture only traffic involving the 10.0.0.0/8 network, which BPF expression is correct?","choices":["host 10.0.0.0","ip.addr == 10.0.0.0/8","net 10.0.0.0/8","subnet 10"],"answer":2,"explain":"'net <cidr>' is BPF for an entire network; 'ip.addr' is display-filter syntax and invalid as a capture filter.","id":803},{"domain":"TCP","q":"A TCP Window Scale option with shift count 9 multiplies the window by what factor?","choices":["513","1024","256","512"],"answer":3,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^9 = 512. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":804},{"domain":"Ethernet","q":"Which field follows the source MAC in an untagged Ethernet II frame?","choices":["the EtherType/Length","the payload checksum","the FCS","the preamble"],"answer":0,"explain":"Order: Dest MAC, Src MAC, EtherType, payload, FCS.","id":805},{"domain":"Interface","q":"You want to scan handshake/teardown flags across packets. Which column field is most useful?","choices":["tcp.analysis.ack_rtt","tcp.flags","tcp.stream","http.host"],"answer":1,"explain":"A column for tcp.flags surfaces that field across packets for fast scanning.","id":806},{"domain":"Capturing Traffic","q":"Which interface would you typically select in Wireshark to capture local machine traffic that never leaves the host (e.g., a service talking to localhost)?","choices":["The physical Ethernet NIC","A TAP","The loopback (lo / Npcap Loopback) interface","The wireless monitor interface"],"answer":2,"explain":"Traffic to 127.0.0.1/::1 traverses the loopback interface, so you must capture on loopback (Linux 'lo' or Npcap 'Adapter for loopback traffic') to see it.","id":807},{"domain":"IPv4","q":"A packet arrives with TTL=122. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["9","5","1","6"],"answer":3,"explain":"128 - 122 = 6 hops.","id":808},{"domain":"IPv4","q":"A packet arrives with TTL=48. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["16","18","14","15"],"answer":0,"explain":"64 - 48 = 16 hops.","id":809},{"domain":"UDP","q":"UDP port 53 is most commonly used by which protocol/service?","choices":["syslog","DNS","RADIUS","IPsec NAT-T"],"answer":1,"explain":"DNS is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":810},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.10.0.1 to 10.10.0.200 on 443 (HTTPS/TLS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","normal setup","packet loss in the path triggering retransmissions","a VLAN tagging error"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":811},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.20.0.50 for the gateway 10.20.0.1 get no reply. What is the most likely explanation?","choices":["a TCP reset storm","a DNS outage","an oversized window","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":812},{"domain":"TCP","q":"In a capture: a SYN to 172.16.9.50:80 (HTTP) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","the service responded normally","a graceful close occurred","DNS failed"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":813},{"domain":"Troubleshooting","q":"In a capture you observe: a SYN is sent and retransmitted several times but no SYN/ACK or RST ever returns. What is the most likely explanation?","choices":["the window scaled to zero","a firewall is silently dropping the SYN, or the host is unreachable","the connection closed gracefully","the service returned data successfully"],"answer":1,"explain":"Silence (no SYN/ACK and no RST) on a retransmitted SYN points to filtering/drop or an unreachable host; a closed port would typically send RST.","id":814},{"domain":"TCP","q":"In a capture: the handshake to 192.168.100.77:69 (TFTP) succeeds, then 192.168.100.77 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","the gateway ARP is missing","the receiver {h} is application-bottlenecked (full buffer)","DNS is failing"],"answer":2,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":815},{"domain":"Troubleshooting","q":"In a capture: host 10.10.0.11 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["a TCP window bug","an MTU mismatch","high path latency","the DHCP server/relay is unreachable on that segment"],"answer":3,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":816},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.1.1.10:443 (HTTPS/TLS) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","DNS failing","the server can't generate data","an ARP loop"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":817},{"domain":"ICMPv6","q":"Neighbor Solicitation is ICMPv6 type:","choices":["136","135","133","134"],"answer":1,"explain":"NS = 135; NA = 136.","id":818},{"domain":"ARP","q":"An ARP reply is sent as:","choices":["an ICMP message","a broadcast","a unicast to the requester","a multicast"],"answer":2,"explain":"The reply is unicast because the requester's MAC was in the request.","id":819},{"domain":"Wireshark Features","q":"Which pane shows the raw captured bytes in hex and ASCII?","choices":["Protocol Hierarchy","the packet details pane","the packet list pane","the packet bytes (hex) pane"],"answer":3,"explain":"The bytes pane shows on-the-wire bytes; selecting a detail field highlights the matching bytes.","id":820},{"domain":"Troubleshooting","q":"In a capture you observe: traceroute-unrelated traffic generates frequent ICMP Time Exceeded messages from one router. What is the most likely explanation?","choices":["a routing loop or too-low initial TTL causing packets to expire","a healthy path","a zero window","a DHCP renewal"],"answer":0,"explain":"Outside traceroute, repeated Time Exceeded suggests looping or insufficient TTL, breaking end-to-end delivery.","id":821},{"domain":"Interface","q":"Which column would best help you follow sequence-number progression?","choices":["tcp.analysis.ack_rtt","tcp.seq","tcp.flags","udp.length"],"answer":1,"explain":"A column for tcp.seq surfaces that field across packets for fast scanning.","id":822},{"domain":"Troubleshooting","q":"In a capture you observe: repeated ARP requests for the default gateway IP receive no ARP reply. What is the most likely explanation?","choices":["a TCP reset storm","an oversized window","the gateway is down or unreachable on that Layer-2 segment","a DNS server outage"],"answer":2,"explain":"Unanswered gateway ARPs mean its MAC can't be resolved (gateway down, wrong VLAN, or cabling), breaking off-subnet connectivity.","id":823},{"domain":"Filtering","q":"Traffic on port 22 is most commonly associated with which service/protocol?","choices":["FTP control","syslog","RADIUS","SSH"],"answer":3,"explain":"Port 22 is the well-known port for SSH.","id":824},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 500 usable?","choices":["a valid, usable VLAN ID (1-4094)","reserved (not a normal usable VLAN ID)","outside the 12-bit range","an invalid value (>65535)"],"answer":0,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 500 is usable.","id":825},{"domain":"Troubleshooting","q":"In an HTTP transaction, how do you distinguish slow SERVER processing from a slow NETWORK transfer?","choices":["Both look identical","A long gap between the client's request and the first response byte points to server 'think time'; many small segments spread out with retransmissions/ACK delays points to network issues","By the MAC address","By the EtherType"],"answer":1,"explain":"Server delay shows as a large time-delta between the GET and the first response packet (server processing), while network problems show as packet loss, retransmissions, high RTT, or paced ACKs across the transfer.","id":826},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 172.20.3.200 for the gateway 172.20.3.1 get no reply. What is the most likely explanation?","choices":["an oversized window","a DNS outage","the gateway is down or unreachable on that Layer-2 segment","a TCP reset storm"],"answer":2,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":827},{"domain":"TCP","q":"A duplicate ACK (DUP ACK) is generated when a receiver:","choices":["Receives data in order","Closes the connection","Scales the window","Receives an out-of-order segment, re-acknowledging the same expected sequence number to signal a possible gap"],"answer":3,"explain":"When a segment arrives out of order (a gap is detected), the receiver repeats the last ACK number. Multiple DUP ACKs (classically 3) trigger the sender's fast retransmit.","id":828},{"domain":"TCP","q":"In a capture: a SYN to 10.1.1.200:21 (FTP control) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","DNS failed","the service responded normally","a graceful close occurred"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":829},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.1.1.1 to 10.1.1.33 on 389 (LDAP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","packet loss in the path triggering retransmissions","a VLAN tagging error","a DNS misconfiguration"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":830},{"domain":"Capturing Traffic","q":"You need to capture traffic between two other hosts on a switched network with no TAP available.","choices":["read the ARP cache","use monitor mode","configure a SPAN/port mirror on the switch","rely on promiscuous mode on an unrelated port"],"answer":2,"explain":"A switch only forwards frames to your port, so a SPAN/port mirror (or endpoint capture) is required to see other hosts' unicast traffic.","id":831},{"domain":"Interface","q":"Which column would best help you find large inter-packet gaps (stalls)?","choices":["tcp.analysis.ack_rtt","tcp.seq","tcp.flags","frame.time_delta"],"answer":3,"explain":"A column for frame.time_delta surfaces that field across packets for fast scanning.","id":832},{"domain":"TCP","q":"In a capture: the SYN to 10.1.1.50:8080 (HTTP alt) is answered immediately with RST/ACK. What is the most likely explanation?","choices":["the destination port is closed (no listener)","TTL expired","the packet was fragmented","the port is open and listening"],"answer":0,"explain":"A SYN to a closed port yields RST/ACK; an open port yields SYN/ACK.","id":833},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 172.16.9.1 to 172.16.9.20 on 8080 (HTTP alt) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","packet loss in the path triggering retransmissions","a VLAN tagging error","normal setup"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":834},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show DNS responses only?","choices":["ipv6","tcp.port in {80,443}","dns.flags.response == 1","icmp.type == 8"],"answer":2,"explain":"Correct display filter: dns.flags.response == 1","id":835},{"domain":"TCP","q":"In a capture: a connection to 10.20.0.150:123 (NTP) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["an ARP failure","the connection reset","the window scaled to zero","fast retransmit recovered a lost segment"],"answer":3,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":836},{"domain":"TCP","q":"What is the purpose of the TCP PSH flag?","choices":["push buffered data to the application promptly","acknowledge received data","mark data as urgent (urgent pointer valid)","synchronize sequence numbers to open a connection"],"answer":0,"explain":"PSH is used to push buffered data to the application promptly (bit 0x008).","id":837},{"domain":"TCP","q":"EOL option does what?","choices":["pads to alignment","marks the end of the options list","negotiates window scale","carries SACK"],"answer":1,"explain":"EOL (kind 0) ends options; remaining space is padding.","id":838},{"domain":"TCP","q":"In a capture: the SYN to 192.168.100.33:110 (POP3) is answered immediately with RST/ACK. What is the most likely explanation?","choices":["the port is open and listening","the packet was fragmented","the destination port is closed (no listener)","TTL expired"],"answer":2,"explain":"A SYN to a closed port yields RST/ACK; an open port yields SYN/ACK.","id":839},{"domain":"TCP","q":"Three duplicate ACKs typically trigger which sender behavior?","choices":["Connection reset","Window scaling","A FIN","Fast retransmit of the presumed-lost segment without waiting for the retransmission timer"],"answer":3,"explain":"Receiving 3 DUP ACKs is the classic fast-retransmit trigger: the sender resends the missing segment immediately rather than waiting for the RTO to expire.","id":840},{"domain":"Capturing Traffic","q":"Multi-point capture (capturing at two locations simultaneously) is most valuable for what?","choices":["Comparing traffic at two points to locate where packets are delayed, dropped, or altered (e.g., across a firewall)","Reducing file size","Decrypting TLS","Avoiding promiscuous mode"],"answer":0,"explain":"Capturing at both sides of a device/path lets you compare timestamps and packet presence to pinpoint where loss, latency, or modification (NAT, rewriting) occurs.","id":841},{"domain":"TCP","q":"A TCP Window Scale option with shift count 1 multiplies the window by what factor?","choices":["1","2","3","4"],"answer":1,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^1 = 2. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":842},{"domain":"Wireshark Features","q":"In Wireshark, what does a relative TCP sequence number of 1 typically represent?","choices":["The raw 32-bit ISN sent on the wire","An out-of-order segment","Wireshark's relative numbering where the SYN's sequence is shown as 0 and the next byte as 1","A retransmission"],"answer":2,"explain":"By default Wireshark uses relative sequence numbers: the handshake SYN is shown as seq=0, so the first data byte becomes 1. The actual ISN is a random 32-bit value visible if you disable relative sequence numbers.","id":843},{"domain":"Filtering","q":"Which display filter isolates SNMP traffic by its well-known TCP port?","choices":["tcp.port == 53","tcp.port == 3389","tcp.port == 3306","tcp.port == 161"],"answer":3,"explain":"SNMP uses TCP port 161.","id":844},{"domain":"IPv6","q":"Unique Local Addresses (ULA), the IPv6 analog to RFC 1918 private space, use which prefix?","choices":["FC00::/7 (commonly FD00::/8 in practice)","FE80::/10","2001:db8::/32","FF02::/16"],"answer":0,"explain":"ULAs occupy FC00::/7; in practice the FD00::/8 half (locally assigned, with a random global ID) is used for private, non-globally-routed addressing.","id":845},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.8.8.11?","choices":["ip host 10.8.8.11","host 10.8.8.11","dst 10.8.8.11","net 10.8.8.11"],"answer":1,"explain":"Correct capture filter: host 10.8.8.11 (BPF syntax).","id":846},{"domain":"Wireshark Features","q":"To locate a packet containing a specific text string, which Wireshark feature do you use?","choices":["a coloring rule","a profile","Find Packet (Ctrl+F), String search","a capture filter"],"answer":2,"explain":"Correct: Find Packet (Ctrl+F), String search.","id":847},{"domain":"Filtering","q":"Traffic on port 69 is most commonly associated with which service/protocol?","choices":["SNMP","SMTP","FTP control","TFTP"],"answer":3,"explain":"Port 69 is the well-known port for TFTP.","id":848},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.7.77:123 (NTP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","an ARP loop","DNS failing","the server can't generate data"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":849},{"domain":"TCP","q":"In a capture: the SYN to 10.8.8.25:21 (FTP control) is answered immediately with RST/ACK. What is the most likely explanation?","choices":["the port is open and listening","the destination port is closed (no listener)","the packet was fragmented","TTL expired"],"answer":1,"explain":"A SYN to a closed port yields RST/ACK; an open port yields SYN/ACK.","id":850},{"domain":"Wireshark Features","q":"Which feature lets you save a frequently used display filter as a clickable toolbar shortcut?","choices":["Coloring rule","Profile","Filter button","Time reference"],"answer":2,"explain":"A filter button (created from the filter bar's '+' or via preferences) saves a display filter as a one-click button on the filter toolbar.","id":851},{"domain":"TCP","q":"With MTU 9000, a 40-byte IP header, and a 20-byte TCP header (IPv6 jumbo), what is the TCP MSS?","choices":["8948","8960","8932","8940"],"answer":3,"explain":"MSS = 9000 - 40 - 20 = 8940 bytes (payload only).","id":852},{"domain":"DNS","q":"A DNS 'SRV' record returns what?","choices":["the host and port for a named service","an authoritative name server for the zone","an IPv4 address (host record)","an IPv6 address"],"answer":0,"explain":"A SRV record returns the host and port for a named service.","id":853},{"domain":"TCP","q":"The PSH (Push) flag requests that the receiver:","choices":["Reset the connection","Deliver the buffered data to the application promptly rather than waiting to fill a buffer","Scale the window","Retransmit"],"answer":1,"explain":"PSH tells the stack to push received data up to the application immediately. It is common on the last segment of a message (e.g., an HTTP request) so the app isn't kept waiting.","id":854},{"domain":"TCP","q":"In a capture: the handshake to 192.168.1.200:1812 (RADIUS) succeeds, then 192.168.1.200 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","the gateway ARP is missing","the receiver {h} is application-bottlenecked (full buffer)","DNS is failing"],"answer":2,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":855},{"domain":"Interface","q":"Which column would best help you detect duplicate packets or fragmentation?","choices":["dns.qry.name","eth.src","frame.time_delta","ip.id"],"answer":3,"explain":"A column for ip.id surfaces that field across packets for fast scanning.","id":856},{"domain":"Filtering","q":"Why might filtering 'http' hide the TCP three-way handshake of those sessions?","choices":["handshake segments carry no HTTP layer, so they don't match 'http'","the filter is invalid","the handshake uses UDP","Wireshark hides handshakes by default"],"answer":0,"explain":"To see the full conversation use tcp.stream eq N or Follow TCP Stream; 'http' only matches packets with an HTTP layer.","id":857},{"domain":"Filtering","q":"Traffic on port 1433 is most commonly associated with which service/protocol?","choices":["IMAPS","MS SQL","LDAP","IMAP"],"answer":1,"explain":"Port 1433 is the well-known port for MS SQL.","id":858},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 4094 usable?","choices":["outside the 12-bit range","reserved (not a normal usable VLAN ID)","a valid, usable VLAN ID (1-4094)","an invalid value (>65535)"],"answer":2,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 4094 is usable.","id":859},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.16.9.100?","choices":["net 172.16.9.100","dst 172.16.9.100","ip host 172.16.9.100","host 172.16.9.100"],"answer":3,"explain":"Correct capture filter: host 172.16.9.100 (BPF syntax).","id":860},{"domain":"TCP","q":"What is the purpose of the TCP URG flag?","choices":["mark data as urgent (urgent pointer valid)","push buffered data to the application promptly","gracefully finish/close one direction","abruptly reset/abort or refuse a connection"],"answer":0,"explain":"URG is used to mark data as urgent (urgent pointer valid) (bit 0x020).","id":861},{"domain":"Wireshark Features","q":"Which Wireshark feature lets you plot throughput over time for a filtered subset?","choices":["Protocol Hierarchy","Statistics > I/O Graph","Resolved Addresses","Decode As"],"answer":1,"explain":"Correct: Statistics > I/O Graph.","id":862},{"domain":"Filtering","q":"Traffic on port 123 is most commonly associated with which service/protocol?","choices":["POP3S","RADIUS","NTP","TFTP"],"answer":2,"explain":"Port 123 is the well-known port for NTP.","id":863},{"domain":"ARP","q":"ARP opcode 2 is:","choices":["an error","gratuitous","a request","a reply"],"answer":3,"explain":"Opcode 2 = reply; opcode 1 = request.","id":864},{"domain":"Interface","q":"How do you switch the active profile in Wireshark?","choices":["Click the profile name in the lower-right status bar and choose another, or use Edit > Configuration Profiles","Restart the capture","Edit the pcapng file","Press Ctrl+S"],"answer":0,"explain":"The current profile is shown in the bottom-right status bar; clicking it lists available profiles. Edit > Configuration Profiles manages them.","id":865},{"domain":"Interface","q":"Which column would best help you scan source MAC addresses?","choices":["ip.id","eth.src","http.host","ip.ttl"],"answer":1,"explain":"A column for eth.src surfaces that field across packets for fast scanning.","id":866},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.20.0.1 to 10.20.0.150 on 993 (IMAPS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a VLAN tagging error","normal setup","packet loss in the path triggering retransmissions","a DNS misconfiguration"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":867},{"domain":"ICMPv4","q":"An ICMP Destination Unreachable (Type 3) Code 3 indicates what?","choices":["protocol unreachable","host unreachable","net unreachable","port unreachable"],"answer":3,"explain":"Type 3 Code 3 = port unreachable.","id":868},{"domain":"TCP","q":"In a capture: the handshake to 172.20.3.100:143 (IMAP) succeeds, then 172.20.3.100 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the receiver {h} is application-bottlenecked (full buffer)","the gateway ARP is missing","the link is saturated","DNS is failing"],"answer":0,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":869},{"domain":"IPv4","q":"A packet arrives with TTL=58. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["1","6","5","9"],"answer":1,"explain":"64 - 58 = 6 hops.","id":870},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.16.5.11?","choices":["ip host 172.16.5.11","net 172.16.5.11","host 172.16.5.11","dst 172.16.5.11"],"answer":2,"explain":"Correct capture filter: host 172.16.5.11 (BPF syntax).","id":871},{"domain":"IPv4","q":"A packet arrives with TTL=127. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["6","3","4","1"],"answer":3,"explain":"128 - 127 = 1 hops.","id":872},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 50 carry?","choices":["Requested IP Address","DHCP Server Identifier","Broadcast Address","Router (default gateway)"],"answer":0,"explain":"DHCP Option 50 = Requested IP Address.","id":873},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.16.9.10?","choices":["ip host 172.16.9.10","host 172.16.9.10","dst 172.16.9.10","net 172.16.9.10"],"answer":1,"explain":"Correct capture filter: host 172.16.9.10 (BPF syntax).","id":874},{"domain":"TCP","q":"A TCP Window Scale option with shift count 2 multiplies the window by what factor?","choices":["5","2","4","8"],"answer":2,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^2 = 4. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":875},{"domain":"Filtering","q":"Which is a correct membership/comparison difference: capture vs display filter for port 53?","choices":["display uses BPF","both use 'port 53'","both use 'dns'","capture: 'port 53'; display: 'udp.port==53 || tcp.port==53' (or 'dns')"],"answer":3,"explain":"Capture filters can't use protocol names like 'dns'; you write 'port 53'. Display filters use udp.port/tcp.port or 'dns'.","id":876},{"domain":"DHCPv4","q":"A DHCP Request message can serve multiple purposes. Which is one of them?","choices":["Requesting the offered address during DORA, renewing/rebinding an existing lease, or verifying a previously assigned address after reboot (INIT-REBOOT)","Only initial address acquisition","Releasing an address","Declining a duplicate address"],"answer":0,"explain":"DHCP Request is reused for several functions: accepting an offer, lease renewal (T1, unicast to server), rebinding (T2, broadcast), and INIT-REBOOT verification after a restart.","id":877},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 1000 usable?","choices":["an invalid value (>65535)","a valid, usable VLAN ID (1-4094)","reserved (not a normal usable VLAN ID)","outside the 12-bit range"],"answer":1,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 1000 is usable.","id":878},{"domain":"ICMPv4","q":"ICMP Type 3 Code 4 indicates:","choices":["an ARP failure","a normal echo reply","fragmentation needed and DF set (PMTUD)","a TCP reset"],"answer":2,"explain":"This message drives Path MTU Discovery; blocking it causes black holes.","id":879},{"domain":"UDP","q":"UDP port 123 is most commonly used by which protocol/service?","choices":["NetBIOS Datagram","DNS","SSDP","NTP"],"answer":3,"explain":"NTP is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":880},{"domain":"IPv6","q":"An IPv6 address in ::1/128 is what type?","choices":["Loopback","Multicast","Unique loc
