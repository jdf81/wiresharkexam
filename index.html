<style>
:root{
  --bg:#0b1f24; --bg2:#0e272d; --surface:#102e35; --surface2:#143840;
  --line:#1d4a53; --line2:#266069;
  --ink:#eaf6f4; --ink-dim:#9fc4c0; --ink-faint:#6f9893;
  --teal:#19e3c2; --teal-deep:#0e7c6b; --amber:#f2b134; --red:#ff6b6b; --green:#52d39a;
  --mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,system-ui,sans-serif;
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 70%,rgba(11,31,36,.85));
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;backdrop-filter:blur(8px)}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;flex:0 0 auto}
.brand h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
.brand .sub{font-family:var(--mono);font-size:10.5px;color:var(--teal);letter-spacing:1.5px;text-transform:uppercase}
.bytestripe{display:flex;gap:3px;margin-top:9px;height:5px}
.bytestripe i{flex:1;border-radius:2px;background:var(--line);opacity:.7}
.bytestripe i.a{background:var(--teal-deep)} .bytestripe i.b{background:var(--teal)}
.bytestripe i.c{background:var(--amber)}

main{flex:1;padding:6px 16px 96px}

nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;
  background:rgba(10,34,40,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding:8px 8px calc(env(safe-area-inset-bottom) + 8px)}
nav .row{display:flex;gap:4px;max-width:760px;width:100%}
nav button{flex:1;background:none;border:0;color:var(--ink-faint);font-family:var(--sans);
  font-size:10.5px;font-weight:600;padding:6px 2px;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;gap:4px;cursor:pointer;transition:.15s}
nav button .ic{font-size:17px;line-height:1;font-family:var(--mono)}
nav button.active{color:var(--teal);background:var(--surface)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:12px 0}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal)}
h2{font-size:21px;margin:4px 0 6px;font-weight:680;letter-spacing:.2px}
h3{font-size:15px;margin:18px 0 6px;font-weight:650}
p{line-height:1.62;color:var(--ink-dim);margin:8px 0;font-size:14.5px}
.muted{color:var(--ink-faint);font-size:13px}
a{color:var(--teal)}

.hero{background:radial-gradient(120% 80% at 80% 0%,rgba(25,227,194,.10),transparent 60%),var(--surface);
  border:1px solid var(--line);border-radius:18px;padding:20px;margin:14px 0 8px;position:relative;overflow:hidden}
.hero .grid{position:absolute;inset:0;opacity:.10;background-image:
   linear-gradient(var(--teal) 1px,transparent 1px),linear-gradient(90deg,var(--teal) 1px,transparent 1px);
   background-size:22px 22px;-webkit-mask-image:radial-gradient(120% 90% at 80% 0%,#000,transparent 70%);
   mask-image:radial-gradient(120% 90% at 80% 0%,#000,transparent 70%)}
.hero h2{font-size:24px;position:relative}
.hero p{position:relative}
.stat-row{display:flex;gap:10px;margin-top:14px;position:relative;flex-wrap:wrap}
.stat{flex:1;min-width:90px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.stat .n{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink)}
.stat .l{font-size:11px;color:var(--ink-faint);margin-top:2px}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}
.act{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:left;
  cursor:pointer;transition:.15s;color:var(--ink)} .act:active{transform:scale(.98);background:var(--surface2)}
.act.full{grid-column:1/-1}
.act .ic{font-size:20px;font-family:var(--mono)} .act .t{font-weight:650;margin-top:8px;font-size:15px}
.act .d{font-size:12px;color:var(--ink-faint);margin-top:2px;line-height:1.45}
.act.primary{background:linear-gradient(135deg,var(--teal-deep),#0a5f53);border-color:var(--teal-deep)}
.act.primary .d{color:#bdeee5}

.bar{height:8px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-deep),var(--teal));border-radius:6px;transition:.4s width}
.dwrap{margin:10px 0}
.dwrap .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.dwrap .top b{font-weight:600;color:var(--ink)} .dwrap .top span{font-family:var(--mono);color:var(--ink-faint);font-size:12px}

.row-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;margin:8px 0;cursor:pointer;transition:.15s}
.row-item:active{background:var(--surface2)}
.row-item .meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.row-item .title{font-weight:600;font-size:14.5px}
.row-item .sub{font-size:12px;color:var(--ink-faint);font-family:var(--mono)}
.row-item .chev{color:var(--ink-faint);font-size:18px;flex:0 0 auto}
.pill{font-family:var(--mono);font-size:10.5px;padding:3px 8px;border-radius:20px;background:var(--bg2);
  border:1px solid var(--line);color:var(--teal);flex:0 0 auto}

.guidebody p{font-size:15px}
.guidebody ul,.guidebody ol{margin:8px 0 8px 2px;padding-left:20px;color:var(--ink-dim);line-height:1.6;font-size:14.5px}
.guidebody li{margin:5px 0}
.guidebody code{font-family:var(--mono);font-size:12.5px;background:var(--bg2);border:1px solid var(--line);
  padding:1px 6px;border-radius:6px;color:var(--teal)}
.guidebody table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;display:block;overflow-x:auto}
.guidebody th,.guidebody td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
.guidebody th{background:var(--bg2);color:var(--teal);font-family:var(--mono);font-size:11px;
  text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.guidebody td{color:var(--ink-dim);line-height:1.5}
.sec{border-top:1px solid var(--line);padding-top:6px;margin-top:14px}
.sec h3{color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin:8px 0;gap:10px}
.sec h3 .x{color:var(--ink-faint);font-size:18px;font-family:var(--mono);flex:0 0 auto}
.sec .b{display:none} .sec.open .b{display:block} .sec.open h3 .x{color:var(--teal)}

.qtop{display:flex;align-items:center;justify-content:space-between;margin:8px 0 4px}
.qcount{font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
.qtimer{font-family:var(--mono);font-size:14px;color:var(--amber);font-weight:700}
.qtimer.warn{color:var(--red)}
.qprog{height:6px;background:var(--bg2);border-radius:5px;overflow:hidden;border:1px solid var(--line);margin-bottom:14px}
.qprog > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal-deep),var(--teal));transition:.3s width}
.qdomain{font-family:var(--mono);font-size:10.5px;color:var(--teal);letter-spacing:1px;text-transform:uppercase}
.qtext{font-size:17px;line-height:1.5;font-weight:550;margin:8px 0 16px}
.choice{display:block;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--line);
  border-radius:12px;padding:14px 14px;margin:9px 0;color:var(--ink);font-size:15px;line-height:1.45;
  cursor:pointer;transition:.12s;position:relative;font-family:var(--sans)}
.choice:active{transform:scale(.99)}
.choice .lab{font-family:var(--mono);font-weight:700;color:var(--ink-faint);margin-right:9px}
.choice.sel{border-color:var(--teal);background:var(--surface2)}
.choice.correct{border-color:var(--green);background:rgba(82,211,154,.12)}
.choice.correct .lab{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(255,107,107,.10)}
.choice.wrong .lab{color:var(--red)}
.choice.dim{opacity:.5}
.explain{background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--teal);
  border-radius:10px;padding:12px 14px;margin:12px 0;font-size:14px;line-height:1.55;color:var(--ink-dim);display:none}
.explain.show{display:block}
.explain .tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--teal);display:block;margin-bottom:4px}
.qbtns{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
  color:var(--ink);font-weight:650;font-size:15px;cursor:pointer;font-family:var(--sans)}
.btn:active{transform:scale(.99)}
.btn.primary{background:linear-gradient(135deg,var(--teal-deep),#0a5f53);border-color:var(--teal-deep);color:#eafff9}
.btn.ghost{background:none;color:var(--ink-faint);flex:0 0 auto;padding:14px 18px}
.btn:disabled{opacity:.4;cursor:default}

.score-ring{width:160px;height:160px;margin:14px auto 6px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .pctc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .pctc .big{font-family:var(--mono);font-size:36px;font-weight:700}
.score-ring .pctc .lab{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:1px}
.verdict{text-align:center;font-size:17px;font-weight:650;margin:6px 0}
.verdict.pass{color:var(--green)} .verdict.fail{color:var(--amber)}

.seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:3px;margin:6px 0 14px}
.seg button{flex:1;border:0;background:none;color:var(--ink-faint);font-weight:600;font-size:13px;
  padding:9px;border-radius:9px;cursor:pointer;font-family:var(--sans)}
.seg button.on{background:var(--surface);color:var(--teal)}

.fab-back{display:inline-flex;align-items:center;gap:6px;background:none;border:0;color:var(--teal);
  font-size:14px;font-weight:600;cursor:pointer;padding:6px 0;margin:2px 0;font-family:var(--sans)}
.empty{text-align:center;color:var(--ink-faint);padding:40px 20px;font-size:14px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:100px;background:var(--surface2);
  border:1px solid var(--line2);color:var(--ink);padding:10px 16px;border-radius:30px;font-size:13px;
  z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:80%}
.toast.show{opacity:1}
.flagbtn{background:none;border:1px solid var(--line);color:var(--ink-faint);font-size:12px;cursor:pointer;
  font-family:var(--mono);padding:5px 10px;border-radius:20px}
.flagbtn.on{color:var(--amber);border-color:var(--amber)}
.kfact{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.kfact:last-child{border-bottom:0}
.kfact .k{color:var(--ink-faint);flex:0 0 auto} .kfact .v{color:var(--ink);text-align:right;font-weight:550}
.note{font-size:12px;color:var(--ink-faint);text-align:center;margin:14px 0 4px;line-height:1.5}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal);margin-right:8px;flex:0 0 auto}
.navmap{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.navmap button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--surface);
  color:var(--ink-faint);font-family:var(--mono);font-size:12px;cursor:pointer}
.navmap button.answered{border-color:var(--teal-deep);color:var(--teal);background:var(--surface2)}
.navmap button.flagged{border-color:var(--amber);color:var(--amber)}
.navmap button.cur{outline:2px solid var(--teal)}
.rev-q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0}
.rev-q .rq{font-weight:600;font-size:14.5px;line-height:1.45;margin-bottom:8px}
.rev-q .ro{font-size:13px;padding:7px 10px;border-radius:8px;margin:4px 0;border:1px solid var(--line)}
.rev-q .ro.c{border-color:var(--green);background:rgba(82,211,154,.10);color:var(--ink)}
.rev-q .ro.w{border-color:var(--red);background:rgba(255,107,107,.10);color:var(--ink)}
.rev-q .ro .lab{font-family:var(--mono);font-weight:700;margin-right:8px}
.rev-q .rex{font-size:12.5px;color:var(--ink-faint);margin-top:8px;line-height:1.5;border-top:1px dashed var(--line);padding-top:8px}

</style>
</head>

<script>
/* WCA-101 Prep — application logic */
const BANK = [{"domain":"DHCPv4","q":"Which parameter does DHCP Option 1 carry?","choices":["Subnet Mask","Broadcast Address","NTP Servers","Parameter Request List"],"answer":0,"explain":"DHCP Option 1 = Subnet Mask.","id":1},{"domain":"Wireshark Features","q":"Packet comments are preserved in which file format?","choices":["CSV","pcapng","plain text","classic pcap"],"answer":1,"explain":"pcapng supports per-packet and per-file comments; classic pcap does not.","id":2},{"domain":"Filtering","q":"Which display filter isolates DHCP client traffic by its well-known TCP port?","choices":["tcp.port == 389","tcp.port == 161","tcp.port == 68","tcp.port == 5432"],"answer":2,"explain":"DHCP client uses TCP port 68.","id":3},{"domain":"Ethernet","q":"The 802.1Q TPID value is:","choices":["0x0800","0x86DD","0x0806","0x8100"],"answer":3,"explain":"0x8100 marks an 802.1Q tag; 0x0800 IPv4, 0x86DD IPv6, 0x0806 ARP.","id":4},{"domain":"ARP","q":"A gratuitous ARP is used to:","choices":["announce/refresh a host's own IP-MAC mapping and detect conflicts","request the gateway MAC","resolve a hostname","report an error"],"answer":0,"explain":"Gratuitous ARP advertises a host's own mapping for conflict detection and cache updates.","id":5},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.50.1 to 192.168.50.25 on 445 (SMB) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","packet loss in the path triggering retransmissions","a DNS misconfiguration","a VLAN tagging error"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":6},{"domain":"IPv4","q":"A packet arrives with TTL=52. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["14","13","12","15"],"answer":2,"explain":"64 - 52 = 12 hops.","id":7},{"domain":"IPv4","q":"How is the IPv4 range 100.64.0.0/10 classified?","choices":["multicast","loopback","RFC 1918 private","CGNAT shared address space"],"answer":3,"explain":"100.64.0.0/10 = CGNAT shared address space.","id":8},{"domain":"Capturing Traffic","q":"You need to run an unattended multi-day capture without filling the disk.","choices":["use a ring buffer (rotating files with size/time limits)","use Decode As","increase the snaplen","disable name resolution"],"answer":0,"explain":"A ring buffer captures into N rotating files and overwrites the oldest, bounding disk usage for long captures.","id":9},{"domain":"DNS","q":"A DNS response with rcode 4 means what?","choices":["Refused","Not implemented","NXDOMAIN (name does not exist)","No error"],"answer":1,"explain":"DNS rcode 4 = Not implemented.","id":10},{"domain":"Wireshark Features","q":"Which Wireshark element shows the dissection tree (expandable protocol layers) for the selected packet?","choices":["the packet list pane","the packet bytes pane","the packet details pane","the status bar"],"answer":2,"explain":"The packet details pane shows the layered dissection tree; selecting a field highlights its bytes below.","id":11},{"domain":"ICMPv6","q":"Duplicate Address Detection (DAD) in IPv6 is performed using:","choices":["A gratuitous ARP","A DHCPv6 Decline only","An Echo Request","A Neighbor Solicitation sent from the unspecified address (::) for the tentative address"],"answer":3,"explain":"Before using a new address, a host sends an NS for that address sourced from :: (unspecified). A returned NA means the address is already in use, so DAD fails.","id":12},{"domain":"Wireshark Features","q":"To read one connection's full payload as text, which Wireshark feature do you use?","choices":["Follow > TCP Stream","Export Objects","Protocol Hierarchy","Endpoints"],"answer":0,"explain":"Correct: Follow > TCP Stream.","id":13},{"domain":"IPv6","q":"An IPv6 address in FC00::/7 is what type?","choices":["Global unicast (currently assigned)","Unique local address (ULA)","Multicast","Link-local"],"answer":1,"explain":"FC00::/7 = Unique local address (ULA).","id":14},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 50 usable?","choices":["reserved (not a normal usable VLAN ID)","outside the 12-bit range","a valid, usable VLAN ID (1-4094)","an invalid value (>65535)"],"answer":2,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 50 is usable.","id":15},{"domain":"TCP","q":"A duplicate ACK is generated when a receiver:","choices":["receives data in order","scales the window","closes the connection","receives an out-of-order segment and re-ACKs the same expected byte"],"answer":3,"explain":"Multiple DUP ACKs (classically 3) trigger fast retransmit.","id":16},{"domain":"Ethernet","q":"Which protocol does the Ethernet EtherType value 0x8100 indicate?","choices":["802.1Q VLAN-tagged frame","IPv6","RARP","IPv4"],"answer":0,"explain":"EtherType 0x8100 identifies 802.1Q VLAN-tagged frame.","id":17},{"domain":"TCP","q":"A TCP Window Scale option with shift count 8 multiplies the window by what factor?","choices":["128","256","8","257"],"answer":1,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^8 = 256. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":18},{"domain":"Wireshark Features","q":"You need to reconstruct a file a user downloaded over HTTP from a capture. Which feature do you use?","choices":["Capture > Options","Statistics > Endpoints","File > Export Objects > HTTP","Follow UDP Stream"],"answer":2,"explain":"Export Objects reconstructs content-bearing transfers (HTTP/SMB/TFTP/FTP-DATA) so you can save the transferred file.","id":19},{"domain":"Wireshark Features","q":"Which Wireshark feature lets you get per-host traffic totals at the IP layer?","choices":["I/O Graph","Follow TCP Stream","Conversations","Statistics > Endpoints"],"answer":3,"explain":"Correct: Statistics > Endpoints.","id":20},{"domain":"ICMPv4","q":"ICMP port unreachable is Type 3 Code:","choices":["3","0","1","4"],"answer":0,"explain":"Code 3 = port unreachable (no listener); Code 4 = fragmentation needed.","id":21},{"domain":"Wireshark Features","q":"Setting a 'Time Reference' on a packet causes Wireshark to do what?","choices":["Delete all packets before it","Reset the displayed time to 0 at that packet, so subsequent times are measured relative to it","Convert timestamps to UTC","Mark the packet for export"],"answer":1,"explain":"A time reference (Ctrl+T) zeroes the time column at the selected packet. Times shown afterward are relative to that reference point, which is useful for measuring elapsed time from a specific event.","id":22},{"domain":"IPv4","q":"How is the IPv4 range 169.254.0.0/16 classified?","choices":["RFC 1918 private","multicast","APIPA / link-local","loopback"],"answer":2,"explain":"169.254.0.0/16 = APIPA / link-local.","id":23},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.1.1.11 for the gateway 10.1.1.1 get no reply. What is the most likely explanation?","choices":["an oversized window","a DNS outage","a TCP reset storm","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":24},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.10.0.11?","choices":["host 10.10.0.11","net 10.10.0.11","ip host 10.10.0.11","dst 10.10.0.11"],"answer":0,"explain":"Correct capture filter: host 10.10.0.11 (BPF syntax).","id":25},{"domain":"UDP","q":"Compared with TCP, UDP notably lacks:","choices":["A checksum","Connection establishment, acknowledgments, retransmission, and ordering (it is connectionless and unreliable)","Source and destination ports","A length field"],"answer":1,"explain":"UDP is a thin, connectionless transport with only source/destination ports, length, and checksum. It provides no handshake, ACKs, retransmission, flow control, or ordering — those are left to the application.","id":26},{"domain":"Filtering","q":"Traffic on port 995 is most commonly associated with which service/protocol?","choices":["DHCP client","FTP control","POP3S","POP3"],"answer":2,"explain":"Port 995 is the well-known port for POP3S.","id":27},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.10.0.10 for the gateway 10.10.0.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","a TCP reset storm","an oversized window","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":28},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.7.1 to 192.168.7.11 on 636 (LDAPS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","a DNS misconfiguration","normal setup","a VLAN tagging error"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":29},{"domain":"Troubleshooting","q":"Given ARP, DHCP, and ICMP all visible, a host that has an APIPA address AND sends ARPs that go unanswered AND no DHCP Offers appear suggests the problem is:","choices":["A purely application-layer bug","Layer-2/Layer-3 reachability on that segment (no DHCP, can't resolve neighbors) — likely a switch port/VLAN, cabling, or DHCP/relay fault","TCP window scaling","DNS caching"],"answer":1,"explain":"Multiple foundational services failing together (no DHCP lease, unanswered ARP) point below the application layer — a connectivity/VLAN/relay problem isolating the host on its segment.","id":30},{"domain":"TCP","q":"The TCP stream id (tcp.stream) assigned by Wireshark is used to:","choices":["Encrypt the stream","Set the sequence number","Uniquely number each TCP conversation so you can filter or follow exactly one connection","Indicate retransmissions"],"answer":2,"explain":"Wireshark assigns an incrementing tcp.stream index per TCP conversation. 'tcp.stream eq 5' isolates that connection — the basis of Follow TCP Stream and conversation-scoped analysis.","id":31},{"domain":"Wireshark Features","q":"A field shown as [Stream index: 3] in the details pane is what?","choices":["a checksum error","an encrypted field","a truncated field","a dissector-generated field (not actual bytes on the wire)"],"answer":3,"explain":"Square brackets mark computed/generated fields produced by Wireshark, never transmitted on the wire.","id":32},{"domain":"TCP","q":"The NOP option is used to:","choices":["pad options to a 4-byte boundary","carry the MSS","end the options list","acknowledge data"],"answer":0,"explain":"NOP (kind 1) aligns options; EOL (kind 0) ends the list.","id":33},{"domain":"Interface","q":"Which is a valid way to add a column for a field?","choices":["Type the field name in the filter bar","Right-click the field in the details pane and choose 'Apply as Column'","Export the packet","Change the time reference"],"answer":1,"explain":"'Apply as Column' on a selected field instantly creates a packet-list column for it. You can also add columns via Preferences > Columns with a field expression.","id":34},{"domain":"Troubleshooting","q":"In a capture: host 192.168.100.20 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","a TCP window bug","the DHCP server/relay is unreachable on that segment","an MTU mismatch"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":35},{"domain":"TCP","q":"In a capture: a SYN to 10.1.1.11:67 (DHCP server) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["DNS failed","a graceful close occurred","the service responded normally","a firewall is dropping the SYN or the host/service is unreachable"],"answer":3,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":36},{"domain":"Wireshark Features","q":"Which capability would you use to measure elapsed time from a chosen packet onward?","choices":["set a Time Reference (Ctrl+T)","a capture filter","a profile","a coloring rule"],"answer":0,"explain":"Correct: set a Time Reference (Ctrl+T).","id":37},{"domain":"Wireshark Features","q":"Export Objects can reconstruct files carried by which protocol?","choices":["ICMP","HTTP","STP","ARP"],"answer":1,"explain":"Export Objects works for content-bearing protocols: HTTP, SMB, TFTP, FTP-DATA, DICOM, IMF.","id":38},{"domain":"Troubleshooting","q":"In a capture: host 192.168.1.25 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","a TCP window bug","the DHCP server/relay is unreachable on that segment","an MTU mismatch"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":39},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.100.50?","choices":["ip host 192.168.100.50","dst 192.168.100.50","net 192.168.100.50","host 192.168.100.50"],"answer":3,"explain":"Correct capture filter: host 192.168.100.50 (BPF syntax).","id":40},{"domain":"ICMPv4","q":"ICMP Echo Request is type/code:","choices":["Type 8, Code 0","Type 0, Code 0","Type 11, Code 0","Type 3, Code 1"],"answer":0,"explain":"Echo Request = 8/0; Echo Reply = 0/0.","id":41},{"domain":"Interface","q":"Custom columns help troubleshooting because they:","choices":["reduce file size","surface a key field across many packets for fast scanning","disable dissectors","encrypt fields"],"answer":1,"explain":"A column for a field (e.g., tcp.window_size) lets you scan values without opening each packet.","id":42},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 172.20.3.1 to 172.20.3.11 on 80 (HTTP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","a DNS misconfiguration","packet loss in the path triggering retransmissions","a VLAN tagging error"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":43},{"domain":"ICMPv4","q":"What does ICMP message Type 3 represent?","choices":["Timestamp Reply","Echo Request","Echo Reply","Destination Unreachable"],"answer":3,"explain":"ICMP Type 3 = Destination Unreachable.","id":44},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.50.100?","choices":["host 192.168.50.100","ip host 192.168.50.100","dst 192.168.50.100","net 192.168.50.100"],"answer":0,"explain":"Correct capture filter: host 192.168.50.100 (BPF syntax).","id":45},{"domain":"UDP","q":"Why is UDP used for multicast/broadcast?","choices":["it is encrypted","it is connectionless, suiting one-to-many delivery","it guarantees delivery to all","it has larger headers"],"answer":1,"explain":"TCP is point-to-point; UDP's connectionless model fits multicast/broadcast.","id":46},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show IPv6 traffic?","choices":["tls.handshake","tcp.port in {80,443}","ipv6","arp"],"answer":2,"explain":"Correct display filter: ipv6","id":47},{"domain":"TCP","q":"tcp.stream is used to:","choices":["set the sequence number","indicate retransmissions","encrypt the stream","uniquely number each TCP conversation for filtering/following"],"answer":3,"explain":"tcp.stream eq N isolates one connection.","id":48},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 20 usable?","choices":["a valid, usable VLAN ID (1-4094)","reserved (not a normal usable VLAN ID)","outside the 12-bit range","an invalid value (>65535)"],"answer":0,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 20 is usable.","id":49},{"domain":"Wireshark Features","q":"Which capability would you use to save only marked packets to a new file?","choices":["Find Packet","Export Specified Packets > Marked","Protocol Hierarchy","I/O Graph"],"answer":1,"explain":"Correct: Export Specified Packets > Marked.","id":50},{"domain":"DNS","q":"A DNS 'A' record maps:","choices":["A name to an IPv6 address","An IP address to a name","A name to an IPv4 address","A name to a mail server"],"answer":2,"explain":"An A record returns an IPv4 address for a name. AAAA returns IPv6, PTR maps IP→name (reverse), MX identifies mail servers, CNAME is an alias.","id":51},{"domain":"IPv4","q":"How is the IPv4 range 10.0.0.0/8 classified?","choices":["multicast","APIPA / link-local","CGNAT shared address space","RFC 1918 private"],"answer":3,"explain":"10.0.0.0/8 = RFC 1918 private.","id":52},{"domain":"Filtering","q":"Filtering on tcp.analysis.retransmission shows what?","choices":["segments Wireshark's expert analysis flagged as retransmissions","all TCP segments","only original transmissions","ARP retransmissions"],"answer":0,"explain":"tcp.analysis.* are dissector-generated; this filter is a fast way to find suspected retransmissions.","id":53},{"domain":"DNS","q":"The DNS TC (truncated) flag causes a resolver to:","choices":["send a PTR query","retry over TCP","give up","switch to ICMP"],"answer":1,"explain":"TC signals the UDP answer was truncated; resolvers retry over TCP port 53.","id":54},{"domain":"Filtering","q":"Traffic on port 514 is most commonly associated with which service/protocol?","choices":["SSH","NTP","syslog","HTTP alt"],"answer":2,"explain":"Port 514 is the well-known port for syslog.","id":55},{"domain":"UDP","q":"Which of these protocols commonly runs over UDP?","choices":["HTTP/1.1","FTP control channel","SMTP","DNS (queries), DHCP, TFTP, SNMP, and most VoIP RTP"],"answer":3,"explain":"DNS, DHCP, TFTP, SNMP, NTP, and RTP typically use UDP. HTTP/1.1, FTP control, and SMTP use TCP. (DNS also uses TCP for large/zone-transfer responses.)","id":56},{"domain":"Interface","q":"You want to scan which hostnames are being queried. Which column field is most useful?","choices":["dns.qry.name","tcp.window_size","tcp.analysis.ack_rtt","ip.ttl"],"answer":0,"explain":"A column for dns.qry.name surfaces that field across packets for fast scanning.","id":57},{"domain":"IPv4","q":"A packet arrives with TTL=57. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["9","7","5","2"],"answer":1,"explain":"64 - 57 = 7 hops.","id":58},{"domain":"IPv4","q":"How is the IPv4 range 127.0.0.0/8 classified?","choices":["multicast","CGNAT shared address space","loopback","APIPA / link-local"],"answer":2,"explain":"127.0.0.0/8 = loopback.","id":59},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture only broadcast and multicast?","choices":["udp","arp","not port 22","broadcast or multicast"],"answer":3,"explain":"Correct capture filter: broadcast or multicast (BPF syntax).","id":60},{"domain":"DNS","q":"A DNS 'NS' record returns what?","choices":["an authoritative name server for the zone","a canonical name (alias) for another name","arbitrary text (e.g., SPF/DKIM data)","the start-of-authority zone parameters"],"answer":0,"explain":"A NS record returns an authoritative name server for the zone.","id":61},{"domain":"TCP","q":"In a capture: the handshake to 10.10.0.100:993 (IMAPS) succeeds, then 10.10.0.100 sends repeated Zero Window messages. What is the most likely explanation?","choices":["DNS is failing","the receiver {h} is application-bottlenecked (full buffer)","the gateway ARP is missing","the link is saturated"],"answer":1,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":62},{"domain":"ARP","q":"Which fields does an ARP packet contain to map the addresses?","choices":["Only sender IP and target IP","Only MAC addresses","Sender MAC, sender IP, target MAC, and target IP","Source and destination ports"],"answer":2,"explain":"ARP carries Sender Hardware Address (MAC), Sender Protocol Address (IP), Target Hardware Address (MAC), and Target Protocol Address (IP). In a request the target MAC is unknown (zeros).","id":63},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.20.0.1 to 10.20.0.33 on 993 (IMAPS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","a DNS misconfiguration","a VLAN tagging error","packet loss in the path triggering retransmissions"],"answer":3,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":64},{"domain":"TCP","q":"In a capture: the handshake to 192.168.100.10:123 (NTP) succeeds, then 192.168.100.10 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the receiver {h} is application-bottlenecked (full buffer)","the link is saturated","DNS is failing","the gateway ARP is missing"],"answer":0,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":65},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 1 identifies which encapsulated protocol?","choices":["ESP","ICMP","AH","OSPF"],"answer":1,"explain":"IP protocol 1 = ICMP. (1=ICMP,6=TCP,17=UDP.)","id":66},{"domain":"Filtering","q":"To capture only traffic from MAC address 00:11:22:33:44:55, which BPF capture filter is correct?","choices":["eth.src == 00:11:22:33:44:55","mac 00:11:22:33:44:55","ether src 00:11:22:33:44:55","ether host only"],"answer":2,"explain":"BPF syntax uses 'ether src <mac>' (or 'ether host <mac>' for either direction). 'eth.src' is display-filter syntax and invalid as a capture filter.","id":67},{"domain":"DHCPv4","q":"DHCP message-type code 8 (Option 53) corresponds to which message?","choices":["Release","NAK","Discover","Inform"],"answer":3,"explain":"DHCP type 8 = Inform.","id":68},{"domain":"IPv6","q":"2000::/3 is currently used for:","choices":["global unicast","loopback","multicast","link-local"],"answer":0,"explain":"Assigned global unicast space comes from 2000::/3.","id":69},{"domain":"TCP","q":"In a capture: the handshake to 192.168.100.50:514 (syslog) succeeds, then 192.168.100.50 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the gateway ARP is missing","the receiver {h} is application-bottlenecked (full buffer)","the link is saturated","DNS is failing"],"answer":1,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":70},{"domain":"TCP","q":"With SACK present in DUP ACKs, how can you identify the byte range of the missing segment?","choices":["From the TTL","From the window scale","The SACK block reports the contiguous range that WAS received; the gap between the ACK number and the SACK left edge is the missing range","From the IP ID"],"answer":2,"explain":"The cumulative ACK number marks the start of the gap; the SACK left edge marks where received data resumes. The bytes between them (ACK number up to SACK left edge) are the missing segment(s).","id":71},{"domain":"TCP","q":"TCP Window Scale negotiated as shift count 7 multiplies the advertised window by:","choices":["7","70","256","128 (2^7)"],"answer":3,"explain":"The window scale option specifies a left-shift; a shift of 7 multiplies the 16-bit window value by 2^7 = 128, so an advertised 500 becomes an effective 64,000 bytes.","id":72},{"domain":"Filtering","q":"Which logical expression shows only DNS traffic to or from 8.8.8.8?","choices":["dns and ip.addr == 8.8.8.8","dns or ip.addr == 8.8.8.8","dns not ip.addr == 8.8.8.8","dns && ip.src == 8.8.8.8 only"],"answer":0,"explain":"Combining with 'and' (&&) requires both conditions: the packet is DNS AND involves 8.8.8.8 in either IP field.","id":73},{"domain":"ICMPv4","q":"An ICMP Echo Request has type/code values of:","choices":["Type 0, Code 0","Type 8, Code 0","Type 3, Code 1","Type 11, Code 0"],"answer":1,"explain":"ICMP Echo Request is Type 8, Code 0; the Echo Reply is Type 0, Code 0. These are the messages used by ping.","id":74},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.1.1.1 to 10.1.1.33 on 68 (DHCP client) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a VLAN tagging error","a DNS misconfiguration","packet loss in the path triggering retransmissions","normal setup"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":75},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 3 carry?","choices":["NTP Servers","Broadcast Address","Domain Name","Router (default gateway)"],"answer":3,"explain":"DHCP Option 3 = Router (default gateway).","id":76},{"domain":"Filtering","q":"Which display filter would you use to match only traffic sourced from 172.20.3.20?","choices":["ip.src == 172.20.3.20","eth.src == 172.20.3.20","ip.dst == 172.20.3.20","ip.addr == 172.20.3.20"],"answer":0,"explain":"Correct display filter: ip.src == 172.20.3.20 (ip.addr is bidirectional; ip.src/ip.dst are directional).","id":77},{"domain":"TCP","q":"With MTU 1492, a 20-byte IP header, and a 20-byte TCP header (PPPoE), what is the TCP MSS?","choices":["1472","1452","1460","1492"],"answer":1,"explain":"MSS = 1492 - 20 - 20 = 1452 bytes (payload only).","id":78},{"domain":"ICMPv6","q":"Router Solicitation (RS) and Router Advertisement (RA) messages are used to:","choices":["Resolve MAC addresses","Tear down TCP sessions","Discover routers and obtain prefix/configuration information for IPv6 autoconfiguration (SLAAC)","Report ICMP errors"],"answer":2,"explain":"Hosts send RS (type 133) to prompt routers; routers send RA (type 134) advertising prefixes, MTU, and flags that drive Stateless Address Autoconfiguration and default-router selection.","id":79},{"domain":"IPv4","q":"A packet arrives with TTL=56. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["13","9","5","8"],"answer":3,"explain":"64 - 56 = 8 hops.","id":80},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.100.77 for the gateway 192.168.100.1 get no reply. What is the most likely explanation?","choices":["the gateway is down or unreachable on that Layer-2 segment","a TCP reset storm","a DNS outage","an oversized window"],"answer":0,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":81},{"domain":"Troubleshooting","q":"You see many tcp.analysis.retransmission and duplicate ACK packets on a flow. This most likely indicates:","choices":["A DNS problem","Packet loss somewhere in the path, triggering retransmissions and the receiver's duplicate ACKs","A NAT issue only","Normal handshake behavior"],"answer":1,"explain":"Retransmissions plus DUP ACKs are the classic packet-loss signature. Correlating where loss appears (and capturing at multiple points) helps localize the lossy segment of the path.","id":82},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.20.3.20?","choices":["dst 172.20.3.20","net 172.20.3.20","host 172.20.3.20","ip host 172.20.3.20"],"answer":2,"explain":"Correct capture filter: host 172.20.3.20 (BPF syntax).","id":83},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 6 carry?","choices":["DHCP Server Identifier","IP Address Lease Time","DHCP Message Type","Domain Name Server"],"answer":3,"explain":"DHCP Option 6 = Domain Name Server.","id":84},{"domain":"TCP","q":"TCP reassembly in Wireshark:","choices":["combines segment payloads so an upper-layer PDU is dissected as one","reorders Ethernet frames","reassembles IP fragments","merges capture files"],"answer":0,"explain":"Reassembly presents a multi-segment message (e.g., HTTP body) as a single unit.","id":85},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.16.5.10?","choices":["ip host 172.16.5.10","host 172.16.5.10","net 172.16.5.10","dst 172.16.5.10"],"answer":1,"explain":"Correct capture filter: host 172.16.5.10 (BPF syntax).","id":86},{"domain":"IPv6","q":"::1 is the IPv6:","choices":["unspecified address","default gateway","loopback","multicast group"],"answer":2,"explain":"::1/128 is loopback, like 127.0.0.1.","id":87},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.20.0.100:636 (LDAPS) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["an ARP loop","the server can't generate data","DNS failing","the receiver is the bottleneck (zero windows stall the sender)"],"answer":3,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":88},{"domain":"Ethernet","q":"Why is the FCS usually absent in Wireshark?","choices":["NIC drivers strip it before the OS sees the frame","it is encrypted","Ethernet has no FCS","Wireshark deletes it"],"answer":0,"explain":"The 4-byte FCS is validated and stripped by most NIC hardware/drivers before capture.","id":89},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.8.8.50:69 (TFTP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["an ARP loop","the receiver is the bottleneck (zero windows stall the sender)","DNS failing","the server can't generate data"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":90},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.7.150?","choices":["ip host 192.168.7.150","net 192.168.7.150","host 192.168.7.150","dst 192.168.7.150"],"answer":2,"explain":"Correct capture filter: host 192.168.7.150 (BPF syntax).","id":91},{"domain":"TCP","q":"With MTU 9000, a 20-byte IP header, and a 20-byte TCP header (jumbo frames), what is the TCP MSS?","choices":["8980","8952","8968","8960"],"answer":3,"explain":"MSS = 9000 - 20 - 20 = 8960 bytes (payload only).","id":92},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 17 identifies which encapsulated protocol?","choices":["UDP","IGMP","TCP","OSPF"],"answer":0,"explain":"IP protocol 17 = UDP. (1=ICMP,6=TCP,17=UDP.)","id":93},{"domain":"ARP","q":"In a capture you see a unicast frame stating '192.168.50.150 is at <MAC>' in response to a who-has. What is it?","choices":["an ICMP redirect","an ARP reply","an ARP request","a gratuitous ARP"],"answer":1,"explain":"A directed 'is-at' answer is an ARP reply (opcode 2).","id":94},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only MS SQL traffic by port?","choices":["tcp.port == 1433","dst port 1433 only","port 1433","portrange 1433"],"answer":2,"explain":"Correct capture filter: port 1433 (BPF syntax).","id":95},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.20.3.50?","choices":["ip host 172.20.3.50","dst 172.20.3.50","net 172.20.3.50","host 172.20.3.50"],"answer":3,"explain":"Correct capture filter: host 172.20.3.50 (BPF syntax).","id":96},{"domain":"DHCPv4","q":"What is the correct order of the four DHCP phases (DORA)?","choices":["Discover, Offer, Request, Acknowledge","Discover, Offer, Renew, Acknowledge","Detect, Offer, Request, Accept","Discover, Obtain, Request, Acknowledge"],"answer":0,"explain":"DORA = Discover (client broadcast), Offer (server proposes an address), Request (client requests the offered address), Acknowledge (server confirms the lease).","id":97},{"domain":"TCP","q":"With MTU 1400, a 20-byte IP header, and a 20-byte TCP header (a tunnel (MTU 1400)), what is the TCP MSS?","choices":["1400","1360","1368","1380"],"answer":1,"explain":"MSS = 1400 - 20 - 20 = 1360 bytes (payload only).","id":98},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 99 usable?","choices":["outside the 12-bit range","reserved (not a normal usable VLAN ID)","a valid, usable VLAN ID (1-4094)","an invalid value (>65535)"],"answer":2,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 99 is usable.","id":99},{"domain":"Capturing Traffic","q":"What captures into rotating files to bound disk usage?","choices":["promiscuous mode","a snaplen","Decode As","a ring buffer"],"answer":3,"explain":"A ring buffer rotates through N files and overwrites the oldest.","id":100},{"domain":"Filtering","q":"Which display filter isolates POP3S traffic by its well-known TCP port?","choices":["tcp.port == 995","tcp.port == 53","tcp.port == 25","tcp.port == 80"],"answer":0,"explain":"POP3S uses TCP port 995.","id":101},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.7.1 to 192.168.7.150 on 1433 (MS SQL) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","packet loss in the path triggering retransmissions","a DNS misconfiguration","a VLAN tagging error"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":102},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only SMTP traffic by port?","choices":["portrange 25","dst port 25 only","port 25","tcp.port == 25"],"answer":2,"explain":"Correct capture filter: port 25 (BPF syntax).","id":103},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.7.33 for the gateway 192.168.7.1 get no reply. What is the most likely explanation?","choices":["a TCP reset storm","an oversized window","a DNS outage","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":104},{"domain":"TCP","q":"With MTU 1500, a 40-byte IP header, and a 20-byte TCP header (IPv6, no options), what is the TCP MSS?","choices":["1440","1460","1432","1448"],"answer":0,"explain":"MSS = 1500 - 40 - 20 = 1440 bytes (payload only).","id":105},{"domain":"Interface","q":"Which column would best help you spot hop-distance or OS differences at a glance?","choices":["tcp.window_size","ip.ttl","frame.time_delta","tcp.stream"],"answer":1,"explain":"A column for ip.ttl surfaces that field across packets for fast scanning.","id":106},{"domain":"DNS","q":"Which DNS record type returns an IPv6 address?","choices":["A","MX","AAAA","NS"],"answer":2,"explain":"AAAA ('quad-A') records hold IPv6 addresses. A holds IPv4, MX mail exchangers, NS the authoritative name servers.","id":107},{"domain":"Capturing Traffic","q":"You want the capture to stop automatically after collecting 500 MB.","choices":["use Decode As","set a time reference","set a coloring rule","set a stop condition by file size"],"answer":3,"explain":"Stop conditions (after N packets/MB/minutes) bound a capture and let it terminate unattended.","id":108},{"domain":"IPv6","q":"An IPv6 address in ::/128 is what type?","choices":["Unspecified","Global unicast (currently assigned)","Unique local address (ULA)","Link-local"],"answer":0,"explain":"::/128 = Unspecified.","id":109},{"domain":"Troubleshooting","q":"In a capture you observe: an HTTP download is slow; the time-sequence graph shows frequent flat plateaus aligning with zero-window messages. What is the most likely explanation?","choices":["an ARP loop","the receiver is the bottleneck (zero windows stall the sender), not raw bandwidth","the server is too slow to generate data","DNS is failing"],"answer":1,"explain":"Plateaus coinciding with zero-window events mean the receiver repeatedly stops the sender — a receiver/app limitation.","id":110},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.20.3.33?","choices":["dst 172.20.3.33","net 172.20.3.33","host 172.20.3.33","ip host 172.20.3.33"],"answer":2,"explain":"Correct capture filter: host 172.20.3.33 (BPF syntax).","id":111},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.100.200?","choices":["ip host 192.168.100.200","net 192.168.100.200","dst 192.168.100.200","host 192.168.100.200"],"answer":3,"explain":"Correct capture filter: host 192.168.100.200 (BPF syntax).","id":112},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 100 usable?","choices":["a valid, usable VLAN ID (1-4094)","reserved (not a normal usable VLAN ID)","outside the 12-bit range","an invalid value (>65535)"],"answer":0,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 100 is usable.","id":113},{"domain":"TCP","q":"In a capture: a connection to 192.168.1.50:123 (NTP) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["an ARP failure","fast retransmit recovered a lost segment","the connection reset","the window scaled to zero"],"answer":1,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":114},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.1.1.150:1433 (MS SQL) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["DNS failing","the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)","an ARP loop"],"answer":2,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":115},{"domain":"TCP","q":"Which hex value represents the TCP FIN flag set alone?","choices":["0x002","0x010","0x020","0x001"],"answer":3,"explain":"FIN alone = 0x001.","id":116},{"domain":"Wireshark Features","q":"Which statistic groups packets into host pairs?","choices":["Conversations","Resolved Addresses","Protocol Hierarchy","Endpoints"],"answer":0,"explain":"Conversations lists communicating host pairs; Endpoints lists individual hosts.","id":117},{"domain":"DHCPv4","q":"DHCP message-type code 6 (Option 53) corresponds to which message?","choices":["Offer","NAK","Inform","Release"],"answer":1,"explain":"DHCP type 6 = NAK.","id":118},{"domain":"IPv6","q":"An IPv6 address beginning with FE80::/10 is a:","choices":["Global unicast address","Unique local address","Link-local address","Multicast address"],"answer":2,"explain":"FE80::/10 is the link-local range, automatically configured on every IPv6 interface and used for on-link communication and neighbor discovery. It is not routed off-link.","id":119},{"domain":"Filtering","q":"Which display filter would you use to match only traffic destined to 10.10.0.77?","choices":["ip.addr == 10.10.0.77","ip.src == 10.10.0.77","udp.dstport == 10.10.0.77","ip.dst == 10.10.0.77"],"answer":3,"explain":"Correct display filter: ip.dst == 10.10.0.77 (ip.addr is bidirectional; ip.src/ip.dst are directional).","id":120},{"domain":"TCP","q":"In a capture: a SYN to 172.16.5.77:443 (HTTPS/TLS) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","the service responded normally","a graceful close occurred","DNS failed"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":121},{"domain":"TCP","q":"A TCP Zero Window means:","choices":["the MSS is zero","the receiver's advertised window is 0; sender must pause","the connection is closing","the TTL expired"],"answer":1,"explain":"Zero window indicates a full receive buffer; a Window Update resumes flow.","id":122},{"domain":"ARP","q":"Which display filter shows only ARP requests?","choices":["arp","arp.isgratuitous == 1","arp.opcode == 1","arp.opcode == 2"],"answer":2,"explain":"Opcode 1 = request.","id":123},{"domain":"Filtering","q":"Traffic on port 5432 is most commonly associated with which service/protocol?","choices":["IMAP","LDAPS","DHCP client","PostgreSQL"],"answer":3,"explain":"Port 5432 is the well-known port for PostgreSQL.","id":124},{"domain":"Wireshark Features","q":"To find the heaviest host pairs by bytes, which Wireshark feature do you use?","choices":["Statistics > Conversations sorted by bytes","Protocol Hierarchy","Decode As","Find Packet"],"answer":0,"explain":"Correct: Statistics > Conversations sorted by bytes.","id":125},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.0.5.150 for the gateway 10.0.5.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","the gateway is down or unreachable on that Layer-2 segment","an oversized window","a TCP reset storm"],"answer":1,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":126},{"domain":"TCP","q":"In a capture: a SYN to 10.8.8.150:514 (syslog) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["the service responded normally","a graceful close occurred","a firewall is dropping the SYN or the host/service is unreachable","DNS failed"],"answer":2,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":127},{"domain":"Wireshark Features","q":"Which Wireshark feature lets you save only marked packets to a new file?","choices":["I/O Graph","Find Packet","Protocol Hierarchy","Export Specified Packets > Marked"],"answer":3,"explain":"Correct: Export Specified Packets > Marked.","id":128},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.16.5.77?","choices":["host 172.16.5.77","ip host 172.16.5.77","dst 172.16.5.77","net 172.16.5.77"],"answer":0,"explain":"Correct capture filter: host 172.16.5.77 (BPF syntax).","id":129},{"domain":"Filtering","q":"How can you build a display filter without typing the field name?","choices":["use a capture filter","right-click the field in the details pane and choose Apply/Prepare as Filter","edit the pcapng header","change the profile"],"answer":1,"explain":"Right-click offers Apply/Prepare as Filter (Selected, Not Selected, and/or), generating the field expression for you.","id":130},{"domain":"Capturing Traffic","q":"Which capture method is least intrusive and most reliable for seeing all frames on a link, including errors, without loading a production switch?","choices":["Capturing directly on an endpoint","SNMP polling","A network TAP (test access point)","Reading the switch MAC table"],"answer":2,"explain":"A TAP is a passive/active device inserted in-line that copies all traffic (including physical-layer errors) to a monitor port without consuming switch CPU or risking dropped frames the way a busy SPAN/port mirror can.","id":131},{"domain":"Troubleshooting","q":"In a capture: host 192.168.7.20 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","a TCP window bug","an MTU mismatch","the DHCP server/relay is unreachable on that segment"],"answer":3,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":132},{"domain":"Interface","q":"What bundles columns, coloring rules, filters, and preferences for a scenario?","choices":["a profile","a coloring rule","a time reference","a capture filter"],"answer":0,"explain":"Profiles store a self-contained analysis environment you can switch between.","id":133},{"domain":"TCP","q":"In a capture: a SYN to 172.16.9.200:443 (HTTPS/TLS) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","a firewall is dropping the SYN or the host/service is unreachable","DNS failed","the service responded normally"],"answer":1,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":134},{"domain":"TCP","q":"In a capture: a SYN to 192.168.7.33:22 (SSH) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","DNS failed","a firewall is dropping the SYN or the host/service is unreachable","the service responded normally"],"answer":2,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":135},{"domain":"TCP","q":"In a capture: the handshake to 10.0.5.33:514 (syslog) succeeds, then 10.0.5.33 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","the gateway ARP is missing","DNS is failing","the receiver {h} is application-bottlenecked (full buffer)"],"answer":3,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":136},{"domain":"Filtering","q":"Traffic on port 161 is most commonly associated with which service/protocol?","choices":["SNMP","DNS","DHCP server","MS SQL"],"answer":0,"explain":"Port 161 is the well-known port for SNMP.","id":137},{"domain":"Wireshark Features","q":"You need to save only marked packets to a new file. Which feature is correct?","choices":["Protocol Hierarchy","Export Specified Packets > Marked","I/O Graph","Find Packet"],"answer":1,"explain":"Correct: Export Specified Packets > Marked.","id":138},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 2 identifies which encapsulated protocol?","choices":["ICMP","OSPF","IGMP","UDP"],"answer":2,"explain":"IP protocol 2 = IGMP. (1=ICMP,6=TCP,17=UDP.)","id":139},{"domain":"TCP","q":"In a capture: the SYN to 172.16.9.100:25 (SMTP) is answered immediately with RST/ACK. What is the most likely explanation?","choices":["the port is open and listening","TTL expired","the packet was fragmented","the destination port is closed (no listener)"],"answer":3,"explain":"A SYN to a closed port yields RST/ACK; an open port yields SYN/ACK.","id":140},{"domain":"Interface","q":"The colored minimap/sidebar next to the scrollbar helps you:","choices":["Quickly jump to regions of interest by showing the color distribution of packets across the whole capture","Resize panes","Edit coloring rules","Change the profile"],"answer":0,"explain":"The intelligent scrollbar (minimap) renders packet colors along the scrollbar so you can spot and jump to clusters (e.g., red error packets) anywhere in the file.","id":141},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.1.50:110 (POP3) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["DNS failing","the receiver is the bottleneck (zero windows stall the sender)","the server can't generate data","an ARP loop"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":142},{"domain":"TCP","q":"With MTU 1500, a 20-byte IP header, and a 20-byte TCP header (standard Ethernet, no options), what is the TCP MSS?","choices":["1500","1452","1460","1468"],"answer":2,"explain":"MSS = 1500 - 20 - 20 = 1460 bytes (payload only).","id":143},{"domain":"Troubleshooting","q":"In a capture: host 10.1.1.33 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["an MTU mismatch","high path latency","a TCP window bug","the DHCP server/relay is unreachable on that segment"],"answer":3,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":144},{"domain":"Wireshark Features","q":"You need to reconstruct and save a file transferred over HTTP. Which feature is correct?","choices":["File > Export Objects > HTTP","Follow UDP Stream","Statistics > Endpoints","Capture Options"],"answer":0,"explain":"Correct: File > Export Objects > HTTP.","id":145},{"domain":"Capturing Traffic","q":"Which mode captures raw 802.11 management/control frames on Wi-Fi?","choices":["loopback mode","monitor (RFMON) mode","ring-buffer mode","promiscuous mode"],"answer":1,"explain":"Monitor mode captures all 802.11 frames including beacons and management/control frames.","id":146},{"domain":"TCP","q":"In a capture: a connection to 192.168.1.33:1433 (MS SQL) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the connection reset","the window scaled to zero","fast retransmit recovered a lost segment","an ARP failure"],"answer":2,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":147},{"domain":"Filtering","q":"A display filter button you create can include which of the following?","choices":["Only a single protocol name","Only capture filters","Coloring rules","Any valid display filter expression, optionally with a comment/label and filter"],"answer":3,"explain":"Filter buttons store any display-filter expression with a custom label, giving one-click access. They can be organized and exported with a profile.","id":148},{"domain":"DNS","q":"Which filter shows DNS responses only?","choices":["dns.flags.response == 1","dns.flags.response == 0","dns","dns.qry.type == 1"],"answer":0,"explain":"response==1 indicates a reply; 0 a query.","id":149},{"domain":"Filtering","q":"Which display filter isolates ARP requests only?","choices":["arp.opcode == 2","arp.opcode == 1","arp","arp.dst.proto_ipv4"],"answer":1,"explain":"ARP opcode 1 = request, 2 = reply. arp.opcode == 1 shows only requests.","id":150},{"domain":"Interface","q":"To scan source MAC addresses, which field should you add as a column?","choices":["tcp.window_size","tcp.analysis.ack_rtt","eth.src","http.host"],"answer":2,"explain":"A column for eth.src surfaces that field across packets for fast scanning.","id":151},{"domain":"Interface","q":"To watch UDP payload sizes, which field should you add as a column?","choices":["ip.ttl","tcp.seq","tcp.flags","udp.length"],"answer":3,"explain":"A column for udp.length surfaces that field across packets for fast scanning.","id":152},{"domain":"TCP","q":"In a capture: the handshake to 10.8.8.150:514 (syslog) succeeds, then 10.8.8.150 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the receiver {h} is application-bottlenecked (full buffer)","the link is saturated","DNS is failing","the gateway ARP is missing"],"answer":0,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":153},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.7.50:80 (HTTP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["an ARP loop","the receiver is the bottleneck (zero windows stall the sender)","DNS failing","the server can't generate data"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":154},{"domain":"Capturing Traffic","q":"Which syntax do capture filters use?","choices":["Wireshark display syntax","SQL","BPF (Berkeley Packet Filter)","regex only"],"answer":2,"explain":"Capture filters use BPF; display filters use Wireshark's own syntax.","id":155},{"domain":"TCP","q":"Which TCP flag, when set alone in response to a SYN, indicates the destination port is closed?","choices":["FIN","PSH","URG","RST (with ACK)"],"answer":3,"explain":"A SYN to a closed port elicits a RST (usually RST/ACK). A SYN to an open listening port elicits SYN/ACK. This difference underlies TCP port scanning detection.","id":156},{"domain":"Wireshark Features","q":"You need to plot throughput over time for a filtered subset. Which feature is correct?","choices":["Statistics > I/O Graph","Resolved Addresses","Decode As","Protocol Hierarchy"],"answer":0,"explain":"Correct: Statistics > I/O Graph.","id":157},{"domain":"Filtering","q":"Which display filter isolates NTP traffic by its well-known TCP port?","choices":["tcp.port == 21","tcp.port == 123","tcp.port == 25","tcp.port == 445"],"answer":1,"explain":"NTP uses TCP port 123.","id":158},{"domain":"Wireshark Features","q":"You want vendor names shown instead of raw MAC prefixes. Which setting?","choices":["set a time reference","enable transport name resolution","enable MAC (Ethernet) name resolution (OUI lookup)","add a coloring rule"],"answer":2,"explain":"MAC name resolution maps the OUI (first 3 bytes) to a manufacturer name via the manufacturers database.","id":159},{"domain":"TCP","q":"Window scaling exists because:","choices":["it encrypts the window","it replaces MSS","TCP cannot fragment","the 16-bit window (max 65535) is too small for high BDP paths"],"answer":3,"explain":"The scale option multiplies the window for large bandwidth-delay products.","id":160},{"domain":"Capturing Traffic","q":"What limits how many bytes per packet are stored?","choices":["the snapshot length (snaplen)","the MTU","the ring buffer count","the window size"],"answer":0,"explain":"Snaplen caps stored bytes per packet, keeping headers while dropping payload.","id":161},{"domain":"Wireshark Features","q":"Exported objects (File > Export Objects) are available for which kinds of protocols?","choices":["Only ICMP and ARP","Protocols that carry transferable content such as HTTP, SMB, TFTP, FTP-DATA, and IMF","Any TCP protocol regardless of content","Only encrypted protocols"],"answer":1,"explain":"Export Objects reconstructs files/objects carried by content-bearing protocols like HTTP, SMB, TFTP, FTP-DATA, DICOM, and IMF (email), letting you save the transferred files.","id":162},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture a port range 1000-2000?","choices":["icmp","tcp","portrange 1000-2000","host 10.0.0.5"],"answer":2,"explain":"Correct capture filter: portrange 1000-2000 (BPF syntax).","id":163},{"domain":"TCP","q":"TCP reassembly in Wireshark refers to:","choices":["Reordering Ethernet frames","Reassembling IP fragments","Merging two capture files","Combining the payloads of multiple TCP segments so an upper-layer protocol (e.g., HTTP) can be dissected as a single PDU"],"answer":3,"explain":"TCP reassembly stitches segment payloads together so a message spanning several segments (like an HTTP response body) is presented and dissected as one unit. It is controlled by a TCP protocol preference.","id":164},{"domain":"Troubleshooting","q":"In a capture you observe: outbound packets captured on the sending host show 'checksum incorrect' but communication works. What is the most likely explanation?","choices":["checksum offloading: the NIC computes the checksum after Wireshark captures the frame","the cable is faulty","the remote host is misconfigured","an MTU mismatch"],"answer":0,"explain":"With TX checksum offload, the field is still blank when Wireshark captures it in software; this is a benign capture artifact.","id":165},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.50.1 to 192.168.50.200 on 68 (DHCP client) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a VLAN tagging error","packet loss in the path triggering retransmissions","normal setup","a DNS misconfiguration"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":166},{"domain":"TCP","q":"What is the purpose of the TCP FIN flag?","choices":["mark data as urgent (urgent pointer valid)","abruptly reset/abort or refuse a connection","gracefully finish/close one direction","push buffered data to the application promptly"],"answer":2,"explain":"FIN is used to gracefully finish/close one direction (bit 0x001).","id":167},{"domain":"Wireshark Features","q":"Which capability would you use to find the heaviest host pairs by bytes?","choices":["Find Packet","Decode As","Protocol Hierarchy","Statistics > Conversations sorted by bytes"],"answer":3,"explain":"Correct: Statistics > Conversations sorted by bytes.","id":168},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.100.200 for the gateway 192.168.100.1 get no reply. What is the most likely explanation?","choices":["the gateway is down or unreachable on that Layer-2 segment","an oversized window","a TCP reset storm","a DNS outage"],"answer":0,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":169},{"domain":"Wireshark Features","q":"Which capability would you use to see a percentage breakdown of all protocols present?","choices":["Capture File Properties","Statistics > Protocol Hierarchy","Follow TCP Stream","Conversations"],"answer":1,"explain":"Correct: Statistics > Protocol Hierarchy.","id":170},{"domain":"IPv4","q":"Why must NAT be considered when capturing and analyzing traffic at different points?","choices":["NAT encrypts the payload","NAT changes the TTL to 0","NAT rewrites IP addresses (and often ports), so the same flow appears with different addresses on each side of the NAT device","NAT removes the TCP header"],"answer":2,"explain":"A NAT device translates private↔public addresses/ports. Captures taken inside vs. outside the NAT show different source/destination tuples for the same conversation, which can confuse correlation if not accounted for.","id":171},{"domain":"TCP","q":"What is the purpose of the TCP 'NOP' option (kind 1)?","choices":["negotiate use of selective acknowledgments","mark the end of the options list","carry timestamps for RTT measurement and PAWS","pad options to a 4-byte boundary"],"answer":3,"explain":"NOP (kind 1) is used to pad options to a 4-byte boundary.","id":172},{"domain":"Interface","q":"What temporarily highlights all packets of one conversation?","choices":["Colorize Conversation","Decode As","a capture filter","Find Packet"],"answer":0,"explain":"Colorize Conversation applies a temporary color to a selected conversation's packets.","id":173},{"domain":"TCP","q":"What is the purpose of the TCP RST flag?","choices":["mark data as urgent (urgent pointer valid)","abruptly reset/abort or refuse a connection","gracefully finish/close one direction","push buffered data to the application promptly"],"answer":1,"explain":"RST is used to abruptly reset/abort or refuse a connection (bit 0x004).","id":174},{"domain":"ICMPv6","q":"Neighbor Solicitation is sent to which address?","choices":["all-routers multicast","the broadcast address","a solicited-node multicast address (FF02::1:FFxx:xxxx)","the target's global unicast"],"answer":2,"explain":"NS targets the solicited-node multicast derived from the target's low 24 bits.","id":175},{"domain":"TCP","q":"A TCP Window Scale option with shift count 5 multiplies the window by what factor?","choices":["5","33","16","32"],"answer":3,"explain":"The Window Scale option left-shifts the 16-bit window value by the shift count, so 2^5 = 32. This lets effective windows exceed the 65,535-byte base limit on high bandwidth-delay paths.","id":176},{"domain":"Wireshark Features","q":"You need to read one connection's full payload as text. Which feature is correct?","choices":["Follow > TCP Stream","Export Objects","Endpoints","Protocol Hierarchy"],"answer":0,"explain":"Correct: Follow > TCP Stream.","id":177},{"domain":"ICMPv6","q":"Duplicate Address Detection uses what?","choices":["a DHCPv6 Decline","a Neighbor Solicitation sourced from :: for the tentative address","a gratuitous ARP","an Echo Request"],"answer":1,"explain":"DAD sends an NS from :: for the new address; a returned NA means it's in use.","id":178},{"domain":"Filtering","q":"Traffic on port 3389 is most commonly associated with which service/protocol?","choices":["HTTPS/TLS","RADIUS","RDP","DHCP server"],"answer":2,"explain":"Port 3389 is the well-known port for RDP.","id":179},{"domain":"Interface","q":"You want to group packets by TCP conversation. Which column field is most useful?","choices":["ip.id","eth.src","ip.ttl","tcp.stream"],"answer":3,"explain":"A column for tcp.stream surfaces that field across packets for fast scanning.","id":180},{"domain":"Filtering","q":"Which display filter isolates LDAPS traffic by its well-known TCP port?","choices":["tcp.port == 636","tcp.port == 1433","tcp.port == 443","tcp.port == 80"],"answer":0,"explain":"LDAPS uses TCP port 636.","id":181},{"domain":"ICMPv4","q":"ICMP Echo Reply is type/code:","choices":["Type 5, Code 0","Type 0, Code 0","Type 8, Code 0","Type 3, Code 3"],"answer":1,"explain":"Echo Reply = 0/0; Echo Request = 8/0.","id":182},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.10.0.25?","choices":["ip host 10.10.0.25","dst 10.10.0.25","host 10.10.0.25","net 10.10.0.25"],"answer":2,"explain":"Correct capture filter: host 10.10.0.25 (BPF syntax).","id":183},{"domain":"Troubleshooting","q":"In a capture you observe: throughput is far below link capacity on a high-latency path, and the window never grows large. What is the most likely explanation?","choices":["an ARP problem","packet loss","a DNS failure","the bandwidth-delay product limit: window is too small for the RTT (window scaling not in effect)"],"answer":3,"explain":"Throughput ≈ window/RTT. On high-RTT links a small (unscaled) window caps speed regardless of bandwidth; window scaling fixes it.","id":184},{"domain":"Wireshark Features","q":"In the Conversations window, what uniquely identifies a TCP conversation?","choices":["The 5-tuple: source IP, destination IP, source port, destination port, and protocol","Source MAC and destination MAC","Only the source and destination IP addresses","The TCP stream graph slope"],"answer":0,"explain":"A TCP conversation is defined by the 5-tuple (src IP, dst IP, src port, dst port, protocol). Wireshark also assigns it a stream index accessible via tcp.stream.","id":185},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.10.0.1 to 10.10.0.10 on 143 (IMAP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","packet loss in the path triggering retransmissions","normal setup","a VLAN tagging error"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":186},{"domain":"DNS","q":"How can DNS traffic help you identify other relevant traffic in a capture?","choices":["DNS encrypts the payload","DNS assigns MAC addresses","DNS queries/responses reveal the hostnames and resolved IPs that subsequent connections use, letting you map IPs back to services/domains","DNS sets the TTL of TCP"],"answer":2,"explain":"By correlating a DNS response (name→IP) with later flows to that IP, you can attribute otherwise anonymous IP conversations to a known hostname/service — valuable in both troubleshooting and security analysis.","id":187},{"domain":"TCP","q":"The TCP three-way handshake consists of which sequence of flags?","choices":["SYN → ACK → FIN","SYN → RST → ACK","ACK → SYN → ACK","SYN → SYN/ACK → ACK"],"answer":3,"explain":"Connection setup is SYN (client), SYN-ACK (server acknowledging and synchronizing its own ISN), then ACK (client). After this exchange both sides have synchronized sequence numbers.","id":188},{"domain":"Interface","q":"You want to spot hop-distance or OS differences at a glance. Which column field is most useful?","choices":["ip.ttl","frame.time_delta","tcp.flags","dns.qry.name"],"answer":0,"explain":"A column for ip.ttl surfaces that field across packets for fast scanning.","id":189},{"domain":"TCP","q":"In a capture: a connection to 10.10.0.150:1812 (RADIUS) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the connection reset","fast retransmit recovered a lost segment","an ARP failure","the window scaled to zero"],"answer":1,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":190},{"domain":"Ethernet","q":"The 12-bit VLAN ID field allows how many VLANs, and which values are reserved?","choices":["256 VLANs; 0 reserved","1024 VLANs; none reserved","4096 values (0–4095); 0 and 4095 are reserved, giving 4094 usable VLANs","65536 VLANs; 0 reserved"],"answer":2,"explain":"The VID is 12 bits = 4096 values. 0 indicates priority-tagged frames and 4095 is reserved, leaving 1–4094 (4094) usable VLAN IDs.","id":191},{"domain":"Troubleshooting","q":"In a capture: host 192.168.50.25 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["a TCP window bug","an MTU mismatch","high path latency","the DHCP server/relay is unreachable on that segment"],"answer":3,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":192},{"domain":"ICMPv4","q":"ICMP error messages embed what to identify the trigger?","choices":["the original IP header plus first 8 bytes of payload","only the checksum","only the TTL","the full payload always"],"answer":0,"explain":"The embedded header+8 bytes let Wireshark link the error to the original packet.","id":193},{"domain":"Filtering","q":"Which Wireshark display filter would you use to match packets to or from IP 10.1.1.1?","choices":["frame.len > 1000","ip.addr == 10.1.1.1","tls.handshake","icmp.type == 8"],"answer":1,"explain":"Correct display filter: ip.addr == 10.1.1.1","id":194},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 3000 usable?","choices":["reserved (not a normal usable VLAN ID)","an invalid value (>65535)","a valid, usable VLAN ID (1-4094)","outside the 12-bit range"],"answer":2,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 3000 is usable.","id":195},{"domain":"ICMPv4","q":"ICMP Type 5 (Redirect) is sent by a router to:","choices":["Report congestion","Acknowledge an echo","Indicate TTL expiry","Tell a host to use a better next-hop gateway for a destination"],"answer":3,"explain":"An ICMP Redirect informs a host that a more optimal gateway exists
