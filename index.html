for a particular destination, prompting it to update its routing for that traffic.","id":196},{"domain":"Troubleshooting","q":"In a capture: host 172.16.9.10 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["the DHCP server/relay is unreachable on that segment","high path latency","an MTU mismatch","a TCP window bug"],"answer":0,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":197},{"domain":"Wireshark Features","q":"What does the Endpoints statistics window primarily display?","choices":["Pairs of communicating hosts","Individual hosts (by MAC, IP, or port) with traffic totals per host","Only the default gateway","The protocol hierarchy"],"answer":1,"explain":"Endpoints lists individual endpoints at each layer (Ethernet, IPv4, IPv6, TCP, UDP) with per-endpoint packet/byte counts — distinct from Conversations, which lists host pairs.","id":198},{"domain":"Troubleshooting","q":"In a capture you observe: a host has a 169.254.x.x address and is repeatedly broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["an MTU mismatch","a TCP window-scaling bug","the DHCP server or relay is unreachable on that segment","high path latency"],"answer":2,"explain":"APIPA plus unanswered Discovers means DHCP cannot complete — server down, scope exhausted, or missing/broken relay (ip helper).","id":199},{"domain":"Interface","q":"The Layout preferences let you do what?","choices":["encrypt the file","add a capture engine","change BPF syntax","rearrange or hide the list/details/bytes panes and add panes"],"answer":3,"explain":"Layout controls pane arrangement and optional panes like the packet diagram.","id":200},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 172.16.5.10 for the gateway 172.16.5.1 get no reply. What is the most likely explanation?","choices":["the gateway is down or unreachable on that Layer-2 segment","a DNS outage","a TCP reset storm","an oversized window"],"answer":0,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":201},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.100.1 to 192.168.100.25 on 68 (DHCP client) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","packet loss in the path triggering retransmissions","normal setup","a VLAN tagging error"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":202},{"domain":"IPv6","q":"FE80::/10 addresses are:","choices":["unique local","global unicast","link-local","multicast"],"answer":2,"explain":"FE80::/10 is link-local, auto-configured per interface.","id":203},{"domain":"Filtering","q":"Which display filter isolates HTTPS/TLS traffic by its well-known TCP port?","choices":["tcp.port == 25","tcp.port == 3389","tcp.port == 53","tcp.port == 443"],"answer":3,"explain":"HTTPS/TLS uses TCP port 443.","id":204},{"domain":"Filtering","q":"Which display filter isolates LDAP traffic by its well-known TCP port?","choices":["tcp.port == 389","tcp.port == 68","tcp.port == 514","tcp.port == 636"],"answer":0,"explain":"LDAP uses TCP port 389.","id":205},{"domain":"IPv6","q":"What type of IPv6 address is 2606:4700::1?","choices":["Link-local","Global unicast","Multicast (all-routers)","Multicast (all-nodes)"],"answer":1,"explain":"2606:4700::1 is Global unicast.","id":206},{"domain":"Wireshark Features","q":"You need to dissect traffic on a nonstandard port as a chosen protocol. Which feature is correct?","choices":["a time reference","a coloring rule","Decode As","Export Specified Packets"],"answer":2,"explain":"Correct: Decode As.","id":207},{"domain":"Troubleshooting","q":"In a capture: host 10.8.8.10 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["a TCP window bug","high path latency","an MTU mismatch","the DHCP server/relay is unreachable on that segment"],"answer":3,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":208},{"domain":"Filtering","q":"Which Wireshark display filter would you use to match the TCP conversation with stream index 4?","choices":["tcp.stream eq 4","tcp.analysis.duplicate_ack","icmp.type == 8","tcp.port == 443"],"answer":0,"explain":"Correct display filter: tcp.stream eq 4","id":209},{"domain":"Troubleshooting","q":"In a capture you observe: every SMB request is followed ~40 ms later by its response, with zero packet loss across the transfer. What is the most likely explanation?","choices":["an Ethernet CRC problem","high path RTT throttling a chatty, round-trip-bound protocol","packet loss","a zero-window condition"],"answer":1,"explain":"Loss-free but uniformly spaced request/response pairs indicate RTT-bound behavior; reducing round trips or latency helps more than bandwidth.","id":210},{"domain":"DHCPv4","q":"DHCP message-type code 7 (Option 53) corresponds to which message?","choices":["Discover","Request","Release","Decline"],"answer":2,"explain":"DHCP type 7 = Release.","id":211},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.50.11 for the gateway 192.168.50.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","an oversized window","a TCP reset storm","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":212},{"domain":"TCP","q":"Which hex value represents the TCP SYN flag set alone?","choices":["0x002","0x010","0x001","0x020"],"answer":0,"explain":"SYN alone = 0x002.","id":213},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.8.8.33:123 (NTP) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)","DNS failing","an ARP loop"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":214},{"domain":"Troubleshooting","q":"In a capture: host 10.0.5.25 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["an MTU mismatch","a TCP window bug","the DHCP server/relay is unreachable on that segment","high path latency"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":215},{"domain":"ARP","q":"An ARP reply is typically sent as what?","choices":["A broadcast","A multicast","An ICMP message","A unicast directly back to the requester's MAC"],"answer":3,"explain":"The replying host now knows the requester's MAC (it was in the request), so the ARP reply is unicast back to the original sender.","id":216},{"domain":"UDP","q":"UDP lacks which of these (vs TCP)?","choices":["handshake, ACKs, retransmission, and ordering","ports","a checksum","a length field"],"answer":0,"explain":"UDP is connectionless with only ports, length, and checksum.","id":217},{"domain":"TCP","q":"The PSH flag requests the receiver to:","choices":["scale the window","deliver buffered data to the application promptly","reset the connection","retransmit"],"answer":1,"explain":"PSH pushes data up immediately, common on a message's last segment.","id":218},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.8.8.20:993 (IMAPS) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["an ARP loop","the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)","DNS failing"],"answer":2,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":219},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.50.77:993 (IMAPS) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["an ARP loop","DNS failing","the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)"],"answer":3,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":220},{"domain":"Capturing Traffic","q":"What does promiscuous mode allow a wired NIC to do?","choices":["Pass to the OS all frames it sees on the segment, not just those addressed to its own MAC","Inject crafted packets","Decrypt WPA2 traffic","Capture on multiple interfaces simultaneously"],"answer":0,"explain":"In promiscuous mode the NIC delivers all frames it receives regardless of destination MAC. On a switched network you still only see frames the switch forwards to your port, which is why TAPs/SPAN are used.","id":221},{"domain":"Interface","q":"Which column would best help you group packets by TCP conversation?","choices":["frame.time_delta","tcp.stream","ip.id","tcp.window_size"],"answer":1,"explain":"A column for tcp.stream surfaces that field across packets for fast scanning.","id":222},{"domain":"Ethernet","q":"Which EtherType marks an IPv4 payload?","choices":["0x8100","0x0806","0x0800","0x86DD"],"answer":2,"explain":"EtherType 0x0800 indicates an IPv4 payload, telling the receiver to hand the frame to the IPv4 dissector.","id":223},{"domain":"ICMPv4","q":"What does ICMP message Type 8 represent?","choices":["Timestamp Request","Timestamp Reply","Redirect","Echo Request"],"answer":3,"explain":"ICMP Type 8 = Echo Request.","id":224},{"domain":"Wireshark Features","q":"What does the colored minimap beside the scrollbar represent?","choices":["the color distribution of packets across the whole capture","the conversation list","the protocol hierarchy","the byte offsets"],"answer":0,"explain":"The intelligent scrollbar (minimap) renders packet colors so you can jump to clusters of interest.","id":225},{"domain":"ARP","q":"ARP opcode 1 is:","choices":["a reply","a request","gratuitous","an error"],"answer":1,"explain":"Opcode 1 = request, 2 = reply.","id":226},{"domain":"TCP","q":"A 'TCP Zero Window' message means:","choices":["The connection is closing","The MSS is zero","The receiver's advertised window is 0, telling the sender to stop sending until buffer space frees up","The TTL expired"],"answer":2,"explain":"A zero window indicates the receiver's buffer is full; the sender must pause. Window Update packets later signal that space is available again. Persistent zero windows indicate a slow/overwhelmed receiver.","id":227},{"domain":"DNS","q":"When a DNS response sets the TC (truncated) flag, the resolver typically:","choices":["Gives up","Switches to ICMP","Sends a PTR query","Retries the query over TCP because the answer exceeded what UDP could carry"],"answer":3,"explain":"The TC bit signals the UDP response was truncated; well-behaved resolvers then re-issue the query over TCP (port 53) to receive the full response (also common with large/DNSSEC answers).","id":228},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.10.0.77:636 (LDAPS) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","DNS failing","the server can't generate data","an ARP loop"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":229},{"domain":"TCP","q":"In a capture: a SYN to 10.8.8.77:69 (TFTP) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","a firewall is dropping the SYN or the host/service is unreachable","the service responded normally","DNS failed"],"answer":1,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":230},{"domain":"IPv6","q":"An IPv6 address in FF00::/8 is what type?","choices":["Unspecified","Unique local address (ULA)","Multicast","Global unicast (currently assigned)"],"answer":2,"explain":"FF00::/8 = Multicast.","id":231},{"domain":"TCP","q":"In a capture: a SYN to 172.16.9.25:53 (DNS) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","the service responded normally","DNS failed","a firewall is dropping the SYN or the host/service is unreachable"],"answer":3,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":232},{"domain":"Ethernet","q":"In 802.1Q, is VLAN ID 1 usable?","choices":["a valid, usable VLAN ID (1-4094)","reserved (not a normal usable VLAN ID)","an invalid value (>65535)","outside the 12-bit range"],"answer":0,"explain":"VID is 12 bits (0-4095); 0 and 4095 are reserved, so 1-4094 are usable. 1 is usable.","id":233},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 192.168.7.50:995 (POP3S) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)","an ARP loop","DNS failing"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":234},{"domain":"ICMPv6","q":"ICMPv6 Neighbor Advertisement messages are ICMPv6 type:","choices":["133","134","136","135"],"answer":2,"explain":"Type 133 = Router Solicitation, 134 = Router Advertisement, 135 = Neighbor Solicitation, 136 = Neighbor Advertisement.","id":235},{"domain":"Filtering","q":"Which display filter isolates HTTP traffic by its well-known TCP port?","choices":["tcp.port == 53","tcp.port == 5432","tcp.port == 1433","tcp.port == 80"],"answer":3,"explain":"HTTP uses TCP port 80.","id":236},{"domain":"ICMPv4","q":"An ICMP Type 3, Code 4 ('fragmentation needed and DF set') is significant because it indicates:","choices":["A Path MTU Discovery event — a router needed to fragment but the Don't Fragment bit was set, so it dropped the packet and reported the next-hop MTU","A normal ping reply","An ARP failure","A TCP reset"],"answer":0,"explain":"This message is central to Path MTU Discovery. If these are blocked (an 'ICMP black hole'), PMTUD fails and large packets are silently dropped, causing stalls.","id":237},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.20.0.1 to 10.20.0.10 on 993 (IMAPS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a VLAN tagging error","packet loss in the path triggering retransmissions","a DNS misconfiguration","normal setup"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":238},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture only traffic from MAC 00:11:22:33:44:55?","choices":["tcp dst port 80","broadcast or multicast","ether src 00:11:22:33:44:55","portrange 1000-2000"],"answer":2,"explain":"Correct capture filter: ether src 00:11:22:33:44:55 (BPF syntax).","id":239},{"domain":"Troubleshooting","q":"In a capture you observe: your single capture point shows [TCP ACKed unseen segment] and sequence gaps, yet both endpoints work fine. What is the most likely explanation?","choices":["a DNS failure","genuine packet loss the hosts experienced","a routing loop","your capture point dropped packets or saw only one direction (a capture artifact)"],"answer":3,"explain":"'ACKed unseen segment' while the conversation still progresses usually means the sniffer missed frames, not a real loss event.","id":240},{"domain":"ICMPv6","q":"ICMPv6 Type 134 corresponds to which message?","choices":["Router Advertisement","Redirect","Router Solicitation","Echo Request"],"answer":0,"explain":"ICMPv6 Type 134 = Router Advertisement.","id":241},{"domain":"Troubleshooting","q":"In a capture: host 172.16.9.200 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","the DHCP server/relay is unreachable on that segment","an MTU mismatch","a TCP window bug"],"answer":1,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":242},{"domain":"Wireshark Features","q":"Which statistic lists individual hosts with per-host totals?","choices":["Conversations","I/O Graph","Endpoints","Capture File Properties"],"answer":2,"explain":"Endpoints shows per-endpoint totals at each layer; Conversations shows pairs.","id":243},{"domain":"Wireshark Features","q":"To save only marked packets to a new file, which Wireshark feature do you use?","choices":["Find Packet","I/O Graph","Protocol Hierarchy","Export Specified Packets > Marked"],"answer":3,"explain":"Correct: Export Specified Packets > Marked.","id":244},{"domain":"TCP","q":"In a capture: a SYN to 172.20.3.20:8080 (HTTP alt) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","a graceful close occurred","the service responded normally","DNS failed"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":245},{"domain":"Troubleshooting","q":"A TCP stream that completes its handshake, transfers a little data, then shows a RST from the server mid-transfer most likely indicates:","choices":["Normal graceful close","The server aborted the connection (application error/crash, timeout, or policy), not a clean shutdown","High RTT","A DHCP failure"],"answer":1,"explain":"A mid-stream RST is an abrupt abort. Unlike a FIN-based graceful close, it signals the application or a device forcibly terminated the session — investigate server logs/policy or an in-path device.","id":246},{"domain":"Wireshark Features","q":"You need to show vendor names instead of MAC prefixes. Which feature is correct?","choices":["set a time reference","enable transport resolution","enable MAC name resolution","add a coloring rule"],"answer":2,"explain":"Correct: enable MAC name resolution.","id":247},{"domain":"TCP","q":"With MTU 1500, a 20-byte IP header, and a 40-byte TCP header (40 bytes of TCP options), what is the TCP MSS?","choices":["1460","1448","1432","1440"],"answer":3,"explain":"MSS = 1500 - 20 - 40 = 1440 bytes (payload only).","id":248},{"domain":"TCP","q":"TCP sequence and acknowledgment numbers provide reliability by:","choices":["Numbering each byte so the receiver can detect loss/duplication and acknowledge the next expected byte","Encrypting the data","Setting the TTL","Compressing the payload"],"answer":0,"explain":"TCP assigns a sequence number to bytes; the ACK number tells the sender the next byte expected (cumulative acknowledgment). Gaps reveal loss, enabling retransmission and correct ordering.","id":249},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only HTTPS/TLS traffic by port?","choices":["tcp.port == 443","port 443","portrange 443","dst port 443 only"],"answer":1,"explain":"Correct capture filter: port 443 (BPF syntax).","id":250},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.8.8.33:8080 (HTTP alt) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["an ARP loop","DNS failing","the receiver is the bottleneck (zero windows stall the sender)","the server can't generate data"],"answer":2,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":251},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 172.16.9.77 for the gateway 172.16.9.1 get no reply. What is the most likely explanation?","choices":["an oversized window","a DNS outage","a TCP reset storm","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":252},{"domain":"Ethernet","q":"Which field in the Ethernet II header immediately follows the source MAC address (in an untagged frame)?","choices":["EtherType/Length","FCS","Preamble","Payload"],"answer":0,"explain":"Ethernet II order is: Destination MAC (6) → Source MAC (6) → EtherType (2) → Payload → FCS. The 2-byte EtherType follows the source MAC.","id":253},{"domain":"Wireshark Features","q":"Which capability would you use to locate a packet containing a specific text string?","choices":["a coloring rule","Find Packet (Ctrl+F), String search","a profile","a capture filter"],"answer":1,"explain":"Correct: Find Packet (Ctrl+F), String search.","id":254},{"domain":"ICMPv4","q":"An ICMP Destination Unreachable (Type 3) Code 2 indicates what?","choices":["net unreachable","fragmentation needed and DF set","protocol unreachable","port unreachable"],"answer":2,"explain":"Type 3 Code 2 = protocol unreachable.","id":255},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show TLS handshake traffic?","choices":["arp","frame.len > 1000","dns.flags.response == 1","tls.handshake"],"answer":3,"explain":"Correct display filter: tls.handshake","id":256},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.20.3.11?","choices":["host 172.20.3.11","net 172.20.3.11","dst 172.20.3.11","ip host 172.20.3.11"],"answer":0,"explain":"Correct capture filter: host 172.20.3.11 (BPF syntax).","id":257},{"domain":"Filtering","q":"Which display filter would you use to match only traffic sourced from 172.20.3.77?","choices":["ip.dst == 172.20.3.77","ip.src == 172.20.3.77","ip.addr == 172.20.3.77","eth.src == 172.20.3.77"],"answer":1,"explain":"Correct display filter: ip.src == 172.20.3.77 (ip.addr is bidirectional; ip.src/ip.dst are directional).","id":258},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.10.0.1 to 10.10.0.77 on 25 (SMTP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","a DNS misconfiguration","packet loss in the path triggering retransmissions","a VLAN tagging error"],"answer":2,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":259},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.10.0.11 for the gateway 10.10.0.1 get no reply. What is the most likely explanation?","choices":["a TCP reset storm","an oversized window","a DNS outage","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":260},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 51 carry?","choices":["IP Address Lease Time","DHCP Server Identifier","Router (default gateway)","Host Name"],"answer":0,"explain":"DHCP Option 51 = IP Address Lease Time.","id":261},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 50 identifies which encapsulated protocol?","choices":["ICMP","ESP","GRE","AH"],"answer":1,"explain":"IP protocol 50 = ESP. (1=ICMP,6=TCP,17=UDP.)","id":262},{"domain":"Wireshark Features","q":"To plot throughput over time for a filtered subset, which Wireshark feature do you use?","choices":["Protocol Hierarchy","Resolved Addresses","Statistics > I/O Graph","Decode As"],"answer":2,"explain":"Correct: Statistics > I/O Graph.","id":263},{"domain":"ICMPv6","q":"ICMPv6 Type 129 corresponds to which message?","choices":["Redirect","Neighbor Advertisement","Router Solicitation","Echo Reply"],"answer":3,"explain":"ICMPv6 Type 129 = Echo Reply.","id":264},{"domain":"DNS","q":"How does DNS help attribute anonymous IP flows?","choices":["correlate the name->IP answer with later connections to that IP","it assigns MACs","it sets TCP TTL","it encrypts payloads"],"answer":0,"explain":"Mapping a DNS answer to subsequent flows labels opaque IP conversations by hostname.","id":265},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 88 identifies which encapsulated protocol?","choices":["TCP","EIGRP","ICMP","OSPF"],"answer":1,"explain":"IP protocol 88 = EIGRP. (1=ICMP,6=TCP,17=UDP.)","id":266},{"domain":"IPv4","q":"A packet arrives with TTL=123. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["3","2","5","8"],"answer":2,"explain":"128 - 123 = 5 hops.","id":267},{"domain":"Wireshark Features","q":"You need to see a percentage breakdown of all protocols present. Which feature is correct?","choices":["Conversations","Follow TCP Stream","Capture File Properties","Statistics > Protocol Hierarchy"],"answer":3,"explain":"Correct: Statistics > Protocol Hierarchy.","id":268},{"domain":"Ethernet","q":"How do you identify a multicast MAC address by inspection?","choices":["The least significant bit of the first octet (the I/G bit) is 1, and it is not all-ones","The first byte is FF","The address starts with 00","The last byte is 01"],"answer":0,"explain":"The Individual/Group (I/G) bit — the low-order bit of the first octet — is 1 for group (multicast) addresses, e.g., 01:00:5E:xx:xx:xx for IPv4 multicast. All-ones is the special broadcast case.","id":269},{"domain":"Filtering","q":"Traffic on port 80 is most commonly associated with which service/protocol?","choices":["DHCP client","HTTP","TFTP","MySQL"],"answer":1,"explain":"Port 80 is the well-known port for HTTP.","id":270},{"domain":"Filtering","q":"Which display filter isolates PostgreSQL traffic by its well-known TCP port?","choices":["tcp.port == 110","tcp.port == 389","tcp.port == 5432","tcp.port == 3389"],"answer":2,"explain":"PostgreSQL uses TCP port 5432.","id":271},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 55 carry?","choices":["DHCP Message Type","IP Address Lease Time","Host Name","Parameter Request List"],"answer":3,"explain":"DHCP Option 55 = Parameter Request List.","id":272},{"domain":"Capturing Traffic","q":"On-device (router) captures carry which key caution?","choices":["they consume device CPU/memory and are often scoped to selected interfaces","they always capture L1 errors","they require monitor mode","they cannot save to pcap"],"answer":0,"explain":"Embedded captures use the device's resources and usually target specific interfaces/punted traffic.","id":273},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.20.0.200 for the gateway 10.20.0.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","the gateway is down or unreachable on that Layer-2 segment","a TCP reset storm","an oversized window"],"answer":1,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":274},{"domain":"Interface","q":"To group packets by TCP conversation, which field should you add as a column?","choices":["tcp.flags","ip.ttl","tcp.stream","tcp.seq"],"answer":2,"explain":"A column for tcp.stream surfaces that field across packets for fast scanning.","id":275},{"domain":"Filtering","q":"Which display filter isolates MS SQL traffic by its well-known TCP port?","choices":["tcp.port == 67","tcp.port == 1812","tcp.port == 143","tcp.port == 1433"],"answer":3,"explain":"MS SQL uses TCP port 1433.","id":276},{"domain":"Capturing Traffic","q":"Monitor mode is specifically associated with which type of capture?","choices":["802.11 wireless capture, allowing capture of management/control frames and other SSIDs","USB capture","Loopback capture","USB and serial only"],"answer":0,"explain":"Monitor (RFMON) mode on a Wi-Fi adapter captures raw 802.11 frames — including beacons, management, and control frames — not just data frames for the network you are associated with.","id":277},{"domain":"Filtering","q":"Traffic on port 67 is most commonly associated with which service/protocol?","choices":["MS SQL","DHCP server","SSH","SMB"],"answer":1,"explain":"Port 67 is the well-known port for DHCP server.","id":278},{"domain":"TCP","q":"In a capture: the handshake to 192.168.100.33:389 (LDAP) succeeds, then 192.168.100.33 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the gateway ARP is missing","the link is saturated","the receiver {h} is application-bottlenecked (full buffer)","DNS is failing"],"answer":2,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":279},{"domain":"IPv4","q":"How is the IPv4 range 192.168.0.0/16 classified?","choices":["APIPA / link-local","multicast","CGNAT shared address space","RFC 1918 private"],"answer":3,"explain":"192.168.0.0/16 = RFC 1918 private.","id":280},{"domain":"TCP","q":"What is the purpose of the TCP 'MSS' option (kind 2)?","choices":["advertise the maximum segment size a host will accept","apply a shift multiplier to the 16-bit window","report received non-contiguous byte ranges","mark the end of the options list"],"answer":0,"explain":"MSS (kind 2) is used to advertise the maximum segment size a host will accept.","id":281},{"domain":"Troubleshooting","q":"In a capture: host 172.16.5.20 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["an MTU mismatch","the DHCP server/relay is unreachable on that segment","high path latency","a TCP window bug"],"answer":1,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":282},{"domain":"TCP","q":"In a capture: the handshake to 10.10.0.50:22 (SSH) succeeds, then 10.10.0.50 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","DNS is failing","the receiver {h} is application-bottlenecked (full buffer)","the gateway ARP is missing"],"answer":2,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":283},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 172.20.3.25 for the gateway 172.20.3.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","an oversized window","a TCP reset storm","the gateway is down or unreachable on that Layer-2 segment"],"answer":3,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":284},{"domain":"TCP","q":"In a capture: a SYN to 192.168.50.100:514 (syslog) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","a graceful close occurred","DNS failed","the service responded normally"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":285},{"domain":"Troubleshooting","q":"In a capture: host 192.168.100.33 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","the DHCP server/relay is unreachable on that segment","an MTU mismatch","a TCP window bug"],"answer":1,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":286},{"domain":"Troubleshooting","q":"In a capture: host 10.20.0.77 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","a TCP window bug","the DHCP server/relay is unreachable on that segment","an MTU mismatch"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":287},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show TCP traffic on port 443?","choices":["tls.handshake","tcp.port in {80,443}","ip.src == 10.1.1.1","tcp.port == 443"],"answer":3,"explain":"Correct display filter: tcp.port == 443","id":288},{"domain":"IPv4","q":"A packet arrives with TTL=61. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["3","5","2","1"],"answer":0,"explain":"64 - 61 = 3 hops.","id":289},{"domain":"UDP","q":"Which transport do most VoIP media (RTP) streams use?","choices":["TCP","UDP","SCTP","ICMP"],"answer":1,"explain":"UDP is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":290},{"domain":"DHCPv4","q":"Which parameter does DHCP Option 42 carry?","choices":["DHCP Server Identifier","Parameter Request List","NTP Servers","DHCP Message Type"],"answer":2,"explain":"DHCP Option 42 = NTP Servers.","id":291},{"domain":"ICMPv6","q":"Neighbor Advertisement is ICMPv6 type:","choices":["133","135","134","136"],"answer":3,"explain":"NA = 136; NS = 135; RA = 134; RS = 133.","id":292},{"domain":"Filtering","q":"Traffic on port 389 is most commonly associated with which service/protocol?","choices":["LDAP","SSH","RADIUS","SMB"],"answer":0,"explain":"Port 389 is the well-known port for LDAP.","id":293},{"domain":"TCP","q":"Which hex value represents the TCP RST flag set alone?","choices":["0x002","0x004","0x008","0x020"],"answer":1,"explain":"RST alone = 0x004.","id":294},{"domain":"TCP","q":"In a capture: a connection to 10.8.8.100:110 (POP3) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the window scaled to zero","an ARP failure","fast retransmit recovered a lost segment","the connection reset"],"answer":2,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":295},{"domain":"Troubleshooting","q":"High RTT most directly harms which kind of protocol the most?","choices":["Bulk one-way UDP streaming","ARP","Broadcast traffic","Chatty request/response protocols (HTTP, SMB, SQL) that require many round trips"],"answer":3,"explain":"Each request/response pair costs at least one RTT. Protocols with many sequential round trips (SMB file ops, SQL query chains, non-pipelined HTTP) suffer multiplicatively as RTT rises — even with ample bandwidth.","id":296},{"domain":"Wireshark Features","q":"Why might enabling network name resolution (MAC/IP/port) be undesirable during analysis?","choices":["It can generate additional DNS queries and slow Wireshark, and reverse lookups may be inaccurate","It permanently rewrites the capture file","It deletes the original addresses","It disables display filters"],"answer":0,"explain":"Resolving names (especially IP via reverse DNS) can trigger extra lookups, slow the UI, and produce misleading or stale hostnames. Many analysts disable it for accuracy and performance.","id":297},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.7.33?","choices":["dst 192.168.7.33","host 192.168.7.33","ip host 192.168.7.33","net 192.168.7.33"],"answer":1,"explain":"Correct capture filter: host 192.168.7.33 (BPF syntax).","id":298},{"domain":"TCP","q":"Given a standard Ethernet MTU of 1500 bytes with no TCP options on the data segments, the typical MSS is:","choices":["1500","1480","1460","1448"],"answer":2,"explain":"1500 − 20 (IPv4 header) − 20 (TCP header) = 1460. If TCP timestamps (12 bytes incl. padding) are present on data segments, usable payload drops to ~1448.","id":299},{"domain":"Interface","q":"Which pane is at the top of the default three-pane layout?","choices":["the packet bytes","the minimap","the packet details","the packet list"],"answer":3,"explain":"Default order: packet list (top), details (middle), bytes (bottom).","id":300},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture only port 53 (DNS)?","choices":["port 53","ether src 00:11:22:33:44:55","not port 22","net 192.168.1.0/24"],"answer":0,"explain":"Correct capture filter: port 53 (BPF syntax).","id":301},{"domain":"IPv4","q":"A packet arrives with TTL=54. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["9","10","13","15"],"answer":1,"explain":"64 - 54 = 10 hops.","id":302},{"domain":"TCP","q":"In a capture: a connection to 10.1.1.25:123 (NTP) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the window scaled to zero","an ARP failure","fast retransmit recovered a lost segment","the connection reset"],"answer":2,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":303},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.50.150?","choices":["dst 192.168.50.150","ip host 192.168.50.150","net 192.168.50.150","host 192.168.50.150"],"answer":3,"explain":"Correct capture filter: host 192.168.50.150 (BPF syntax).","id":304},{"domain":"IPv4","q":"A packet arrives with TTL=121. Assuming a common initial TTL of 128 (Windows), about how many hops away is the sender?","choices":["7","5","9","2"],"answer":0,"explain":"128 - 121 = 7 hops.","id":305},{"domain":"Troubleshooting","q":"In a capture: host 172.16.9.100 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","the DHCP server/relay is unreachable on that segment","a TCP window bug","an MTU mismatch"],"answer":1,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":306},{"domain":"TCP","q":"In a capture: a SYN to 172.16.5.77:514 (syslog) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["the service responded normally","a graceful close occurred","a firewall is dropping the SYN or the host/service is unreachable","DNS failed"],"answer":2,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":307},{"domain":"Wireshark Features","q":"Which shortcut marks/unmarks the selected packet?","choices":["Ctrl+T","Ctrl+F","Ctrl+E","Ctrl+M"],"answer":3,"explain":"Ctrl+M toggles a packet mark; marked packets can be navigated and exported as a set.","id":308},{"domain":"TCP","q":"In a capture: a SYN to 10.1.1.200:123 (NTP) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","DNS failed","the service responded normally","a graceful close occurred"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":309},{"domain":"Wireshark Features","q":"You need to find the heaviest host pairs by bytes. Which feature is correct?","choices":["Decode As","Statistics > Conversations sorted by bytes","Protocol Hierarchy","Find Packet"],"answer":1,"explain":"Correct: Statistics > Conversations sorted by bytes.","id":310},{"domain":"Wireshark Features","q":"You want to attach an analyst note to a specific packet that stays with the saved file. What do you use?","choices":["Decode As","a coloring rule","a packet comment (saved in pcapng)","a capture filter"],"answer":2,"explain":"Packet comments annotate individual packets and persist in pcapng files for others to read.","id":311},{"domain":"UDP","q":"Does UDP provide retransmission of lost datagrams?","choices":["only on port 53","yes, like TCP","only for multicast","no; reliability is left to the application"],"answer":3,"explain":"no; reliability is left to the application is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":312},{"domain":"TCP","q":"What is the purpose of the TCP 'Window Scale' option (kind 3)?","choices":["apply a shift multiplier to the 16-bit window","report received non-contiguous byte ranges","carry timestamps for RTT measurement and PAWS","negotiate use of selective acknowledgments"],"answer":0,"explain":"Window Scale (kind 3) is used to apply a shift multiplier to the 16-bit window.","id":313},{"domain":"ICMPv6","q":"ICMPv6 Type 137 corresponds to which message?","choices":["Neighbor Solicitation","Redirect","Echo Reply","Router Solicitation"],"answer":1,"explain":"ICMPv6 Type 137 = Redirect.","id":314},{"domain":"TCP","q":"In a capture: a connection to 10.8.8.10:110 (POP3) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["the connection reset","the window scaled to zero","fast retransmit recovered a lost segment","an ARP failure"],"answer":2,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":315},{"domain":"IPv4","q":"A packet arrives with TTL=60. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["2","5","1","4"],"answer":3,"explain":"64 - 60 = 4 hops.","id":316},{"domain":"Troubleshooting","q":"Using Statistics > Conversations sorted by bytes is a fast way to:","choices":["Identify the top talkers / heaviest flows when investigating congestion or unexpected bandwidth use","Find the coloring rules","Reassemble TCP","Resolve DNS"],"answer":0,"explain":"Sorting conversations by bytes/packets surfaces the largest flows immediately — the standard first step for 'what is using all the bandwidth?' or spotting an anomalous heavy talker.","id":317},{"domain":"Wireshark Features","q":"You want to see throughput (bits/s) over time for only TCP port 443 traffic. Which tool?","choices":["Protocol Hierarchy","Statistics > I/O Graph with a display filter and Bits/s on the Y axis","Decode As","Resolved Addresses"],"answer":1,"explain":"An I/O Graph plots packets/s or bits/s over time and accepts a display filter to isolate specific traffic.","id":318},{"domain":"IPv6","q":"The IPv6 address ::1 represents:","choices":["The default gateway","An unspecified address","The loopback (equivalent to IPv4 127.0.0.1)","A multicast group"],"answer":2,"explain":"::1/128 is the IPv6 loopback address, analogous to 127.0.0.1. The unspecified address is :: (all zeros).","id":319},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.0.5.77:110 (POP3) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["DNS failing","an ARP loop","the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)"],"answer":3,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":320},{"domain":"UDP","q":"UDP port 138 is most commonly used by which protocol/service?","choices":["NetBIOS Datagram","NetBIOS Name","SSDP","TFTP"],"answer":0,"explain":"NetBIOS Datagram is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":321},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.100.1 to 192.168.100.150 on 443 (HTTPS/TLS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["a DNS misconfiguration","packet loss in the path triggering retransmissions","normal setup","a VLAN tagging error"],"answer":1,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":322},{"domain":"Filtering","q":"The display filter 'tcp.port in {80,443,8080}' is equivalent to what?","choices":["an invalid expression","tcp.port==80 && tcp.port==443","tcp.port==80 || tcp.port==443 || tcp.port==8080","only tcp.port==8080"],"answer":2,"explain":"Set membership 'in {…}' matches if the field equals any listed value, equivalent to OR-ing the comparisons.","id":323},{"domain":"TCP","q":"In a TCP Stream Graph (Time-Sequence, Stevens style), the plotted line generally represents:","choices":["Window size over time","RTT only","Retransmission count","Sequence numbers advancing over time; a steep slope means high throughput, flat spots mean stalls"],"answer":3,"explain":"The Stevens time-sequence graph plots sequence number (y) vs. time (x). A steep, smooth slope indicates healthy data flow; plateaus indicate stalls (e.g., waiting on ACKs, zero window).","id":324},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.8.8.1 to 10.8.8.50 on 1812 (RADIUS) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["packet loss in the path triggering retransmissions","normal setup","a DNS misconfiguration","a VLAN tagging error"],"answer":0,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":325},{"domain":"TCP","q":"In a capture: the handshake to 192.168.100.200:993 (IMAPS) succeeds, then 192.168.100.200 sends repeated Zero Window messages. What is the most likely explanation?","choices":["the link is saturated","the receiver {h} is application-bottlenecked (full buffer)","the gateway ARP is missing","DNS is failing"],"answer":1,"explain":"Zero windows from the receiver pause the sender; the app isn't draining its buffer.","id":326},{"domain":"Filtering","q":"Which display filter isolates SSH traffic by its well-known TCP port?","choices":["tcp.port == 636","tcp.port == 68","tcp.port == 22","tcp.port == 995"],"answer":2,"explain":"SSH uses TCP port 22.","id":327},{"domain":"TCP","q":"In a capture: a SYN to 10.0.5.20:53 (DNS) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a graceful close occurred","the service responded normally","DNS failed","a firewall is dropping the SYN or the host/service is unreachable"],"answer":3,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":328},{"domain":"ARP","q":"A flood of ARP requests for many sequential IP addresses from one host most likely indicates:","choices":["A scan or sweep (host discovery), or possibly malware/misconfiguration probing the subnet","Normal gateway behavior","A DNS failure","A TCP retransmission storm"],"answer":0,"explain":"Rapid ARP requests across a range of addresses suggests address sweeping/scanning or a device attempting to map the subnet — a notable security/troubleshooting signal.","id":329},{"domain":"Capturing Traffic","q":"Which capture method may drop frames under heavy load and usually omits errored frames?","choices":["loopback capture","a SPAN/port mirror","a ring buffer","a network TAP"],"answer":1,"explain":"Port mirroring can drop mirrored frames when oversubscribed and typically discards corrupt frames.","id":330},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only RADIUS traffic by port?","choices":["tcp.port == 1812","portrange 1812","port 1812","dst port 1812 only"],"answer":2,"explain":"Correct capture filter: port 1812 (BPF syntax).","id":331},{"domain":"IPv4","q":"A packet arrives with TTL=46. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["13","15","21","18"],"answer":3,"explain":"64 - 46 = 18 hops.","id":332},{"domain":"Capturing Traffic","q":"When capturing on an infrastructure device (e.g., a router's embedded capture), a key consideration is:","choices":["It may impact device CPU/performance and often captures only control-plane or selected interfaces","It always captures Layer 1 errors","It requires monitor mode","It cannot save to pcap"],"answer":0,"explain":"On-device captures consume the device's CPU/memory and are usually scoped to specific interfaces or punted traffic; they're convenient but must be used carefully on production gear.","id":333},{"domain":"TCP","q":"What is the purpose of the TCP 'SACK' option (kind 5)?","choices":["mark the end of the options list","report received non-contiguous byte ranges","apply a shift multiplier to the 16-bit window","advertise the maximum segment size a host will accept"],"answer":1,"explain":"SACK (kind 5) is used to report received non-contiguous byte ranges.","id":334},{"domain":"Interface","q":"Why might you change a protocol preference (e.g., 'Allow subdissector to reassemble TCP streams')?","choices":["To change the capture file format","To recolor packets","Because protocol-specific preferences alter how packets are dissected/reassembled and therefore what you see","To switch profiles"],"answer":2,"explain":"Protocol preferences (Edit > Preferences > Protocols) change dissection behavior — e.g., TCP reassembly, checksum validation, or treating a port as a given protocol — directly affecting analysis results.","id":335},{"domain":"Troubleshooting","q":"In a capture you observe: a connection completes its handshake, sends a little data, then the server sends a RST mid-transfer. What is the most likely explanation?","choices":["a DHCP renewal","an ARP probe","a normal four-way FIN teardown","the server application aborted the connection (crash, timeout, or policy), not a graceful close"],"answer":3,"explain":"A mid-stream RST is an abrupt abort distinct from a FIN-based graceful close; investigate the server app or an in-path device.","id":336},{"domain":"IPv4","q":"When IPv4 fragmentation occurs, which fields are used to reassemble the original datagram?","choices":["Identification, Flags (More Fragments), and Fragment Offset","TTL and Protocol","Source port and destination port","Header checksum only"],"answer":0,"explain":"All fragments of one datagram share the same Identification value; the MF flag marks non-final fragments, and Fragment Offset gives each fragment's position so the receiver can reassemble them.","id":337},{"domain":"IPv4","q":"How is the IPv4 range 172.16.0.0/12 classified?","choices":["APIPA / link-local","RFC 1918 private","loopback","CGNAT shared address space"],"answer":1,"explain":"172.16.0.0/12 = RFC 1918 private.","id":338},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.1.200?","choices":["ip host 192.168.1.200","dst 192.168.1.200","host 192.168.1.200","net 192.168.1.200"],"answer":2,"explain":"Correct capture filter: host 192.168.1.200 (BPF syntax).","id":339},{"domain":"TCP","q":"Three duplicate ACKs trigger:","choices":["a FIN","window scaling","a connection reset","fast retransmit"],"answer":3,"explain":"The sender resends the missing segment without waiting for the RTO.","id":340},{"domain":"Capturing Traffic","q":"Which capture method is fully passive and copies physical-layer errors?","choices":["a network TAP","SNMP polling","a SPAN/port mirror","endpoint capture"],"answer":0,"explain":"A TAP passively copies all traffic including L1 errors without loading the switch.","id":341},{"domain":"Troubleshooting","q":"In a capture you observe: a host shows both 0x0800/ARP and 0x86DD/ICMPv6 Neighbor Discovery activity. What is the most likely explanation?","choices":["the capture is corrupt","the host is dual-stack (running IPv4 and IPv6 simultaneously)","the host is a router only","the host is IPv4-only"],"answer":1,"explain":"IPv4(+ARP) alongside IPv6(+ICMPv6 ND) indicates an actively dual-stacked host.","id":342},{"domain":"Troubleshooting","q":"In a capture: host 172.20.3.10 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","a TCP window bug","the DHCP server/relay is unreachable on that segment","an MTU mismatch"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":343},{"domain":"DNS","q":"A DNS response with rcode 1 means what?","choices":["Not implemented","No error","Server failure","Format error"],"answer":3,"explain":"DNS rcode 1 = Format error.","id":344},{"domain":"Troubleshooting","q":"In a capture you observe: a client repeatedly advertises a TCP window that shrinks to zero and then reopens slightly. What is the most likely explanation?","choices":["the receiving application is not reading data fast enough (receiver/app bottleneck)","the sender's MSS is wrong","DNS resolution is failing","the network link is saturated"],"answer":0,"explain":"A window collapsing toward zero is flow control pacing the sender to a slow-draining receiver buffer — an application bottleneck, not the network.","id":345},{"domain":"Capturing Traffic","q":"Which CLI tool is Wireshark's lightweight capture engine?","choices":["tcpreplay","dumpcap","iperf","ngrep"],"answer":1,"explain":"dumpcap captures with minimal overhead and is used by both tshark and Wireshark.","id":346},{"domain":"Troubleshooting","q":"In a capture: host 192.168.100.11 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["a TCP window bug","high path latency","the DHCP server/relay is unreachable on that segment","an MTU mismatch"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":347},{"domain":"IPv6","q":"What type of IPv6 address is 2400:cb00::5?","choices":["Multicast (all-nodes)","Multicast","Unspecified","Global unicast"],"answer":3,"explain":"2400:cb00::5 is Global unicast.","id":348},{"domain":"Wireshark Features","q":"Which capture file format supports per-packet comments, multiple interfaces, and nanosecond timestamps?","choices":["pcapng","pcap (libpcap)","snoop","ERF only"],"answer":0,"explain":"pcapng (PCAP Next Generation) supports packet/file comments, multiple interface descriptions, name resolution blocks, and high-resolution timestamps. Classic pcap is a simpler single-interface format.","id":349},{"domain":"DNS","q":"DNS over TCP is commonly used for:","choices":["only root queries","large responses and zone transfers","only reverse lookups","all queries"],"answer":1,"explain":"TCP handles responses too large for UDP and AXFR/IXFR zone transfers.","id":350},{"domain":"Filtering","q":"Which display filter isolates RDP traffic by its well-known TCP port?","choices":["tcp.port == 143","tcp.port == 110","tcp.port == 3389","tcp.port == 636"],"answer":2,"explain":"RDP uses TCP port 3389.","id":351},{"domain":"IPv4","q":"In the IPv4 header, a Protocol field value of 6 identifies which encapsulated protocol?","choices":["OSPF","AH","ICMP","TCP"],"answer":3,"explain":"IP protocol 6 = TCP. (1=ICMP,6=TCP,17=UDP.)","id":352},{"domain":"ICMPv4","q":"What does ICMP message Type 11 represent?","choices":["Time Exceeded","Timestamp Reply","Echo Request","Echo Reply"],"answer":0,"explain":"ICMP Type 11 = Time Exceeded.","id":353},{"domain":"UDP","q":"UDP port 137 is most commonly used by which protocol/service?","choices":["IPsec NAT-T","NetBIOS Name","DHCP client","syslog"],"answer":1,"explain":"NetBIOS Name is the protocol/service conventionally associated with that UDP port; UDP suits its lightweight, connectionless needs.","id":354},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 192.168.100.150?","choices":["ip host 192.168.100.150","dst 192.168.100.150","host 192.168.100.150","net 192.168.100.150"],"answer":2,"explain":"Correct capture filter: host 192.168.100.150 (BPF syntax).","id":355},{"domain":"Filtering","q":"Traffic on port 143 is most commonly associated with which service/protocol?","choices":["HTTP","RADIUS","SSH","IMAP"],"answer":3,"explain":"Port 143 is the well-known port for IMAP.","id":356},{"domain":"TCP","q":"In a capture: a connection to 10.20.0.150:69 (TFTP) shows 3 duplicate ACKs followed by a single retransmission. What is the most likely explanation?","choices":["fast retransmit recovered a lost segment","the window scaled to zero","an ARP failure","the connection reset"],"answer":0,"explain":"Three DUP ACKs trigger fast retransmit of the missing segment.","id":357},{"domain":"Filtering","q":"Traffic on port 636 is most commonly associated with which service/protocol?","choices":["syslog","LDAPS","HTTP","FTP control"],"answer":1,"explain":"Port 636 is the well-known port for LDAPS.","id":358},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.20.0.25?","choices":["net 10.20.0.25","ip host 10.20.0.25","host 10.20.0.25","dst 10.20.0.25"],"answer":2,"explain":"Correct capture filter: host 10.20.0.25 (BPF syntax).","id":359},{"domain":"Troubleshooting","q":"A low TCP window size combined with high RTT produces what symptom?","choices":["Faster transfers","ARP storms","DNS failures","Throughput is throttled because the sender can only have (window) bytes in flight per RTT, so high latency caps effective speed regardless of link bandwidth"],"answer":3,"explain":"Max throughput ≈ window / RTT (the bandwidth-delay product limit). A small window over a high-RTT path means little data in flight per round trip, starving throughput even on a fast link. Window scaling addresses this.","id":360},{"domain":"TCP","q":"In a capture: a SYN to 10.0.5.20:143 (IMAP) is retransmitted repeatedly with no SYN/ACK or RST. What is the most likely explanation?","choices":["a firewall is dropping the SYN or the host/service is unreachable","DNS failed","a graceful close occurred","the service responded normally"],"answer":0,"explain":"Silent retransmitted SYNs indicate filtering/drop or unreachability; closed ports send RST.","id":361},{"domain":"TCP","q":"A Selective Acknowledgment (SACK) block tells the sender:","choices":["The total bytes received","Which non-contiguous byte ranges have been received, so only the actual missing segments need retransmission","The window scale factor","The MSS"],"answer":1,"explain":"SACK (negotiated via SACK-Permitted in the SYN) reports received-but-non-contiguous ranges. The sender can then retransmit only the gaps rather than everything after the loss point.","id":362},{"domain":"Troubleshooting","q":"In a capture: host 172.20.3.150 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["a TCP window bug","high path latency","the DHCP server/relay is unreachable on that segment","an MTU mismatch"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":363},{"domain":"Filtering","q":"What is the effect of the capture filter 'net 192.168.1.0/24'?","choices":["Captures only the host 192.168.1.0","Captures only broadcast traffic","Is invalid BPF syntax","Captures all traffic to or from the 192.168.1.0/24 subnet"],"answer":3,"explain":"'net 192.168.1.0/24' is BPF for the whole subnet, matching any packet whose source or destination falls in that range.","id":364},{"domain":"IPv6","q":"What type of IPv6 address is fd12:3456:789a::1?","choices":["Unique local (ULA)","Global unicast","Link-local","Global unicast (documentation range)"],"answer":0,"explain":"fd12:3456:789a::1 is Unique local (ULA).","id":365},{"domain":"Capturing Traffic","q":"You need a lightweight, high-rate capture on a busy server with minimal chance of drops.","choices":["capture with full Wireshark GUI","capture with dumpcap (no dissection overhead)","use tshark with heavy dissection","use ngrep"],"answer":1,"explain":"dumpcap only writes packets to disk with minimal overhead, reducing drops versus dissecting tools under load.","id":366},{"domain":"Troubleshooting","q":"In a capture you observe: DNS resolves a name to an IP, and you want to attribute later anonymous flows to that service. What is the most likely explanation?","choices":["read the TCP window scale","check the IP ID only","correlate the DNS response (name to IP) with subsequent connections to that IP","inspect the Ethernet FCS"],"answer":2,"explain":"Mapping a DNS answer to later flows lets you label otherwise opaque IP conversations by hostname/service.","id":367},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 172.16.5.100?","choices":["ip host 172.16.5.100","dst 172.16.5.100","net 172.16.5.100","host 172.16.5.100"],"answer":3,"explain":"Correct capture filter: host 172.16.5.100 (BPF syntax).","id":368},{"domain":"Filtering","q":"Applying a filter from Statistics > Conversations by right-clicking a row lets you do what?","choices":["Apply/prepare a display filter scoped to that exact conversation (e.g., both addresses and ports)","Delete the conversation from the file","Export only that conversation's payload as text","Change its color permanently"],"answer":0,"explain":"Right-clicking a Conversations row offers Apply as Filter / Prepare as Filter with A↔B, A→B, etc., generating a precise filter for that conversation.","id":369},{"domain":"Filtering","q":"Which display filter correctly uses a membership (set) match for ports 80 and 443?","choices":["tcp.port == 80 || 443","tcp.port in {80,443}","tcp.port = [80,443]","tcp.port has 80,443"],"answer":1,"explain":"Wireshark's set membership syntax is 'tcp.port in {80,443}', equivalent to 'tcp.port==80 || tcp.port==443'.","id":370},{"domain":"Troubleshooting","q":"In a capture: host 10.20.0.10 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["high path latency","an MTU mismatch","the DHCP server/relay is unreachable on that segment","a TCP window bug"],"answer":2,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":371},{"domain":"Interface","q":"To see which web hosts are being contacted, which field should you add as a column?","choices":["tcp.window_size","dns.qry.name","ip.id","http.host"],"answer":3,"explain":"A column for http.host surfaces that field across packets for fast scanning.","id":372},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only IMAP traffic by port?","choices":["port 143","dst port 143 only","portrange 143","tcp.port == 143"],"answer":0,"explain":"Correct capture filter: port 143 (BPF syntax).","id":373},{"domain":"Ethernet","q":"Why is the Ethernet FCS/CRC usually absent from frames shown in Wireshark?","choices":["Wireshark deletes it","Most NIC drivers strip the FCS before handing the frame to the capture stack","The FCS is encrypted","Ethernet frames have no FCS"],"answer":1,"explain":"The 4-byte Frame Check Sequence is validated and then stripped by most NIC hardware/drivers before the OS sees the frame, so Wireshark typically never receives it. Some adapters can be configured to preserve it.","id":374},{"domain":"IPv4","q":"A packet arrives with TTL=49. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["18","13","15","14"],"answer":2,"explain":"64 - 49 = 15 hops.","id":375},{"domain":"DHCPv4","q":"Which DHCP option number carries the subnet mask?","choices":["Option 3","Option 6","Option 51","Option 1"],"answer":3,"explain":"Option 1 = Subnet Mask, Option 3 = Router (default gateway), Option 6 = DNS servers, Option 51 = IP address lease time.","id":376},{"domain":"ICMPv6","q":"Which ICMPv6 message pair replaces IPv4 ARP for resolving a neighbor's link-layer address?","choices":["Neighbor Solicitation / Neighbor Advertisement","Router Solicitation / Router Advertisement","Echo Request / Echo Reply","Redirect / Time Exceeded"],"answer":0,"explain":"Neighbor Discovery uses Neighbor Solicitation (NS) and Neighbor Advertisement (NA) — ICMPv6 types 135 and 136 — to resolve link-layer addresses, performing ARP's role in IPv6.","id":377},{"domain":"Ethernet","q":"When an 802.1Q VLAN tag is inserted, where does it go and what is its effect on the frame header?","choices":["It replaces the destination MAC","A 4-byte tag (TPID 0x8100 + TCI) is inserted after the source MAC and before the EtherType, carrying the VLAN ID and priority","It is appended after the FCS","It changes the preamble"],"answer":1,"explain":"The 4-byte 802.1Q tag (2-byte TPID 0x8100 + 2-byte TCI containing PCP, DEI, and the 12-bit VLAN ID) sits between the source MAC and the original EtherType, extending the header by 4 bytes.","id":378},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 192.168.7.100 for the gateway 192.168.7.1 get no reply. What is the most likely explanation?","choices":["a TCP reset storm","an oversized window","the gateway is down or unreachable on that Layer-2 segment","a DNS outage"],"answer":2,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":379},{"domain":"Troubleshooting","q":"In a capture you observe: many unique, random-looking subdomain DNS queries are sent to a single domain at a steady rate. What is the most likely explanation?","choices":["a zone transfer","ordinary web browsing","an ARP storm","possible DNS tunneling or DGA-based malware beaconing"],"answer":3,"explain":"High volumes of random unique subdomains to one domain are a classic DNS-tunneling/DGA indicator worth investigating.","id":380},{"domain":"IPv4","q":"A packet arrives with TTL=59. Assuming a common initial TTL of 64 (Linux / macOS / many Unix), about how many hops away is the sender?","choices":["5","3","2","8"],"answer":0,"explain":"64 - 59 = 5 hops.","id":381},{"domain":"Filtering","q":"Traffic on port 443 is most commonly associated with which service/protocol?","choices":["IMAP","HTTPS/TLS","SMB","HTTP alt"],"answer":1,"explain":"Port 443 is the well-known port for HTTPS/TLS.","id":382},{"domain":"ICMPv6","q":"Router Solicitation/Advertisement are used to:","choices":["resolve MAC addresses","tear down TCP","discover routers and obtain prefixes for SLAAC","report ICMP errors"],"answer":2,"explain":"RS (133) prompts routers; RA (134) advertises prefixes/MTU for autoconfiguration.","id":383},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 10.1.1.1 to 10.1.1.20 on 80 (HTTP) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","a VLAN tagging error","a DNS misconfiguration","packet loss in the path triggering retransmissions"],"answer":3,"explain":"Retransmissions + DUP ACKs are the canonical packet-loss signature.","id":384},{"domain":"IPv4","q":"The IPv4 TTL field's primary purpose is to:","choices":["Prevent packets from looping forever by being decremented at each hop; the packet is discarded when TTL reaches 0","Set the packet priority","Indicate fragmentation","Carry the protocol number"],"answer":0,"explain":"Each router decrements TTL by 1; at 0 the packet is dropped and an ICMP Time Exceeded is generated. This bounds packet lifetime and prevents routing loops from persisting.","id":385},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.8.8.50:68 (DHCP client) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","the receiver is the bottleneck (zero windows stall the sender)","DNS failing","an ARP loop"],"answer":1,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":386},{"domain":"TCP","q":"The TCP 'Window Scaling' option exists because:","choices":["TCP cannot fragment","It encrypts the window","The base window field is only 16 bits (max 65,535), too small for high-bandwidth, high-latency paths","It replaces MSS"],"answer":2,"explain":"The 16-bit window caps at 65,535 bytes, insufficient for large bandwidth-delay products. The Window Scale option (negotiated in the SYN) applies a shift multiplier so effective windows can be much larger.","id":387},{"domain":"Troubleshooting","q":"In a capture, a large delay appears as [TCP ACKed unseen segment] and gaps in sequence numbers at your capture point, but the endpoints communicate fine. This most likely means:","choices":["The endpoints are broken","The window is zero","DNS failed","Your capture point missed packets (capture drops or asymmetric/incomplete capture), not a real network fault"],"answer":3,"explain":"'ACKed unseen segment' and missing sequence ranges, while the conversation otherwise progresses, usually point to a capture problem (dropped frames or seeing only one direction) rather than an actual loss the hosts experienced.","id":388},{"domain":"Filtering","q":"Traffic on port 21 is most commonly associated with which service/protocol?","choices":["FTP control","IMAPS","MS SQL","TFTP"],"answer":0,"explain":"Port 21 is the well-known port for FTP control.","id":389},{"domain":"DNS","q":"A DNS 'SOA' record returns what?","choices":["arbitrary text (e.g., SPF/DKIM data)","the start-of-authority zone parameters","a mail exchange server for the domain","a canonical name (alias) for another name"],"answer":1,"explain":"A SOA record returns the start-of-authority zone parameters.","id":390},{"domain":"DNS","q":"A DNS 'CNAME' record returns what?","choices":["a hostname for reverse (IP-to-name) lookups","an IPv4 address (host record)","a canonical name (alias) for another name","an authoritative name server for the zone"],"answer":2,"explain":"A CNAME record returns a canonical name (alias) for another name.","id":391},{"domain":"DHCPv4","q":"DHCP message-type code 2 (Option 53) corresponds to which message?","choices":["Inform","Decline","Request","Offer"],"answer":3,"explain":"DHCP type 2 = Offer.","id":392},{"domain":"Capturing Traffic","q":"Why might outbound packets show a bad checksum on the sending host?","choices":["checksum offload computes it after capture","the MTU is too small","the remote host is wrong","the cable is bad"],"answer":0,"explain":"TX checksum offload fills the field in hardware after Wireshark captures the frame.","id":393},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only HTTP traffic by port?","choices":["dst port 80 only","port 80","tcp.port == 80","portrange 80"],"answer":1,"explain":"Correct capture filter: port 80 (BPF syntax).","id":394},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.1.1.25:22 (SSH) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","DNS failing","the receiver is the bottleneck (zero windows stall the sender)","an ARP loop"],"answer":2,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":395},{"domain":"TCP","q":"What is the purpose of the TCP 'EOL' option (kind 0)?","choices":["report received non-contiguous byte ranges","pad options to a 4-byte boundary","advertise the maximum segment size a host will accept","mark the end of the options list"],"answer":3,"explain":"EOL (kind 0) is used to mark the end of the options list.","id":396},{"domain":"Troubleshooting","q":"In a capture: host 10.0.5.200 has a 169.254.x.x address and keeps broadcasting DHCP Discover with no Offers. What is the most likely explanation?","choices":["the DHCP server/relay is unreachable on that segment","an MTU mismatch","a TCP window bug","high path latency"],"answer":0,"explain":"APIPA + unanswered Discovers means DHCP can't complete (server/scope/relay issue).","id":397},{"domain":"Interface","q":"Copying a profile is helpful when you want to:","choices":["Merge two capture files","Duplicate an existing profile as a starting point and then tweak it for a new scenario","Reset Wireshark","Export packets"],"answer":1,"explain":"In Configuration Profiles you can copy an existing profile, preserving its columns/colors/filters, then modify the copy — faster than building a new profile from scratch.","id":398},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.0.5.200:8080 (HTTP alt) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the server can't generate data","DNS failing","the receiver is the bottleneck (zero windows stall the sender)","an ARP loop"],"answer":2,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":399},{"domain":"DNS","q":"Which filter shows DNS queries only?","choices":["dns","dns.count.answers > 0","dns.flags.response == 1","dns.flags.response == 0"],"answer":3,"explain":"response==0 indicates a query.","id":400},{"domain":"DNS","q":"A DNS response with rcode 0 means what?","choices":["No error","Refused","Format error","NXDOMAIN (name does not exist)"],"answer":0,"explain":"DNS rcode 0 = No error.","id":401},{"domain":"Wireshark Features","q":"Which feature reassembles both directions of a TCP conversation into readable text?","choices":["I/O Graph","Follow TCP Stream","Protocol Hierarchy","Endpoints"],"answer":1,"explain":"Follow TCP Stream stitches the bidirectional payload and applies tcp.stream eq N.","id":402},{"domain":"Capturing Traffic","q":"Which BPF capture filter would you use to capture only traffic to/from host 10.0.5.25?","choices":["dst 10.0.5.25","net 10.0.5.25","host 10.0.5.25","ip host 10.0.5.25"],"answer":2,"explain":"Correct capture filter: host 10.0.5.25 (BPF syntax).","id":403},{"domain":"Wireshark Features","q":"Which Wireshark feature lets you see a percentage breakdown of all protocols present?","choices":["Conversations","Follow TCP Stream","Capture File Properties","Statistics > Protocol Hierarchy"],"answer":3,"explain":"Correct: Statistics > Protocol Hierarchy.","id":404},{"domain":"Troubleshooting","q":"Repeated ARP requests for a host that never replies suggests:","choices":["The target is down/unreachable or on a different segment, so its MAC can't be resolved","The host is reachable","DNS is misconfigured","The window size is too small"],"answer":0,"explain":"Unanswered ARP requests mean no device on the segment owns that IP (host down, wrong subnet/VLAN, or a connectivity break), so upper-layer communication to it cannot proceed.","id":405},{"domain":"Wireshark Features","q":"A value displayed in [square brackets] in the details pane is what?","choices":["a truncated value","a Wireshark-generated field, not bytes on the wire","a checksum failure","an encrypted value"],"answer":1,"explain":"Square brackets denote computed/generated fields (e.g., [iRTT], [Bytes in flight]).","id":406},{"domain":"Interface","q":"To find large inter-packet gaps (stalls), which field should you add as a column?","choices":["tcp.flags","tcp.analysis.ack_rtt","frame.time_delta","ip.ttl"],"answer":2,"explain":"A column for frame.time_delta surfaces that field across packets for fast scanning.","id":407},{"domain":"Capturing Traffic","q":"A SPAN port (port mirror) on a switch has which well-known limitation?","choices":["It cannot mirror VLAN traffic","It requires a TAP to function","It only works on routers","Under heavy load it may drop mirrored frames and typically does not copy physical-layer errors"],"answer":3,"explain":"Port mirroring/SPAN copies frames in software/ASIC to a monitor port; when the aggregate traffic exceeds the monitor port's capacity, frames are dropped, and corrupt/errored frames are usually discarded rather than mirrored.","id":408},{"domain":"ARP","q":"In a capture you see a unicast frame stating '172.16.5.100 is at <MAC>' in response to a who-has. What is it?","choices":["an ARP reply","an ARP request","an ICMP redirect","a gratuitous ARP"],"answer":0,"explain":"A directed 'is-at' answer is an ARP reply (opcode 2).","id":409},{"domain":"TCP","q":"Sequence/ACK numbers provide reliability by:","choices":["setting the TTL","numbering bytes so loss/duplication is detected and acknowledged","encrypting data","compressing payload"],"answer":1,"explain":"ACK number = next expected byte; gaps reveal loss for retransmission.","id":410},{"domain":"Filtering","q":"Which display filter isolates TFTP traffic by its well-known TCP port?","choices":["tcp.port == 21","tcp.port == 110","tcp.port == 69","tcp.port == 80"],"answer":2,"explain":"TFTP uses TCP port 69.","id":411},{"domain":"ARP","q":"In a capture you see a unicast frame stating '172.20.3.11 is at <MAC>' in response to a who-has. What is it?","choices":["an ARP request","an ICMP redirect","a gratuitous ARP","an ARP reply"],"answer":3,"explain":"A directed 'is-at' answer is an ARP reply (opcode 2).","id":412},{"domain":"Troubleshooting","q":"In a capture: the time-sequence graph for 10.1.1.10:68 (DHCP client) shows flat plateaus aligning with zero-window events. What is the most likely explanation?","choices":["the receiver is the bottleneck (zero windows stall the sender)","an ARP loop","DNS failing","the server can't generate data"],"answer":0,"explain":"Plateaus at zero-window events mean the receiver repeatedly stops the sender.","id":413},{"domain":"DNS","q":"A DNS 'A' record returns what?","choices":["an IPv6 address","an IPv4 address (host record)","the start-of-authority zone parameters","a mail exchange server for the domain"],"answer":1,"explain":"A A record returns an IPv4 address (host record).","id":414},{"domain":"DNS","q":"Which DNS record type is used for reverse lookups (IP address to hostname)?","choices":["A","AAAA","PTR","TXT"],"answer":2,"explain":"PTR records provide reverse resolution, mapping an IP address (via the in-addr.arpa / ip6.arpa zones) back to a hostname.","id":415},{"domain":"Ethernet","q":"The standard Ethernet MTU (max payload) is:","choices":["576 bytes","1492 bytes","9000 bytes","1500 bytes"],"answer":3,"explain":"Standard payload max is 1500; 9000 is jumbo, 1492 PPPoE, 576 an IPv4 minimum.","id":416},{"domain":"Filtering","q":"Which BPF capture filter would you use to capture only traffic to TCP port 80?","choices":["tcp dst port 80","ether src 00:11:22:33:44:55","not port 22","icmp"],"answer":0,"explain":"Correct capture filter: tcp dst port 80 (BPF syntax).","id":417},{"domain":"Troubleshooting","q":"In a capture: ARP requests from 10.20.0.20 for the gateway 10.20.0.1 get no reply. What is the most likely explanation?","choices":["a DNS outage","the gateway is down or unreachable on that Layer-2 segment","an oversized window","a TCP reset storm"],"answer":1,"explain":"Unanswered gateway ARPs break off-subnet connectivity (gateway down/wrong VLAN).","id":418},{"domain":"Ethernet","q":"Which protocol does the Ethernet EtherType value 0x8847 indicate?","choices":["RARP","LLDP","MPLS unicast","802.1Q VLAN-tagged frame"],"answer":2,"explain":"EtherType 0x8847 identifies MPLS unicast.","id":419},{"domain":"Wireshark Features","q":"Which capability would you use to check capture duration and packet count?","choices":["I/O Graph","Coloring Rules","Decode As","Statistics > Capture File Properties"],"answer":3,"explain":"Correct: Statistics > Capture File Properties.","id":420},{"domain":"TCP","q":"The EOL (End of Option List) TCP option does what?","choices":["Marks the end of the TCP options, with any remaining option space ignored","Pads to 4-byte alignment","Carries SACK ranges","Negotiates window scale"],"answer":0,"explain":"EOL (kind 0) signals that no more options follow; the remainder of the options area is padding. NOP (kind 1) is the byte used for alignment between options.","id":421},{"domain":"Filtering","q":"Which Wireshark display filter would you use to show ICMP echo requests?","choices":["arp.opcode == 1","icmp.type == 8","tls.handshake","ipv6"],"answer":1,"explain":"Correct display filter: icmp.type == 8","id":422},{"domain":"Interface","q":"You want to scan source MAC addresses. Which column field is most useful?","choices":["tcp.analysis.ack_rtt","dns.qry.name","eth.src","udp.length"],"answer":2,"explain":"A column for eth.src surfaces that field across packets for fast scanning.","id":423},{"domain":"Troubleshooting","q":"In a capture: a transfer from server 192.168.1.1 to 192.168.1.77 on 5432 (PostgreSQL) stalls with frequent retransmissions and DUP ACKs. What is the most likely explanation?","choices":["normal setup","a DNS misconfiguration","a VLAN tagging error","packet loss in the path triggering retransmissions"],"answer":3,"explain":"Retransmissions + DUP ACKs ar
