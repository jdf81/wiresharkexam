/* ---------- PRACTICE ---------- */
function renderPracticeMenu(){
  setNavVisible(true);
  const missedN=Object.keys(STATE.missed).length;
  view.innerHTML = `
   <div class="eyebrow" style="margin-top:10px">Practice</div>
   <h2>Choose a focus</h2>
   <p class="muted">Instant feedback and explanations after each question.</p>
   <div class="actions">
     <button class="act primary" onclick="quickPractice(15)"><div class="ic">⚡</div><div class="t">Quick 15</div><div class="d">Mixed random</div></button>
     <button class="act" onclick="quickPractice(30)"><div class="ic">⚡</div><div class="t">Mixed 30</div><div class="d">Longer set</div></button>
     <button class="act full" onclick="reviewMissed()"><div class="ic">↺</div><div class="t">Review Missed Questions</div><div class="d">${missedN} to revisit • re-test the ones you got wrong</div></button>
   </div>
   <h3>By domain</h3>
   ${DOMAINS.map(d=>{
     const n=(byDomain[d]||[]).length;
     const pd=STATE.perDomain[d];
     const a=pd&&pd.total?pct(pd.correct/pd.total)+'% acc':'';
     return `<div class="row-item" onclick="practiceDomain('${d.replace(/'/g,"\\'")}')">
        <div class="meta"><div class="title">${esc(d)}</div><div class="sub">${n} questions${a?' • '+a:''}</div></div>
        <span class="pill">${n}</span></div>`;
   }).join('')}
  `;
}
function practiceDomain(d){ startQuiz(shuffle(byDomain[d]).slice(0,Math.min(20,byDomain[d].length)), {mode:'practice', label:d}); }
function quickPractice(n){ startQuiz(shuffle(BANK).slice(0,n), {mode:'practice', label:'Mixed practice'}); }
function reviewMissed(){
  const pool=BANK.filter(q=>STATE.missed[q.id]);
  if(!pool.length){ toast("No missed questions yet"); return; }
  startQuiz(shuffle(pool).slice(0,30), {mode:'practice', label:'Review missed'});
}

/* ---------- EXAM ---------- */
function renderExamMenu(){
  setNavVisible(true);
  const last=STATE.attempts.slice(-5).reverse();
  view.innerHTML = `
   <div class="eyebrow" style="margin-top:10px">Exam Simulation</div>
   <h2>Test under pressure</h2>
   <p class="muted">${EXAM_N} questions sampled to match the official domain weighting, with a 120-minute countdown. No feedback until you finish — just like the real exam.</p>
   <button class="act primary full" onclick="startExam()" style="margin:8px 0"><div class="ic">[#]</div><div class="t">Begin ${EXAM_N}-question exam</div><div class="d">120:00 timer • weighted blueprint • flag &amp; review</div></button>
   <div class="card" style="padding:12px">
     <div class="eyebrow">Blueprint sampling (per exam)</div>
     ${Object.entries(BLUEPRINT).map(([d,w])=>`<div class="dwrap"><div class="top"><b>${esc(d)}</b><span>${Math.max(1,Math.round(w/100*EXAM_N))} q</span></div><div class="bar"><i style="width:${Math.min(100,w*2.2)}%"></i></div></div>`).join('')}
   </div>
   ${last.length?`<h3>Recent attempts</h3>${last.map(a=>`
     <div class="row-item" style="cursor:default">
       <div class="meta"><div class="title">${a.score}/${a.total} • ${pct(a.score/a.total)}%</div><div class="sub">${new Date(a.t).toLocaleString()}</div></div>
       <span class="pill" style="color:${a.score/a.total>=PASS_MARK?'var(--green)':'var(--amber)'}">${a.score/a.total>=PASS_MARK?'PASS':'BELOW'}</span>
     </div>`).join('')}`:''}
  `;
}
function buildExam(){
  const picks=[];
  let allocated=0;
  const entries=Object.entries(BLUEPRINT);
  entries.forEach(([d,w])=>{
    const n=Math.max(1, Math.round(w/100*EXAM_N));
    const pool=shuffle(byDomain[d]||[]);
    for(let i=0;i<n && i<pool.length;i++){ picks.push(pool[i]); allocated++; }
  });
  // adjust to exactly EXAM_N
  let bankLeft=shuffle(BANK.filter(q=>!picks.includes(q)));
  while(picks.length<EXAM_N && bankLeft.length){ picks.push(bankLeft.pop()); }
  return shuffle(picks).slice(0,EXAM_N);
}
function startExam(){
  startQuiz(buildExam(), {mode:'exam', label:'Exam simulation', timed:true});
}

/* ---------- QUIZ ENGINE ---------- */
let quiz=null;
function startQuiz(questions, opts){
  if(!questions || !questions.length){ toast("No questions available"); return; }
  quiz = {
    qs: questions,
    opts: opts,
    idx: 0,
    answers: new Array(questions.length).fill(null), // chosen index
    flags: new Array(questions.length).fill(false),
    locked: new Array(questions.length).fill(false), // practice: answered+revealed
    startT: Date.now(),
    remaining: EXAM_SECONDS,
    timerId: null,
    finished: false
  };
  setNavVisible(false);
  if(opts.timed){
    quiz.timerId = setInterval(tickTimer, 1000);
  }
  renderQuiz();
  window.scrollTo(0,0);
}
function tickTimer(){
  if(!quiz || quiz.finished) return;
  quiz.remaining--;
  const el=document.getElementById("timer");
  if(el){ el.textContent=fmtTime(quiz.remaining); el.classList.toggle("warn", quiz.remaining<=300); }
  if(quiz.remaining<=0){ finishQuiz(true); }
}
function renderQuiz(){
  const q=quiz.qs[quiz.idx];
  const isExam=quiz.opts.mode==='exam';
  const chosen=quiz.answers[quiz.idx];
  const locked=quiz.locked[quiz.idx];
  const progress=((quiz.idx)/(quiz.qs.length))*100;
  const labels=["A","B","C","D"];
  let choicesHtml = q.choices.map((c,i)=>{
    let cls="choice";
    if(isExam){
      if(chosen===i) cls+=" sel";
    } else if(locked){
      if(i===q.answer) cls+=" correct";
      else if(i===chosen) cls+=" wrong";
      else cls+=" dim";
    } else if(chosen===i){ cls+=" sel"; }
    return `<button class="${cls}" onclick="chooseAnswer(${i})" ${locked?'disabled':''}><span class="lab">${labels[i]}</span>${esc(c)}</button>`;
  }).join('');

  view.innerHTML = `
   <div class="qtop">
     <button class="fab-back" onclick="confirmExit()">‹ ${esc(quiz.opts.label||'Quiz')}</button>
     ${quiz.opts.timed?`<span id="timer" class="qtimer ${quiz.remaining<=300?'warn':''}">${fmtTime(quiz.remaining)}</span>`:`<span class="qcount">${quiz.idx+1} / ${quiz.qs.length}</span>`}
   </div>
   <div class="qprog"><i style="width:${progress}%"></i></div>
   <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
     <span class="qdomain">${esc(q.domain)}</span>
     <button class="flagbtn ${quiz.flags[quiz.idx]?'on':''}" onclick="toggleFlag()">⚑ ${quiz.flags[quiz.idx]?'Flagged':'Flag'}</button>
   </div>
   <div class="qtext">${esc(q.q)}</div>
   ${choicesHtml}
   <div class="explain ${locked?'show':''}" id="explain"><span class="tag">Explanation</span>${esc(q.explain)}</div>
   <div class="qbtns">
     <button class="btn ghost" onclick="prevQ()" ${quiz.idx===0?'disabled':''}>‹ Prev</button>
     ${nextButtonHtml()}
   </div>
   ${isExam?navMapHtml():`<div class="qcount" style="text-align:center;margin-top:10px">${quiz.idx+1} of ${quiz.qs.length}</div>`}
  `;
}
function nextButtonHtml(){
  const isExam=quiz.opts.mode==='exam';
  const last=quiz.idx===quiz.qs.length-1;
  if(isExam){
    return last
      ? `<button class="btn primary" onclick="finishQuiz(false)">Finish &amp; submit</button>`
      : `<button class="btn primary" onclick="nextQ()">Next ›</button>`;
  } else {
    const locked=quiz.locked[quiz.idx];
    if(!locked){
      return `<button class="btn primary" id="checkBtn" onclick="checkAnswer()" ${quiz.answers[quiz.idx]===null?'disabled':''}>Check answer</button>`;
    }
    return last
      ? `<button class="btn primary" onclick="finishQuiz(false)">See results</button>`
      : `<button class="btn primary" onclick="nextQ()">Next ›</button>`;
  }
}
function navMapHtml(){
  return `<div class="navmap">` + quiz.qs.map((q,i)=>{
    let cls=""; if(quiz.answers[i]!==null) cls+=" answered"; if(quiz.flags[i]) cls+=" flagged"; if(i===quiz.idx) cls+=" cur";
    return `<button class="${cls.trim()}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('') + `</div>`;
}
function chooseAnswer(i){
  if(quiz.locked[quiz.idx]) return;
  quiz.answers[quiz.idx]=i;
  if(quiz.opts.mode==='exam'){
    renderQuiz(); // update selection + navmap
  } else {
    // enable check button + show selection
    renderQuiz();
  }
}
function checkAnswer(){
  if(quiz.answers[quiz.idx]===null) return;
  const q=quiz.qs[quiz.idx];
  quiz.locked[quiz.idx]=true;
  recordAnswer(q, quiz.answers[quiz.idx]===q.answer);
  renderQuiz();
  const ex=document.getElementById("explain"); if(ex) ex.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function toggleFlag(){ quiz.flags[quiz.idx]=!quiz.flags[quiz.idx]; renderQuiz(); }
function nextQ(){ if(quiz.idx<quiz.qs.length-1){ quiz.idx++; renderQuiz(); window.scrollTo(0,0); } }
function prevQ(){ if(quiz.idx>0){ quiz.idx--; renderQuiz(); window.scrollTo(0,0); } }
function jumpTo(i){ quiz.idx=i; renderQuiz(); window.scrollTo(0,0); }
function confirmExit(){
  const isExam=quiz.opts.mode==='exam';
  if(isExam && !quiz.finished){
    if(!confirm("Leave the exam? Your progress in this attempt will be lost.")) return;
  }
  if(quiz.timerId) clearInterval(quiz.timerId);
  quiz=null;
  setTab(current==='exam'?'exam':current);
  setNavVisible(true);
}

/* ---------- RESULTS ---------- */
function finishQuiz(auto){
  if(quiz.timerId) clearInterval(quiz.timerId);
  quiz.finished=true;
  const isExam=quiz.opts.mode==='exam';
  // For exam, record answers now (practice already recorded on check)
  let score=0;
  const perDom={};
  quiz.qs.forEach((q,i)=>{
    const correct = quiz.answers[i]===q.answer;
    if(correct) score++;
    if(isExam) recordAnswer(q, correct && quiz.answers[i]!==null);
    const pd=perDom[q.domain]||(perDom[q.domain]={c:0,t:0});
    pd.t++; if(correct) pd.c++;
  });
  const total=quiz.qs.length;
  if(isExam){
    STATE.attempts.push({t:Date.now(), score, total});
    saveState();
  }
  renderResults(score,total,perDom,auto,isExam);
  window.scrollTo(0,0);
}
function renderResults(score,total,perDom,auto,isExam){
  const ratio=total?score/total:0;
  const passed=ratio>=PASS_MARK;
  const C=2*Math.PI*64;
  const off=C*(1-ratio);
  const color = passed?'var(--green)':(ratio>=0.6?'var(--amber)':'var(--red)');
  const wrong = quiz.qs.map((q,i)=>({q,i})).filter(x=>quiz.answers[x.i]!==x.q.answer);
  view.innerHTML = `
   <div class="eyebrow" style="margin-top:10px">${isExam?'Exam result':'Practice result'}</div>
   <h2>${quiz.opts.label||'Results'}</h2>
   ${auto?`<p class="muted">⏱ Time expired — scored as-is.</p>`:''}
   <div class="score-ring">
     <svg width="160" height="160">
       <circle cx="80" cy="80" r="64" fill="none" stroke="var(--line)" stroke-width="12"/>
       <circle cx="80" cy="80" r="64" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"
         stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
     </svg>
     <div class="pctc"><div class="big">${pct(ratio)}%</div><div class="lab">${score}/${total}</div></div>
   </div>
   ${isExam?`<div class="verdict ${passed?'pass':'fail'}">${passed?'PASS — above '+pct(PASS_MARK)+'% target':'Below '+pct(PASS_MARK)+'% target — keep going'}</div>`:''}
   <div class="card" style="padding:14px">
     <div class="eyebrow">By domain</div>
     ${Object.entries(perDom).sort((a,b)=>(a[1].c/a[1].t)-(b[1].c/b[1].t)).map(([d,o])=>`
       <div class="dwrap"><div class="top"><b>${esc(d)}</b><span>${o.c}/${o.t} • ${pct(o.c/o.t)}%</span></div>
       <div class="bar"><i style="width:${pct(o.c/o.t)}%;background:${o.c/o.t>=PASS_MARK?'linear-gradient(90deg,var(--teal-deep),var(--green))':'linear-gradient(90deg,#9a6a16,var(--amber))'}"></i></div></div>
     `).join('')}
   </div>
   <div class="qbtns">
     <button class="btn ghost" onclick="exitToMenu()">Done</button>
     ${wrong.length?`<button class="btn" onclick="retryWrong()">Retry ${wrong.length} wrong</button>`:''}
     <button class="btn primary" onclick="toggleReview()">${wrong.length?'Review answers':'Review all'}</button>
   </div>
   <div id="reviewWrap" style="display:none;margin-top:6px">
     ${reviewListHtml()}
   </div>
   <div style="height:14px"></div>
  `;
  quiz._wrong = wrong.map(x=>x.q);
}
function reviewListHtml(){
  const labels=["A","B","C","D"];
  return quiz.qs.map((q,i)=>{
    const chosen=quiz.answers[i];
    const correct=chosen===q.answer;
    return `<div class="rev-q">
      <div class="rq"><span class="qdomain">${esc(q.domain)}</span><br/>${esc(q.q)}</div>
      ${q.choices.map((c,ci)=>{
        let cls="ro";
        if(ci===q.answer) cls+=" c";
        else if(ci===chosen && !correct) cls+=" w";
        return `<div class="${cls}"><span class="lab">${labels[ci]}</span>${esc(c)}${ci===chosen?'  ◂ your answer':''}</div>`;
      }).join('')}
      <div class="rex"><b style="color:var(--teal)">Why:</b> ${esc(q.explain)}</div>
    </div>`;
  }).join('');
}
function toggleReview(){
  const w=document.getElementById("reviewWrap");
  if(!w) return;
  w.style.display = w.style.display==='none' ? 'block' : 'none';
  if(w.style.display==='block') w.scrollIntoView({behavior:'smooth',block:'start'});
}
function retryWrong(){
  const w=quiz._wrong||[];
  if(!w.length) return;
  startQuiz(shuffle(w), {mode:'practice', label:'Retry missed'});
}
function exitToMenu(){
  const wasExam=quiz.opts.mode==='exam';
  quiz=null; setNavVisible(true);
  setTab(wasExam?'exam':'practice');
}

/* ---------- STATS ---------- */
function renderStats(){
  setNavVisible(true);
  const seen=totalSeen();
  const acc=overallAccuracy();
  const attempts=STATE.attempts;
  const best=attempts.length?Math.max(...attempts.map(a=>a.score/a.total)):0;
  const coverage=seen/BANK.length;
  view.innerHTML = `
   <div class="eyebrow" style="margin-top:10px">Progress</div>
   <h2>Your readiness</h2>
   <div class="stat-row" style="margin-top:6px">
     <div class="stat"><div class="n">${pct(coverage)}%</div><div class="l">Bank covered</div></div>
     <div class="stat"><div class="n">${seen?pct(acc)+'%':'—'}</div><div class="l">Accuracy</div></div>
     <div class="stat"><div class="n">${attempts.length?pct(best)+'%':'—'}</div><div class="l">Best exam</div></div>
   </div>
   <div class="card">
     <div class="eyebrow">Domain mastery</div>
     ${DOMAINS.map(d=>{
       const pd=STATE.perDomain[d];
       const r=pd&&pd.total?pd.correct/pd.total:0;
       const seenN=pd?pd.total:0;
       return `<div class="dwrap"><div class="top"><b>${esc(d)}</b><span>${seenN?pct(r)+'% • '+seenN+' ans':'not started'}</span></div>
         <div class="bar"><i style="width:${pct(r)}%;background:${r>=PASS_MARK?'linear-gradient(90deg,var(--teal-deep),var(--green))':(seenN?'linear-gradient(90deg,#9a6a16,var(--amber))':'var(--line)')}"></i></div></div>`;
     }).join('')}
   </div>
   ${attempts.length?`<div class="card"><div class="eyebrow">Exam history</div>
     ${attempts.slice().reverse().slice(0,10).map(a=>`<div class="kfact"><span class="k">${new Date(a.t).toLocaleDateString()} ${new Date(a.t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span><span class="v" style="color:${a.score/a.total>=PASS_MARK?'var(--green)':'var(--amber)'}">${a.score}/${a.total} • ${pct(a.score/a.total)}%</span></div>`).join('')}
   </div>`:''}
   <div class="qbtns">
     <button class="btn ghost" onclick="resetProgress()">Reset all progress</button>
   </div>
   <p class="note">Progress is stored privately on this device only.</p>
   <div style="height:10px"></div>
  `;
}
function resetProgress(){
  if(!confirm("Reset all progress, stats, and exam history on this device?")) return;
  STATE=JSON.parse(JSON.stringify(DEFAULT_STATE));
  saveState();
  toast("Progress reset");
  renderStats();
}
